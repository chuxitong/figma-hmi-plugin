<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const StatusCard = ({ title, value, unit, trend, status }) => {
            const getStatusColor = (status) => {
                switch(status) {
                    case 'OK': return 'bg-green-600';
                    case 'ALARM': return 'bg-red-600';
                    case 'MAINT': return 'bg-orange-500';
                    case 'IDLE': return 'bg-gray-500';
                    case 'WARN': return 'bg-orange-500';
                    default: return 'bg-gray-500';
                }
            };

            return (
                <div className="bg-white rounded-lg shadow-md border-l-4 border-l-gray-300 p-4">
                    <div className="text-gray-600 text-sm mb-2">{title}</div>
                    <div className="text-3xl font-bold text-gray-800 mb-2">
                        {value} <span className="text-sm font-normal text-gray-600">{unit}</span>
                    </div>
                    <div className="text-gray-600 text-sm mb-3">trend: {trend}</div>
                    <div>
                        <span className={`text-white text-xs px-3 py-1 rounded ${getStatusColor(status)}`}>
                            {status}
                        </span>
                    </div>
                </div>
            );
        };

        const App = () => {
            const statusData = [
                { title: "Pump P-101", value: "1480", unit: "", trend: "+12", status: "OK" },
                { title: "Pump P-102", value: "1492", unit: "", trend: "+8", status: "OK" },
                { title: "Compressor C-201", value: "3.21", unit: "bar", trend: "+0.04", status: "OK" },
                { title: "Motor M-301", value: "94.2", unit: "", trend: "+5.1", status: "ALARM" },
                { title: "Valve V-102", value: "CLOSED", unit: "", trend: "—", status: "ALARM" },
                { title: "Conveyor CV-401", value: "0.00", unit: "/s", trend: "—", status: "MAINT" },
                { title: "Mixer MX-501", value: "240", unit: "", trend: "—", status: "IDLE" },
                { title: "Heater H-201", value: "62.0", unit: "", trend: "-1.2", status: "WARN" },
                { title: "Tank T-101", value: "72", unit: "", trend: "+2", status: "OK" },
                { title: "Tank T-102", value: "41", unit: "", trend: "-1", status: "OK" },
                { title: "Sensor T-405", value: "38.5", unit: "", trend: "+0.4", status: "OK" },
                { title: "Sensor F-902", value: "180", unit: "/h", trend: "+3", status: "OK" }
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="bg-[#0a2e56] text-white p-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Equipment Status Dashboard</h1>
                                <div className="text-gray-300 text-sm">Shift: Assembly 2 - Line A - Shift B</div>
                            </div>
                            <div className="bg-gray-700 px-4 py-2 rounded text-sm">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>
                    
                    <div className="p-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {statusData.map((item, index) => (
                                <StatusCard 
                                    key={index}
                                    title={item.title}
                                    value={item.value}
                                    unit={item.unit}
                                    trend={item.trend}
                                    status={item.status}
                                />
                            ))}
                        </div>
                    </div>

                    <div className="bg-gray-100 border-t px-6 py-3">
                        <div className="text-gray-600 text-sm">
                            Connection: OK - Items: 12 - Critical: 2 - Warnings: 2
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
