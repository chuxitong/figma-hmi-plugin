<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parameter Trend Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f1f5f9;
    }
    
    .chart-grid {
      background-image: linear-gradient(to right, #dde3ea 1px, transparent 1px),
                        linear-gradient(to bottom, #dde3ea 1px, transparent 1px);
      background-size: 50px 40px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
          <Header />
          <div className="flex-1 p-4">
            <MetricsSection />
            <TrendChartSection />
          </div>
          <Footer />
        </div>
      );
    }

    function Header() {
      return (
        <header className="bg-[#13314f] text-white py-4 px-6">
          <div className="flex justify-between items-center">
            <div>
              <h1 className="text-2xl font-semibold">Parameter Trend Monitor</h1>
              <div className="text-xs mt-1 text-gray-300">
                Trend Window: 60 min · Sample: 1 s
              </div>
            </div>
            <div className="bg-[#1b4779] text-gray-300 px-4 py-2 rounded-md text-sm">
              2026-04-19 14:32:07 MSK
            </div>
          </div>
        </header>
      );
    }

    function MetricCard({ title, value, change, color }) {
      return (
        <div className="bg-white rounded-lg border border-gray-200 overflow-hidden">
          <div className="p-4">
            <div className="text-gray-500 text-sm">{title}</div>
            <div className="text-3xl font-bold text-gray-800 mt-1">{value}</div>
            <div className="text-xs text-gray-600 mt-2">
              {change}
            </div>
          </div>
        </div>
      );
    }

    function MetricsSection() {
      return (
        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
          <MetricCard 
            title="Temperature" 
            value="72.4" 
            change="+1.2 са смеху" 
            color="green" 
          />
          <MetricCard 
            title="Pressure" 
            value="3.21" 
            change="+0.04 са смеху" 
            color="orange" 
          />
          <MetricCard 
            title="Flow" 
            value="184" 
            change="▼ -3 са смеху" 
            color="orange" 
          />
          <MetricCard 
            title="Setpoint dev" 
            value="1.8" 
            change="+0.2 са смеху" 
            color="green" 
          />
        </div>
      );
    }

    function TrendChartSection() {
      return (
        <div className="bg-white rounded-lg border border-gray-200 p-4">
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-lg font-semibold text-gray-800">Trend window — 14:00 to 15:00</h2>
            <div className="flex items-center space-x-4">
              <div className="flex items-center">
                <div className="w-3 h-3 bg-green-700 mr-2"></div>
                <span className="text-xs text-gray-600">Temp (°C)</span>
              </div>
              <div className="flex items-center">
                <div className="w-3 h-3 bg-orange-500 mr-2"></div>
                <span className="text-xs text-gray-600">Pressure (bar)</span>
              </div>
              <div className="flex items-center">
                <div className="w-3 h-3 bg-red-700 mr-2"></div>
                <span className="text-xs text-gray-600">Flow (L/min) band: ±2σ</span>
              </div>
            </div>
          </div>
          
          <div className="chart-container h-64 chart-grid relative">
            {/* Temperature line (green) */}
            <svg className="absolute inset-0 w-full h-full">
              <polyline 
                points="0,75 100,75 200,90 300,110 400,105 500,110 600,75 700,70 800,75 900,65 1000,75 1100,65 1200,75" 
                fill="none" 
                stroke="#2c7a4d" 
                strokeWidth="2"
              />
            </svg>
            
            {/* Pressure line (orange) */}
            <svg className="absolute inset-0 w-full h-full">
              <polyline 
                points="0,165 100,150 200,165 300,170 400,160 500,165 600,180 700,165 800,150 900,170 1000,165 1100,155 1200,160" 
                fill="none" 
                stroke="#f97316" 
                strokeWidth="2"
              />
            </svg>
            
            {/* Flow line (red) */}
            <svg className="absolute inset-0 w-full h-full">
              <polyline 
                points="0,195 100,200 200,180 300,190 400,200 500,180 600,190 700,200 800,195 900,190 1000,185 1100,185 1200,195" 
                fill="none" 
                stroke="#b91c1c" 
                strokeWidth="2"
              />
            </svg>
            
            {/* Y-axis labels */}
            <div className="absolute left-0 inset-y-0 flex flex-col justify-between text-xs text-gray-500 py-2">
              <div>100</div>
              <div>90</div>
              <div>80</div>
              <div>70</div>
              <div>60</div>
              <div>50</div>
              <div>40</div>
            </div>
            
            {/* X-axis labels */}
            <div className="absolute bottom-0 inset-x-0 flex justify-between text-xs text-gray-500 px-2">
              <div>14:00</div>
              <div>14:05</div>
              <div>14:10</div>
              <div>14:15</div>
              <div>14:20</div>
              <div>14:25</div>
              <div>14:30</div>
              <div>14:35</div>
              <div>14:40</div>
              <div>14:45</div>
              <div>14:50</div>
              <div>14:55</div>
              <div>14:60</div>
            </div>
          </div>
          
          <div className="mt-4 r bg-gray-50 border border-gray-200 rounded-md p-2 text-sm text-gray-700">
            <div className="flex justify-between">
              <span>14:22 — Flow rate deviation > 12 % (FT-401)</span>
              <span>Operator: A. Petrov</span>
            </div>
          </div>
        </div>
      );
    }

    function Footer() {
      return (
        <footer className="p-4 text-xs text-gray-500 border-t">
          Connection: OK · Latency: 18 ms · Logging: enabled · Export to CSV available via toolbar
        </footer>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
