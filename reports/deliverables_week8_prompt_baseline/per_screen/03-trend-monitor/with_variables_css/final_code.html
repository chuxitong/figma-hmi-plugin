<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Data Trend Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="container mx-auto p-4">
                        <div className="grid grid-cols-4 gap-4 mb-4">
                            <MetricCard 
                                title="Temperature" 
                                value="72.4" 
                                change="+1.2 за смеху" 
                                color="green"
                                borderColor="border-green-600"
                            />
                            <MetricCard 
                                title="Pressure" 
                                value="3.21" 
                                change="+0.04 за смеху" 
                                color="green"
                                borderColor="border-green-600"
                            />
                            <MetricCard 
                                title="Flow" 
                                value="184" 
                                change="-3 за смеху" 
                                color="orange"
                                borderColor="border-orange-500"
                            />
                            <MetricCard 
                                title="Setpoint dev" 
                                value="1.8" 
                                change="+0.2 за смеху" 
                                color="green"
                                borderColor="border-green-600"
                            />
                        </div>
                        <TrendChart />
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#14385a] text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold">Process Data Trend Monitor</h1>
                            <p className="text-sm text-gray-300">Trend Window: 60 min · Sample: 1 s</p>
                        </div>
                        <div className="bg-[#1e3a7a] px-4 py-2 rounded-md text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const MetricCard = ({ title, value, change, color, borderColor }) => {
            return (
                <div className={`bg-white rounded-md p-4 border-l-4 ${borderColor}`}>
                    <div className="text-gray-500 text-sm mb-1">{title}</div>
                    <div className="text-4xl font-bold text-gray-800 mb-2">{value}</div>
                    <div className={`flex items-center text-xs ${color === 'orange' ? 'text-orange-500' : 'text-green-600'}`}>
                        <i className={`fas fa-caret-${color === 'orange' ? 'down' : 'up'} mr-1`}></i>
                        {change}
                    </div>
                </div>
            );
        };

        const TrendChart = () => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-6">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-lg font-semibold text-gray-800">Trend window — 14:00 to 15:00</h2>
                        <div className="flex space-x-6">
                            <div className="flex items-center">
                                <div className="w-4 h-2 bg-green-700 mr-2"></div>
                                <span className="text-xs text-gray-600">Temp (°C)</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-2 bg-orange-500 mr-2"></div>
                                <span className="text-xs text-gray-600">Pressure (bar)</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-2 bg-red-700 mr-2"></div>
                                <span className="text-xs text-gray-600">Flow (L/min) band: ±2σ</span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="relative h-64 mb-4">
                        {/* Chart grid */}
                        <div className="absolute inset-0 grid grid-cols-13 grid-rows-10">
                            {Array(11).fill().map((_, i) => (
                                <div key={`h-${i}`} className="col-span-13 border-t border-gray-200"></div>
                            ))}
                            {Array(14).fill().map((_, i) => (
                                <div key={`v-${i}`} className="row-span-10 border-l border-gray-200"></div>
                            ))}
                        </div>
                        
                        {/* Chart lines */}
                        <svg className="absolute inset-0 w-full h-full" style={{paddingLeft: '40px', paddingRight: '20px', paddingTop: '10px', paddingBottom: '30px'}}>
                            {/* Green line for Temperature */}
                            <polyline 
                                points="0,60 100,65 200,60 300,45 400,50 500,40 600,50 700,45 800,40 900,50 1000,35 1100,40 1200,45" 
                                fill="none" 
                                stroke="#16a34a" 
                                strokeWidth="2"
                            />
                            
                            {/* Orange line for Pressure */}
                            <polyline 
                                points="0,140 100,140 200,145 300,150 400,145 500,155 600,150 700,145 800,140 900,150 1000,145 1100,140 1200,140" 
                                fill="none" 
                                stroke="#f97316" 
                                strokeWidth="2"
                            />
                            
                            {/* Red line for Flow */}
                            <polyline 
                                points="0,180 100,175 200,170 300,175 400,180 500,185 600,180 700,185 800,190 900,185 1000,180 1100,175 1200,180" 
                                fill="none" 
                                stroke="#dc2626" 
                                strokeWidth="2"
                            />
                        </svg>
                        
                        {/* Time labels */}
                        <div className="absolute bottom-0 w-full flex justify-between px-4 text-xs text-gray-500">
                            <span>14:00</span>
                            <span>14:05</span>
                            <span>14:10</span>
                            <span>14:15</span>
                            <span>14:20</span>
                            <span>14:25</span>
                            <span>14:30</span>
                            <span>14:35</span>
                            <span>14:40</span>
                            <span>14:45</span>
                            <span>14:50</span>
                            <span>14:55</span>
                            <span>14:60</span>
                        </div>
                        
                        {/* Y-axis labels */}
                        <div className="absolute left-0 top-0 h-full flex flex-col justify-between py-2 text-xs text-gray-500">
                            <span>100</span>
                            <span>90</span>
                            <span>80</span>
                            <span>70</span>
                            <span>60</span>
                            <span>50</span>
                            <span>40</span>
                        </div>
                    </div>
                    
                    <div className="flex justify-between items-center border rounded-md p-2 bg-gray-50">
                        <div className="text-sm text-gray-700">14:22 — Flow rate deviation > 12 % (FT-401)</div>
                        <div className="text-xs text-gray-500">Operator: A. Petrov</div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="py-4 px-6 border-t bg-gray-50">
                    <div className="container mx-auto">
                        <div className="text-xs text-gray-500">
                            Connection: OK · Latency: 18 ms · Logging: enabled · Export to CSV available via toolbar
                        </div>
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
