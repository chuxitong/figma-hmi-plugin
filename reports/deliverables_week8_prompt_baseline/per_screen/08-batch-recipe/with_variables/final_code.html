<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Recipe Management</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <MainContent />
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-slate-900 text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <i className="fas fa-cog text-white text-xl"></i>
                            <div>
                                <h1 className="text-xl font-semibold">Batch Recipe Management</h1>
                                <p className="text-xs text-gray-300">Recipe R-204 · Lot 2026-017 · Batch operator: A. Petrov</p>
                            </div>
                        </div>
                        <div className="bg-slate-800 rounded-md px-4 py-2 text-sm text-gray-300">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const StepRow = ({ number, name, duration, status }) => {
            const getStatusBadge = () => {
                switch(status.toUpperCase()) {
                    case 'DONE':
                        return <span className="px-6 py-1 text-xs font-medium rounded bg-green-700 text-white">DONE</span>;
                    case 'ACTIVE':
                        return <span className="px-6 py-1 text-xs font-medium rounded bg-blue-600 text-white">ACTIVE</span>;
                    case 'PENDING':
                        return <span className="px-6 py-1 text-xs font-medium rounded bg-gray-600 text-white">PENDING</span>;
                    default:
                        return null;
                }
            };

            return (
                <tr className="border-b hover:bg-gray-50">
                    <td className="py-3 px-4 text-gray-800">{number}</td>
                    <td className="py-3 px-4 text-gray-800 font-medium">{name}</td>
                    <td className="py-3 px-4 text-gray-800">{duration} min</td>
                    <td className="py-3 px-4">{getStatusBadge()}</td>
                    <td className="py-3 px-4">
                        <button className="px-6 py-1 border border-gray-400 rounded text-gray-800 font-medium hover:bg-gray-100">
                            View
                        </button>
                    </td>
                </tr>
            );
        };

        const StepTable = () => {
            const steps = [
                { number: 1, name: 'Pre-heat', duration: 10, status: 'DONE' },
                { number: 2, name: 'Fill base', duration: 8, status: 'DONE' },
                { number: 3, name: 'Mix', duration: 15, status: 'ACTIVE' },
                { number: 4, name: 'Add catalyst', duration: 4, status: 'PENDING' },
                { number: 5, name: 'Hold', duration: 20, status: 'PENDING' },
                { number: 6, name: 'Cool down', duration: 12, status: 'PENDING' },
                { number: 7, name: 'Discharge', duration: 6, status: 'PENDING' }
            ];

            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h2 className="text-lg font-semibold mb-4 text-gray-800">Steps</h2>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-100">
                                <tr>
                                    <th className="text-left py-2 px-4 text-sm font-medium text-gray-700">#</th>
                                    <th className="text-left py-2 px-4 text-sm font-medium text-gray-700">Step</th>
                                    <th className="text-left py-2 px-4 text-sm font-medium text-gray-700">Duration</th>
                                    <th className="text-left py-2 px-4 text-sm font-medium text-gray-700">Status</th>
                                    <th className="text-left py-2 px-4 text-sm font-medium text-gray-700">Action</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white">
                                {steps.map((step) => (
                                    <StepRow 
                                        key={step.number}
                                        number={step.number}
                                        name={step.name}
                                        duration={step.duration}
                                        status={step.status}
                                    />
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ParameterCard = ({ label, value, unit, status }) => {
            const getStatusBadge = () => {
                switch(status) {
                    case 'OK':
                        return <span className="px-6 py-0.5 text-xs font-medium rounded bg-green-700 text-white">OK</span>;
                    case 'WARN':
                        return <span className="px-6 py-0.5 text-xs font-medium rounded bg-orange-500 text-white">WARN</span>;
                    default:
                        return null;
                }
            };

            return (
                <div className="border rounded-lg p-4">
                    <div className="text-sm text-gray-500 mb-2">{label}</div>
                    <div className="flex items-baseline">
                        <span className="text-4xl font-medium text-gray-800">{value}</span>
                        <span className="text-xl ml-2 text-gray-600">{unit}</span>
                    </div>
                    <div className="mt-2">
                        {getStatusBadge()}
                    </div>
                </div>
            );
        };

        const LiveParameters = () => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h2 className="text-lg font-semibold mb-6 text-gray-800">Live parameters</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <ParameterCard label="Temperature" value="65.4" unit="°C" status="OK" />
                        <ParameterCard label="pH" value="7.1" unit="" status="OK" />
                        <ParameterCard label="RPM" value="240" unit="" status="OK" />
                        <ParameterCard label="Pressure" value="1.18" unit="bar" status="WARN" />
                    </div>
                </div>
            );
        };

        const Timeline = () => {
            const timelineItems = [
                { number: 1, label: '10m', status: 'current' },
                { number: 2, label: '8m', status: 'completed' },
                { number: 3, label: '15m', status: 'current' },
                { number: 4, label: '4m', status: 'pending' },
                { number: 5, label: '20m', status: 'pending' },
                { number: 6, label: '12m', status: 'pending' },
                { number: 7, label: '6m', status: 'pending' }
            ];

            const getTimelineStyle = (status) => {
                switch(status) {
                    case 'current':
                        return 'bg-green-700';
                    case 'completed':
                        return 'bg-green-700';
                    default:
                        return 'bg-gray-500';
                }
            };

            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h2 className="text-lg font-semibold mb-6 text-gray-800">Timeline</h2>
                    
                    <div className="flex space-x-4 mb-8">
                        {timelineItems.map((item) => (
                            <div key={item.number} className="flex flex-col items-center">
                                <div className={`w-8 h-8 rounded-full ${getTimelineStyle(item.status)} text-white flex items-center justify-center text-sm font-medium`}>
                                    {item.number}
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="flex justify-between text-xs text-gray-500 mb-6">
                        <div className="w-12 text-center">10m</div>
                        <div className="w-12 text-center">8m</div>
                        <div className="w-12 text-center">15m</div>
                        <div className="w-12 text-center">4m</div>
                        <div className="w-12 text-center">20m</div>
                        <div className="w-12 text-center">12m</div>
                        <div className="w-12 text-center">6m</div>
                    </div>

                    <div className="flex space-x-4">
                        <button className="flex-1 bg-green-700 text-white py-3 px-4 rounded-md font-medium text-lg uppercase hover:bg-green-800">
                            RESUME
                        </button>
                        <button className="flex-1 bg-orange-500 text-white py-3 px-4 rounded-md font-medium text-lg uppercase hover:bg-orange-600">
                            HOLD
                        </button>
                        <button className="flex-1 bg-red-600 text-white py-3 px-4 rounded-md font-medium text-lg uppercase hover:bg-red-700">
                            ABORT
                        </button>
                    </div>
                </div>
            );
        };

        const MainContent = () => {
            return (
                <div className="flex-1 container mx-auto p-6">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2">
                            <StepTable />
                        </div>
                        <div className="space-y-6">
                            <LiveParameters />
                            <Timeline />
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 border-t py-4 px-6 text-gray-500 text-sm">
                    <div className="container mx-auto">
                        Recipe R-204 · Step 3 of 7 ACTIVE · Compliance: ANSI/ISA-101.01
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
