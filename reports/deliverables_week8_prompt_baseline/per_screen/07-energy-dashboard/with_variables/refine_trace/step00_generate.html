<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen bg-slate-50">
                    {/* Header */}
                    <header className="bg-slate-900 text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-semibold">Energy Monitoring Dashboard</h1>
                                <p className="text-slate-300 text-sm mt-1">Energy Center 2 · Day shift · All zones</p>
                            </div>
                            <div className="bg-slate-800 rounded-md px-4 py-2 text-slate-300 text-sm">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <div className="p-6">
                        {/* Metric Cards Row */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                            <MetricCard 
                                title="Total kWh" 
                                value="12 845" 
                                change="+340 за смену" 
                                color="green"
                            />
                            <MetricCard 
                                title="Peak load" 
                                value="742" 
                                change="+18 за смену" 
                                color="orange"
                            />
                            <MetricCard 
                                title="Cost (today)" 
                                value="€ 1 932" 
                                change="+78 за смену" 
                                color="orange"
                            />
                            <MetricCard 
                                title="Power factor" 
                                value="0.92" 
                                change="+0.01 за смену" 
                                color="green"
                            />
                        </div>

                        {/* Bottom Row with Charts */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Power Consumption Chart */}
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 className="text-gray-800 font-semibold mb-6">Power consumption by zone</h2>
                                <div className="space-y-6">
                                    <ZoneRow 
                                        zone="Zone A" 
                                        percentage={62} 
                                        status="OK" 
                                        color="bg-green-700" 
                                    />
                                    <ZoneRow 
                                        zone="Zone B" 
                                        percentage={48} 
                                        status="OK" 
                                        color="bg-green-700" 
                                    />
                                    <ZoneRow 
                                        zone="Zone C" 
                                        percentage={81} 
                                        status="WARN" 
                                        color="bg-orange-500" 
                                    />
                                    <ZoneRow 
                                        zone="Zone D" 
                                        percentage={35} 
                                        status="OK" 
                                        color="bg-green-700" 
                                    />
                                    <ZoneRow 
                                        zone="Zone E" 
                                        percentage={90} 
                                        status="ALARM" 
                                        color="bg-red-600" 
                                    />
                                    <ZoneRow 
                                        zone="Zone F" 
                                        percentage={27} 
                                        status="OK" 
                                        color="bg-green-700" 
                                    />
                                </div>
                            </div>

                            {/* Source Breakdown Chart */}
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 className="text-gray-800 font-semibold mb-6">Source breakdown</h2>
                                <div className="flex items-center justify-center">
                                    <div className="relative w-64 h-64">
                                        {/* Donut chart - using CSS for simplified representation */}
                                        <div className="w-full h-full rounded-full" style={{
                                            background: `conic-gradient(
                                                #2e7d32 0% 57%, 
                                                #1976d2 57% 82%, 
                                                #ff9800 82% 100%
                                            )`
                                        }}>
                                            <div className="absolute inset-4 bg-white rounded-full flex items-center justify-center">
                                                <div className="text-center">
                                                    <div className="text-3xl font-bold text-gray-800">100%</div>
                                                    <div className="text-xs text-gray-500 mt-1">today</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="ml-8 space-y-3">
                                        <div className="flex items-center">
                                            <div className="w-4 h-4 bg-green-700 mr-2"></div>
                                            <span className="text-sm text-gray-700">Электроэнергия · 57 %</span>
                                        </div>
                                        <div className="flex items-center">
                                            <div className="w-4 h-4 bg-blue-500 mr-2"></div>
                                            <span className="text-sm text-gray-700">Газ · 25 %</span>
                                        </div>
                                        <div className="flex items-center">
                                            <div className="w-4 h-4 bg-blue-600 mr-2"></div>
                                            <span className="text-sm text-gray-700">Утилизация тепла · 18 %</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-gray-100 border-t border-gray-200 py-4 px-6 mt-8">
                        <div className="text-xs text-gray-500">
                            Connection: OK · Tariff plan: Industrial-2 · Compliance: ANSI/ISA-101.01
                        </div>
                    </footer>
                </div>
            );
        };

        const MetricCard = ({ title, value, change, color }) => {
            const borderColor = color === 'green' ? 'border-green-600' : 'border-orange-500';
            
            return (
                <div className={`bg-white rounded-lg border ${borderColor} p-4`}>
                    <div className="text-xs text-gray-500 mb-1">{title}</div>
                    <div className="text-3xl font-bold text-gray-800 mb-2">{value}</div>
                    <div className="text-xs text-gray-500">
                        <span className="text-green-600">▲</span> {change}
                    </div>
                </div>
            );
        };

        const ZoneRow = ({ zone, percentage, status, color }) => {
            const getStatusColor = () => {
                if (status === "OK") return "bg-green-700";
                if (status === "WARN") return "bg-orange-500";
                return "bg-red-600";
            };

            return (
                <div className="flex items-center justify-between">
                    <div className="w-16 text-sm font-medium text-gray-800">{zone}</div>
                    <div className="flex-1 mx-6">
                        <div className="w-full bg-gray-100 rounded-full h-6">
                            <div 
                                className={`h-6 rounded-full ${color}`} 
                                style={{ width: `${percentage}%` }}
                            ></div>
                        </div>
                    </div>
                    <div className="w-16 text-right">
                        <span className="text-sm text-gray-600">{percentage}%</span>
                    </div>
                    <div className="w-16">
                        <span className={`px-3 py-1 rounded text-xs font-medium text-white ${getStatusColor()}`}>
                            {status.toUpperCase()}
                        </span>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
