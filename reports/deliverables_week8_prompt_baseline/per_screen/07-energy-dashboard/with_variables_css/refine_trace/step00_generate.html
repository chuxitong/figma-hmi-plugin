<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const MetricCard = ({ title, value, change, color = "green" }) => {
            return (
                <div className="bg-white rounded-lg p-4 border border-gray-200">
                    <div className="text-xs text-gray-500 mb-1">{title}</div>
                    <div className="text-3xl font-bold text-gray-800 mb-2">{value}</div>
                    <div className="text-xs text-gray-500">
                        <span className={`text-${color}-600`}>▲ {change}</span>
                    </div>
                </div>
            );
        };

        const ZoneBar = ({ zone, percentage, status }) => {
            const getStatusColor = () => {
                switch (status) {
                    case 'OK': return 'bg-green-600';
                    case 'WARN': return 'bg-orange-500';
                    case 'ALARM': return 'bg-red-600';
                    default: return 'bg-green-600';
                }
            };

            return (
                <div className="flex items-center justify-between mb-6">
                    <div className="w-16 text-sm font-medium text-gray-800">{zone}</div>
                    <div className="flex-1 mx-6">
                        <div className="bg-gray-100 rounded-full h-6 w-full">
                            <div 
                                className={`h-6 rounded-full ${getStatusColor()}`}
                                style={{ width: `${percentage}%` }}
                            ></div>
                        </div>
                    </div>
                    <div className="w-12 text-center">
                        <div className="text-sm text-gray-600 mb-1">{percentage}%</div>
                        <div className={`text-xs text-white px-2 py-1 rounded text-center ${getStatusColor()}`}>
                            {status}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const zoneData = [
                { zone: 'Zone A', percentage: 62, status: 'OK' },
                { zone: 'Zone B', percentage: 48, status: 'OK' },
                { zone: 'Zone C', percentage: 81, status: 'WARN' },
                { zone: 'Zone D', percentage: 35, status: 'OK' },
                { zone: 'Zone E', percentage: 90, status: 'ALARM' },
                { zone: 'Zone F', percentage: 27, status: 'OK' }
            ];

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* Header */}
                    <div className="bg-slate-800 px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-white text-xl font-semibold">Energy Monitoring Dashboard</h1>
                                <div className="text-slate-300 text-sm mt-1">Industrial-2 · Day shift · All zones</div>
                            </div>
                            <div className="bg-slate-700 rounded px-4 py-2">
                                <div className="text-slate-300 text-sm">2026-04-19 14:32:07 MSK</div>
                            </div>
                        </div>
                    </div>

                    {/* Metrics Cards */}
                    <div className="px-6 py-6">
                        <div className="grid grid-cols-4 gap-6 mb-6">
                            <MetricCard 
                                title="Total kWh" 
                                value="12 845" 
                                change="340 за смену"
                                color="green"
                            />
                            <MetricCard 
                                title="Peak load" 
                                value="742" 
                                change="18 за смену"
                                color="orange"
                            />
                            <MetricCard 
                                title="Cost (today)" 
                                value="€ 1 932" 
                                change="78 за смену"
                                color="orange"
                            />
                            <MetricCard 
                                title="Power factor" 
                                value="0.92" 
                                change="0.01 за смену"
                                color="green"
                            />
                        </div>

                        {/* Main Content */}
                        <div className="grid grid-cols-2 gap-6">
                            {/* Power Consumption Panel */}
                            <div className="bg-white rounded-lg p-6 border border-gray-200">
                                <h2 className="text-gray-800 font-semibold mb-6">Power consumption by zone</h2>
                                {zoneData.map((item, index) => (
                                    <ZoneBar 
                                        key={index}
                                        zone={item.zone}
                                        percentage={item.percentage}
                                        status={item.status}
                                    />
                                ))}
                            </div>

                            {/* Source Breakdown Panel */}
                            <div className="bg-white rounded-lg p-6 border border-gray-200">
                                <h2 className="text-gray-800 font-semibold mb-6">Source breakdown</h2>
                                <div className="flex items-center justify-center">
                                    <div className="relative w-64 h-64">
                                        {/* Donut chart - using CSS to create segments */}
                                        <div className="w-64 h-64 rounded-full relative overflow-hidden">
                                            <div className="absolute inset-0" style={{
                                                background: `conic-gradient(
                                                    #22c55e 0% 57%,
                                                    #f97316 57% 82%,
                                                    #3b82f6 82% 100%
                                                )`
                                            }}></div>
                                            <div className="absolute inset-8 bg-white rounded-full"></div>
                                        </div>
                                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                                            <div className="text-4xl font-bold text-gray-800">100%</div>
                                            <div className="text-gray-500 text-sm mt-2">today</div>
                                        </div>
                                    </div>
                                    <div className="ml-8">
                                        <div className="space-y-3">
                                            <div className="flex items-center">
                                                <div className="w-4 h-4 bg-green-600 mr-2"></div>
                                                <span className="text-sm text-gray-700">Электроэнергию · 57 %</span>
                                            </div>
                                            <div className="flex items-center">
                                                <div className="w-4 h-4 bg-orange-500 mr-2"></div>
                                                <span className="text-sm text-gray-700">Газ · 25 %</span>
                                            </div>
                                            <div className="flex items-center">
                                                <div className="w-4 h-4 bg-blue-500 mr-2"></div>
                                                <span className="text-sm text-gray-700">Утилизация тепла · 18 %</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="px-6 py-4 border-t border-gray-200 mt-8">
                        <div className="text-xs text-gray-500">
                            Connection: OK · Tariff plan: Industrial-2 · Compliance: ANSI/ISA-101.01
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
