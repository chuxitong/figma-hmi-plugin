d text-white text-xs font-medium bg-[#e65100] hover:bg-[#c62828]">\n                                    WARN\n                                </span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n            );\n        };\n\n        const Footer = () => {\n            return (\n                <footer className="py-4 px-6 border-t border-gray-200 mt-auto">\n                    <div className="container mx-auto">\n                        <div className="bg-gray-100 py-2 px-4 text-xs text-gray-500 rounded-md">\n                            Connection: OK • Loop status: closed-loop AUTO • Compliance: ANSI/ISA-101.01\n                        </div>\n                    </div>\n                </footer>\n            );\n        };\n\n        ReactDOM.render(\n            <Route path="/" element={<App />} />\n        );\n    </script>\n</body>\n</html>\n
