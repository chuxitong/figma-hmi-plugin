<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Status Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const StatusCard = ({ title, value, trend, status, borderColor }) => {
            const getStatusBadge = () => {
                const baseClasses = "text-white text-xs font-medium px-3 py-1 rounded";
                
                switch(status) {
                    case 'OK':
                        return `${baseClasses} bg-green-700`;
                    case 'ALARM':
                        return `${baseClasses} bg-red-700`;
                    case 'MAINT':
                        return `${baseClasses} bg-orange-600`;
                    case 'IDLE':
                        return `${baseClasses} bg-gray-500`;
                    case 'WARN':
                        return `${baseClasses} bg-orange-600`;
                    default:
                        return `${baseClasses} bg-gray-500`;
                }
            };

            return (
                <div className="bg-white rounded-lg border border-gray-300 p-4 shadow-sm">
                    <div className="border-l-4" style={{borderColor: borderColor}}>
                        <div className="text-gray-600 text-sm mb-2">{title}</div>
                        <div className="text-4xl font-bold text-gray-900 mb-2">{value}</div>
                        <div className="text-gray-500 text-xs mb-3">trend: {trend}</div>
                        <div className={getStatusBadge()}>
                            {status}
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const statusData = [
                {
                    title: "Pump P-101",
                    value: "1480",
                    trend: "+12",
                    status: "OK",
                    borderColor: "#2e7d32"
                },
                {
                    title: "Pump P-102",
                    value: "1492",
                    trend: "+8",
                    status: "OK",
                    borderColor: "#2e7d32"
                },
                {
                    title: "Compressor C-201",
                    value: "3.21",
                    trend: "+0.04",
                    status: "OK",
                    borderColor: "#2e7d32"
                },
                {
                    title: "Motor M-301",
                    value: "94.2",
                    trend: "+5.1",
                    status: "ALARM",
                    borderColor: "#c62828"
                },
                {
                    title: "Valve V-102",
                    value: "CLOSED",
                    trend: "—",
                    status: "ALARM",
                    borderColor: "#c62828"
                },
                {
                    title: "Conveyor CV-401",
                    value: "0.00",
                    trend: "—",
                    status: "MAINT",
                    borderColor: "#f9a825"
                },
                {
                    title: "Mixer MX-501",
                    value: "240",
                    trend: "—",
                    status: "IDLE",
                    borderColor: "#757575"
                },
                {
                    title: "Heater H-201",
                    value: "62.0",
                    trend: "-1.2",
                    status: "WARN",
                    borderColor: "#f9a825"
                },
                {
                    title: "Tank T-101",
                    value: "72",
                    trend: "+2",
                    status: "OK",
                    borderColor: "#2e7d32"
                },
                {
                    title: "Tank T-102",
                    value: "41",
                    trend: "-1",
                    status: "OK",
                    borderColor: "#2e7d32"
                },
                {
                    title: "Sensor T-405",
                    value: "38.5",
                    trend: "+0.4",
                    status: "OK",
                    borderColor: "#2e7d32"
                },
                {
                    title: "Sensor F-902",
                    value: "180",
                    trend: "+3",
                    status: "OK",
                    borderColor: "#2e7d32"
                }
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-slate-800 text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-semibold">Equipment Status Dashboard</h1>
                                <p className="text-sm text-gray-300">Facility 2 • Line A • Shift B</p>
                            </div>
                            <div className="text-sm text-gray-300 bg-slate-700 px-4 py-2 rounded">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="p-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {statusData.map((item, index) => (
                                <StatusCard 
                                    key={index}
                                    title={item.title}
                                    value={item.value}
                                    trend={item.trend}
                                    status={item.status}
                                    borderColor={item.borderColor}
                                />
                            ))}
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="bg-gray-100 border-t border-gray-200 px-6 py-4 mt-auto">
                        <div className="text-gray-500 text-sm">
                            Connection: OK • Items: 12 • Critical: 2 • Warning: 2
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
