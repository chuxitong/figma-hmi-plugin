<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Farm Synoptic</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const TankLevelIndicator = ({ tankId, percentage, status }) => {
            const getStatusColor = () => {
                switch(status) {
                    case 'OK': return 'bg-green-700';
                    case 'WARN': return 'bg-orange-500';
                    case 'ALARM': return 'bg-red-700';
                    default: return 'bg-green-700';
                }
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative w-24 h-40 border-2 border-gray-400 rounded">
                        <div className="w-full h-full bg-gray-200"></div>
                        <div 
                            className={`absolute bottom-0 w-full ${getStatusColor()}`} 
                            style={{height: `${percentage}%`}}
                        ></div>
                        <div className="absolute top-1 right-2 text-xs text-gray-600">
                            {percentage}%
                        </div>
                    </div>
                    <div className="mt-2 text-sm font-bold text-gray-800">{tankId}</div>
                    <div className={`mt-1 px-4 py-0.5 rounded text-xs text-white text-center ${getStatusColor()}`}>
                        {status}
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-blue-900 text-white py-4 px-6">
                        <div className="container mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Tank Farm Synoptic</h1>
                                <p className="text-sm text-gray-300">Facility 2 • Tank yard A • 10 tanks</p>
                            </div>
                            <div className="bg-blue-800 px-4 py-2 rounded text-sm">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto py-6 px-6">
                        {/* Levels and connections section */}
                        <div className="bg-white rounded-lg border border-gray-200 p-6 mb-6">
                            <h2 className="text-lg font-bold text-gray-800 mb-6">Levels and connections</h2>
                            
                            <div className="grid grid-cols-5 gap-8 mb-8">
                                <TankLevelIndicator tankId="T-101" percentage={72} status="OK" />
                                <TankLevelIndicator tankId="T-102" percentage={41} status="OK" />
                                <TankLevelIndicator tankId="T-103" percentage={88} status="WARN" />
                                <TankLevelIndicator tankId="T-104" percentage={12} status="ALARM" />
                                <TankLevelIndicator tankId="T-201" percentage={64} status="OK" />
                            </div>
                            
                            <div className="grid grid-cols-5 gap-8 mb-8">
                                <TankLevelIndicator tankId="T-202" percentage={95} status="ALARM" />
                                <TankLevelIndicator tankId="T-203" percentage={33} status="OK" />
                                <TankLevelIndicator tankId="T-204" percentage={58} status="OK" />
                                <TankLevelIndicator tankId="T-301" percentage={47} status="OK" />
                                <TankLevelIndicator tankId="T-302" percentage={22} status="WARN" />
                            </div>
                            
                            <div className="border-t border-gray-400 w-full h-2 bg-gray-400"></div>
                        </div>

                        {/* Status Legend */}
                        <div className="bg-white rounded-lg border border-gray-200 p-6">
                            <h3 className="text-md font-bold text-gray-800 mb-4">Status legend</h3>
                            <div className="flex items-center space-x-6">
                                <div className="flex items-center">
                                    <span className="bg-green-700 text-white px-4 py-0.5 rounded text-xs mr-2">OK</span>
                                    <span className="text-xs text-gray-600">в норме</span>
                                </div>
                                <div className="flex items-center">
                                    <span className="bg-orange-500 text-white px-4 py-0.5 rounded text-xs mr-2">WARN</span>
                                    <span className="text-xs text-gray-600">отключение, нужно вмешательство</span>
                                </div>
                                <div className="flex items-center">
                                    <span className="bg-red-700 text-white px-4 py-0.5 rounded text-xs mr-2">ALARM</span>
                                    <span className="text-xs text-gray-600">критическое отключение, требуется ACK</span>
                                </div>
                            </div>
                            <p className="mt-6 text-xs text-gray-500">
                                Сообщение закодировано тремя независимыми признаками: цвет state-fill, текстовый белый state-badge, форма state-shape.
                            </p>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-50 py-4 px-6 border-t border-gray-200">
                        <div className="container mx-auto">
                            <span className="text-xs text-gray-500">Connection: OK • Tanks online: 10/10 • Critical: 2 • Warning: 2</span>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
