<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Farm Synoptic</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="container mx-auto px-4 py-6">
                        <div className="bg-white rounded-lg border border-gray-200 p-6 mb-6">
                            <h2 className="text-lg font-bold text-gray-800 mb-6">Levels and connections</h2>
                            <div className="grid grid-cols-5 gap-8">
                                <TankDisplay id="T-101" percentage={72} status="OK" color="green" position="top" />
                                <TankDisplay id="T-102" percentage={41} status="OK" color="green" position="top" />
                                <TankDisplay id="T-103" percentage={88} status="WARN" color="orange" position="top" />
                                <TankDisplay id="T-104" percentage={12} status="ALARM" color="red" position="top" />
                                <TankDisplay id="T-201" percentage={64} status="OK" color="green" position="top" />
                                
                                <TankDisplay id="T-202" percentage={95} status="ALARM" color="red" position="bottom" />
                                <TankDisplay id="T-203" percentage={33} status="OK" color="green" position="bottom" />
                                <TankDisplay id="T-204" percentage={58} status="OK" color="green" position="bottom" />
                                <TankDisplay id="T-301" percentage={47} status="OK" color="green" position="bottom" />
                                <TankDisplay id="T-302" percentage={22} status="WARN" color="orange" position="bottom" />
                            </div>
                        </div>
                        
                        <div className="bg-white rounded-lg border border-gray-200 p-6">
                            <h2 className="text-lg font-bold text-gray-800 mb-6">Status legend</h2>
                            <div className="flex items-center space-x-8">
                                <div className="flex items-center space-x-2">
                                    <div className="bg-green-600 text-white text-xs font-bold px-4 py-0.5 rounded">OK</div>
                                    <span className="text-xs text-gray-600">в норме</span>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <div className="bg-orange-500 text-white text-xs font-bold px-4 py-0.5 rounded">WARN</div>
                                    <span className="text-xs text-gray-600">отключение, нужно вмешательство</span>
                                </div>
                                <div className="flex items-center space-x-2">
                                    <div className="bg-red-600 text-white text-xs font-bold px-4 py-0.5 rounded">ALARM</div>
                                    <span className="text-xs text-gray-600">критическое отключение, требуется ACK</span>
                                </div>
                            </div>
                            <div className="mt-6 text-xs text-gray-500">
                                Соответствие закодировано терминами независимыми признаками: цвет state-fill, текстовая белёж state-badge, форма state-shape.
                            </div>
                        </div>
                    </div>
                    <Footer />
                </div>
            );
        }

        function Header() {
            return (
                <header className="bg-blue-900 text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <div className="text-green-400">
                                <i className="fas fa-tint text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold">Tank Farm Synoptic</h1>
                                <p className="text-sm text-gray-300">Warehouse 2 - Tank yard A - 10 tanks</p>
                            </div>
                        </div>
                        <div className="bg-blue-800 px-6 py-2 rounded text-sm text-gray-300">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        }

        function TankDisplay({ id, percentage, status, color, position }) {
            const getStatusColor = (status) => {
                switch (status) {
                    case "OK": return "bg-green-600";
                    case "WARN": return "bg-orange-500";
                    case "ALARM": return "bg-red-600";
                    default: return "bg-gray-500";
                }
            };

            const getTankColor = (color) => {
                switch (color) {
                    case "green": return "bg-green-600";
                    case "orange": return "bg-orange-500";
                    case "red": return "bg-red-600";
                    default: return "bg-gray-300";
                }
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative mb-2 w-24 h-44 border-2 border-gray-400 rounded">
                        <div className={`absolute bottom-0 left-0 right-0 ${getTankColor(color)} h-${percentage}`} style={{height: `${percentage}%`}}></div>
                        <div className="absolute text-xs text-gray-600" style={{top: `${percentage > 50 ? 10 : percentage * 1.5}px`, right: '10px'}}>
                            {percentage}%
                        </div>
                    </div>
                    <div className="text-sm font-bold text-gray-700 mb-2">{id}</div>
                    <div className={`text-xs font-bold text-white px-4 py-0.5 rounded ${getStatusColor(status)}`}>
                        {status}
                    </div>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="bg-gray-100 py-4 px-6 text-xs text-gray-500 border-t border-gray-200">
                    <div className="container mx-auto">
                        Connection: OK - Tanks online: 10/10 - Critical: 2 - Warning: 2
                    </div>
                </footer>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
