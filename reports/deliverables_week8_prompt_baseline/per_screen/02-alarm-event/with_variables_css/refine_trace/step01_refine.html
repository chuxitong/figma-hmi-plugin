<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-[#13314f] text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Alarms & Events Monitor</h1>
                                <p className="text-sm text-gray-300">Refinery 2 · Shift B · All sites</p>
                            </div>
                            <div className="bg-[#1c3b7a] text-gray-300 px-4 py-2 rounded-md text-sm">
                                2026-04-19 14:34:55 MSK
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="p-6">
                        {/* Summary Cards */}
                        <div className="grid grid-cols-5 gap-4 mb-6">
                            <div className="bg-white rounded-md border-l-4 border-red-500 p-4">
                                <div className="text-sm text-gray-500">Critical</div>
                                <div className="text-4xl font-bold text-gray-800">2</div>
                                <div className="text-xs text-gray-500">▲ +1 за смену</div>
                            </div>
                            
                            <div className="bg-white rounded-md border-l-4 border-orange-500 p-4">
                                <div className="text-sm text-gray-500">Warning</div>
                                <div className="text-4xl font-bold text-gray-800">5</div>
                                <div className="text-xs text-gray-500">▼ -1 за смену</div>
                            </div>
                            
                            <div className="bg-white rounded-md border-l-4 border-green-500 p-4">
                                <div className="text-sm text-gray-500">Information</div>
                                <div className="text-4xl font-bold text-gray-800">11</div>
                                <div className="text-xs text-gray-500">▲ +3 за смену</div>
                            </div>
                            
                            <div className="bg-white rounded-md border-l-4 border-green-500 p-4">
                                <div className="text-sm text-gray-500">Acknowledged</div>
                                <div className="text-4xl font-bold text-gray-800">34</div>
                                <div className="text-xs text-gray-500">▲ +7 за смену</div>
                            </div>
                            
                            <div className="bg-white rounded-md border-l-4 border-orange-500 p-4">
                                <div className="text-sm text-gray-500">MTBA</div>
                                <div className="text-4xl font-bold text-gray-800">1h 42m</div>
                                <div className="text-xs text-gray-500">▼ -12m за смену</div>
                            </div>
                        </div>

                        {/* Filter Section */}
                        <div className="bg-white rounded-lg border p-4 mb-6">
                            <div className="flex items-center space-x-4">
                                <div className="text-sm text-gray-600">Severity</div>
                                <div className="flex space-x-2">
                                    <button className="px-4 py-1 bg-red-700 text-white text-xs font-bold rounded-full">CRITICAL</button>
                                    <button className="px-4 py-1 bg-orange-500 text-white text-xs font-bold rounded-full">WARNING</button>
                                    <button className="px-4 py-1 bg-blue-600 text-white text-xs font-bold rounded-full">INFO</button>
                                </div>
                                <div className="text-sm text-gray-600 ml-4">Tag / описание</div>
                                <div className="flex-grow">
                                    <input 
                                        type="text" 
                                        placeholder="Введите тер или часть описания..." 
                                        className="w-full px-4 py-2 border border-gray-300 rounded text-sm"
                                    />
                                </div>
                                <button className="px-6 py-2 bg-green-700 text-white text-xs font-bold rounded">ACK ALL</button>
                                <button className="px-6 py-2 border border-gray-300 text-gray-700 text-xs font-bold rounded">Export...</button>
                            </div>
                        </div>

                        {/* Alarm Table */}
                        <div className="bg-white rounded-lg border">
                            <table className="w-full">
                                <thead className="bg-gray-100">
                                    <tr>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Severity</th>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Time</th>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Tag</th>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Description</th>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Value</th>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Source</th>
                                        <th className="text-left py-3 px-4 text-sm font-semibold text-gray-700">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <AlarmRow 
                                        severity="CRITICAL" 
                                        time="14:31:42" 
                                        tag="TT-301" 
                                        description="Motor temperature exceeds high-high limit" 
                                        value="94.2" 
                                        unit="°C" 
                                        source="Refinery2/U2/M-301" 
                                    />
                                    <AlarmRow 
                                        severity="CRITICAL" 
                                        time="14:28:15" 
                                        tag="PT-102" 
                                        description="Discharge pressure too high" 
                                        value="5.8" 
                                        unit="bar" 
                                        source="Refinery2/U1/P-102" 
                                    />
                                    <AlarmRow 
                                        severity="WARNING" 
                                        time="14:22:10" 
                                        tag="FT-401" 
                                        description="Flow rate deviation > 12 %" 
                                        value="23.1" 
                                        unit="m³/h" 
                                        source="Refinery2/U4/F-401" 
                                    />
                                    <AlarmRow 
                                        severity="WARNING" 
                                        time="14:15:30" 
                                        tag="CT-502" 
                                        description="Cooling water temperature rising" 
                                        value="38.5" 
                                        unit="°C" 
                                        source="Utilities/CW-502" 
                                    />
                                    <AlarmRow 
                                        severity="WARNING" 
                                        time="14:09:54" 
                                        tag="LT-301" 
                                        description="Tank level above setpoint" 
                                        value="88.4" 
                                        unit="%" 
                                        source="Refinery2/U2/T-301" 
                                    />
                                    <AlarmRow 
                                        severity="INFO" 
                                        time="14:05:18" 
                                        tag="PDT-201" 
                                        description="Filter differential pressure" 
                                        value="0.8" 
                                        unit="bar" 
                                        source="Refinery2/U2/F-201" 
                                    />
                                    <AlarmRow 
                                        severity="INFO" 
                                        time="14:01:09" 
                                        tag="FT-902" 
                                        description="Flow within tolerance — restored" 
                                        value="180" 
                                        unit="m³/h" 
                                        source="Refinery2/U9/F-902" 
                                    />
                                    <AlarmRow 
                                        severity="INFO" 
                                        time="13:54:22" 
                                        tag="CT-101" 
                                        description="Communication restored" 
                                        value="-" 
                                        unit="" 
                                        source="Bus/CT-101" 
                                    />
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="bg-gray-100 py-4 px-6 border-t">
                        <div className="text-xs text-gray-500">
                            Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state
                        </div>
                    </div>
                </div>
            );
        };

        const AlarmRow = ({ severity, time, tag, description, value, unit, source }) => {
            const getSeverityStyle = (sev) => {
                switch(sev) {
                    case 'CRITICAL':
                        return 'bg-red-700 text-white';
                    case 'WARNING':
                        return 'bg-orange-500 text-white';
                    case 'INFO':
                        return 'bg-blue-600 text-white';
                    default:
                        return 'bg-gray-500 text-white';
                }
            };

            return (
                <tr className="border-t hover:bg-gray-50">
                    <td className="py-3 px-4">
                        <span className={`px-3 py-1 text-xs font-bold rounded ${getSeverityStyle(severity)}`}>
                            {severity}
                        </span>
                    </td>
                    <td className="py-3 px-4 text-gray-700">{time}</td>
                    <td className="py-3 px-4 font-medium text-gray-900">{tag}</td>
                    <td className="py-3 px-4 text-gray-800">{description}</td>
                    <td className="py-3 px-4">
                        <span className="text-gray-700">{value}</span> <span className="text-gray-500">{unit}</span>
                    </td>
                    <td className="py-3 px-4 text-gray-600 text-sm">{source}</td>
                    <td className="py-3 px-4">
                        <div className="flex space-x-2">
                            <button className="px-6 py-1 border border-gray-300 text-gray-700 text-sm rounded hover:bg-gray-50">ACK</button>
                            <button className="px-6 py-1 border border-gray-300 text-gray-700 text-sm rounded hover:bg-gray-50">View</button>
                        </div>
                    </td>
                </tr>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
