<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="p-4">
                        <StatusCards />
                        <FilterSection />
                        <AlarmTable />
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-slate-800 text-white px-6 py-4">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-semibold">Alarm & Events Monitor</h1>
                            <div className="text-sm text-slate-300">Refinery 2 · Shift B · All sites</div>
                        </div>
                        <div className="bg-slate-700 px-4 py-2 rounded text-sm text-slate-300">
                            2026-04-19 14:34:55 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const StatusCards = () => {
            const statusData = [
                {
                    title: "Critical",
                    count: "2",
                    trend: "▲ +1 за смену",
                    color: "border-red-500 text-red-500",
                    bgColor: "bg-red-50"
                },
                {
                    title: "Warning",
                    count: "5",
                    trend: "▼ -1 за смену",
                    color: "border-orange-500 text-orange-500",
                    bgColor: "bg-orange-50"
                },
                {
                    title: "Information",
                    count: "11",
                    trend: "▲ +3 за смену",
                    color: "border-green-500 text-green-500",
                    bgColor: "bg-green-50"
                },
                {
                    title: "Acknowledged",
                    count: "34",
                    trend: "▲ +7 за смену",
                    color: "border-green-500 text-green-500",
                    bgColor: "bg-green-50"
                },
                {
                    title: "MTBA",
                    count: "1h 42m",
                    trend: "▼ -12m за смену",
                    color: "border-orange-500 text-orange-500",
                    bgColor: "bg-orange-50"
                }
            ];

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                    {statusData.map((card, index) => (
                        <div key={index} className={`bg-white rounded-lg border-l-4 ${card.color} p-4 shadow-sm`}>
                            <div className="text-gray-500 text-sm">{card.title}</div>
                            <div className="text-3xl font-bold text-gray-800 mt-1">{card.count}</div>
                            <div className="text-xs text-gray-500 mt-1">{card.trend}</div>
                        </div>
                    ))}
                </div>
            );
        };

        const FilterSection = () => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-4 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-4">
                            <span className="text-gray-600 text-sm">Severity</span>
                            <div className="flex space-x-2">
                                <button className="px-4 py-1 bg-red-600 text-white text-xs rounded-full font-medium">
                                    CRITICAL
                                </button>
                                <button className="px-4 py-1 bg-orange-500 text-white text-xs rounded-full font-medium">
                                    WARNING
                                </button>
                                <button className="px-4 py-1 bg-blue-500 text-white text-xs rounded-full font-medium">
                                    INFO
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex items-center space-x-4">
                            <span className="text-gray-600 text-sm">Tag / описание</span>
                            <input 
                                type="text" 
                                placeholder="Введите тер или часть описания..." 
                                className="border border-gray-300 rounded px-3 py-1 text-sm w-64 focus:outline-none focus:border-blue-500"
                            />
                            
                            <div className="flex space-x-2">
                                <button className="px-6 py-1 bg-green-700 text-white text-sm rounded font-medium">
                                    ACK ALL
                                </button>
                                <button className="px-4 py-1 border border-gray-300 text-gray-700 text-sm rounded">
                                    Export...
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AlarmTable = () => {
            const alarms = [
                {
                    severity: "CRITICAL",
                    time: "14:31:42",
                    tag: "TT-301",
                    description: "Motor temperature exceeds high-high limit",
                    value: "94.2",
                    unit: "°C",
                    source: "Refinery2/U2/M-301"
                },
                {
                    severity: "CRITICAL",
                    time: "14:28:15",
                    tag: "PT-102",
                    description: "Discharge pressure too high",
                    value: "5.8",
                    unit: "bar",
                    source: "Refinery2/U1/P-102"
                },
                {
                    severity: "WARNING",
                    time: "14:22:10",
                    tag: "FT-401",
                    description: "Flow rate deviation > 12 %",
                    value: "23.1",
                    unit: "m³/h",
                    source: "Refinery2/U4/F-401"
                },
                {
                    severity: "WARNING",
                    time: "14:15:30",
                    tag: "CT-502",
                    description: "Cooling water temperature rising",
                    value: "38.5",
                    unit: "°C",
                    source: "Utilities/CW-502"
                },
                {
                    severity: "WARNING",
                    time: "14:09:54",
                    tag: "LT-301",
                    description: "Tank level above setpoint",
                    value: "88.4",
                    unit: "%",
                    source: "Refinery2/U2/T-301"
                },
                {
                    severity: "INFO",
                    time: "14:05:18",
                    tag: "PDT-201",
                    description: "Filter differential pressure",
                    value: "0.8",
                    unit: "bar",
                    source: "Refinery2/U2/F-201"
                },
                {
                    severity: "INFO",
                    time: "14:01:09",
                    tag: "FT-902",
                    description: "Flow within tolerance — restored",
                    value: "180",
                    unit: "m³/h",
                    source: "Refinery2/U9/F-902"
                },
                {
                    severity: "INFO",
                    time: "13:54:22",
                    tag: "CT-101",
                    description: "Communication restored",
                    value: "—",
                    unit: "",
                    source: "Bus/CT-101"
                }
            ];

            const getSeverityColor = (severity) => {
                switch(severity) {
                    case "CRITICAL": return "bg-red-600 text-white";
                    case "WARNING": return "bg-orange-500 text-white";
                    case "INFO": return "bg-blue-500 text-white";
                    default: return "bg-gray-500 text-white";
                }
            };

            return (
                <div className="bg-white rounded-lg border border-gray-200">
                    <table className="w-full">
                        <thead className="bg-gray-100">
                            <tr>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Severity</th>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Time</th>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Tag</th>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Description</th>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Value</th>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Source</th>
                                <th className="text-left py-3 px-4 text-sm font-medium text-gray-600">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {alarms.map((alarm, index) => (
                                <tr key={index} className="border-b border-gray-100 hover:bg-gray-50">
                                    <td className="py-3 px-4">
                                        <span className={`px-3 py-1 text-xs rounded ${getSeverityColor(alarm.severity)}`}>
                                            {alarm.severity}
                                        </span>
                                    </td>
                                    <td className="py-3 px-4 text-sm text-gray-700">{alarm.time}</td>
                                    <td className="py-3 px-4 text-sm font-medium text-gray-800">{alarm.tag}</td>
                                    <td className="py-3 px-4 text-sm text-gray-700">{alarm.description}</td>
                                    <td className="py-3 px-4 text-sm text-gray-700">
                                        {alarm.value} <span className="text-gray-500">{alarm.unit}</span>
                                    </td>
                                    <td className="py-3 px-4 text-sm text-gray-500">{alarm.source}</td>
                                    <td className="py-3 px-4">
                                        <div className="flex space-x-2">
                                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-sm rounded hover:bg-gray-50">
                                                ACK
                                            </button>
                                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-sm rounded hover:bg-gray-50">
                                                View
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="px-6 py-4 text-xs text-gray-500 border-t border-gray-200">
                    <div>
                        Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
