                    id: "PT-102",

        const AlarmItem = ({ alarm }) => {

                switch(type) {
                    case 'ALARM': return 'bg-red-600';
                    case 'WARN': return 'bg-orange-500';
                    case 'INFO': return 'bg-blue-600';
                    default: return 'bg-gray-500';
                }
            };

            return (
                <div className="border rounded-lg p-4">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-4">
                            <span className="text-xs text-gray-500">{alarm.time}</span>
                            <span className="text-xs text-gray-700">{alarm.id}</span>
                        </div>
                        <button className="bg-gray-100 hover:bg-gray-200 px-6 py-1 rounded text-sm border border-gray-300 font-medium">
                            ACK
                        </button>
                    </div>
                    <div className="mt-2 text-sm text-gray-700">{alarm.message}</div>
                    <div className="mt-1">
