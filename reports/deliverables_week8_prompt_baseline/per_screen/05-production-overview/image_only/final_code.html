<html>

    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;

<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">

                            <h1 className="text-xl font-medium">Production Line A — Overview</h1>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="flex items-center space-x-2 text-sm">
                                <span>Shift A</span>
                                <span>•</span>
                                <span>Memory 2</span>
                                <span>•</span>
                                <span>Shift B</span>
                                <span>•</span>
                                <span>Operator: A. Petrov</span>
                            </div>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="flex space-x-4">
                                <button className="px-6 py-1 rounded-full bg-[#1a4882] text-white">Overview</button>
                                <button className="px-6 py-1 rounded-full text-gray-300 hover:text-white">Alarms</button>
                                <button className="px-6 py-1 rounded-full text-gray-300 hover:text-white">Trends</button>
                                <button className="px-6 py-1 rounded-full text-gray-300 hover:text-white">Operator</button>
                            </div>
                            <div className="ml-4 bg-[#1a3b6d] text-gray-300 px-4 py-2 rounded-md text-sm">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const ProcessFlow = () => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-6">
                    <div className="mb-4">
                        <h2 className="text-gray-800 font-semibold text-lg">Process flow — Line A</h2>
                        <p className="text-gray-500 text-sm mt-1">Source: ThingsBoard SCADA symbol library — fluid system pack</p>
                    </div>
                    
                    <div className="relative h-64 w-full">
                        {/* T-101 Tank */}
                        <div className="absolute left-16 top-8 w-16 h-28">
                            <div className="w-full h-full rounded-md border-2 border-gray-400 bg-gray-200">
                                <div className="h-20 bg-green-600 w-full"></div>
                            </div>
                            <div className="absolute -bottom-6 w-full text-center text-xs">T-101</div>
                            <div className="absolute -top-6 w-full text-center text-xs">72%</div>
                        </div>

                        {/* Pipe 1 */}
                        <div className="absolute left-32 top-16 w-12 h-1 bg-gray-400"></div>

                        {/* P-101 Pump */}
                        <div className="absolute left-24 top-12 w-12 h-12 rounded-full border-4 border-gray-400 flex items-center justify-center">
                            <div className="w-8 h-8 rounded-full bg-green-600 transform rotate-45"></div>
                        </div>

                        {/* Pipe 2 */}
                        <div className="absolute left-48 top-16 w-12 h-1 bg-gray-400"></div>

                        {/* V-201 Valve */}
                        <div className="absolute left-40 top-16 w-12 h-12 border-4 border-gray-400 flex items-center justify-center">
                            <div className="w-6 h-6 rounded-full bg-green-600"></div>
                        </div>

                        {/* Pipe 3 */}

                        {/* P-102 Pump */}

                            <div className="w-8 h-8 rounded-full bg-orange-500 transform rotate-45"></div>
                        </div>

                        {/* Pipe 4 */}
                        <div className="absolute left-96 top-16 w-12 h-1 bg-gray-400"></div>

                        {/* V-202 Valve */}
                        <div className="absolute left-92 top-16 w-12 h-12 border-4 border-gray-400 flex items-center justify-center">
                            <div className="w-6 h-6 rounded-full bg-red-600"></div>
                        </div>

                        {/* Pipe 5 */}
                        <div className="absolute left-120 top-16 w-24 h-1 bg-gray-400"></div>

                        {/* Separator */}
                        <div className="absolute left-80 top-12 w-32 h-16 rounded-full border-4 border-gray-400 bg-gray-200">
                            <div className="absolute top-2 left-2 right-2 bottom-0 bg-green-600 rounded-full transform scale-y-1/2"></div>
                        </div>

                        {/* Label for separator */}
                        <div className="absolute left-80 top-32 text-xs text-gray-700">SEPARATOR S-1</div>

                        {/* Pipe 6 */}
                        <div className="absolute left-144 top-16 w-12 h-1 bg-gray-400"></div>

                        {/* T-102 Tank */}
                        <div className="absolute left-136 top-8 w-16 h-28">
                            <div className="w-full h-full rounded-md border-2 border-gray-400 bg-gray-200">
                                <div className="h-12 bg-green-600 w-full"></div>
                            </div>
                            <div className="absolute -bottom-6 w-full text-center text-xs">T-102</div>
                            <div className="absolute -top-6 w-full text-center text-xs">41%</div>
                        </div>

                        {/* Temperature indicators */}
                        <div className="absolute bottom-8 left-24 flex flex-col items-center">
                            <div className="w-10 h-10 rounded-full border-4 border-gray-400 flex items-center justify-center bg-green-100">
                                <div className="w-6 h-6 rounded-full bg-green-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                            </div>
                            <div className="mt-2 text-xs text-gray-600">72 °C</div>
                        </div>

                        <div className="absolute bottom-8 left-80 flex flex-col items-center">
                            <div className="w-10 h-10 rounded-full border-4 border-gray-400 flex items-center justify-center bg-gray-100">
                                <div className="w-6 h-6 rounded-full bg-gray-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                            </div>
                            <div className="mt-2 text-xs text-gray-600">3.4 bar</div>
                        </div>

                        <div className="absolute bottom-8 left-136 flex flex-col items-center">
                            <div className="w-10 h-10 rounded-full border-4 border-gray-400 flex items-center justify-center bg-red-100">
                                <div className="w-6 h-6 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                            </div>
                            <div className="mt-2 text-xs text-gray-600">94 °C</div>
                        </div>
                    </div>
                </div>
            );
        };

        const MetricCard = ({ title, value, change, positive }) => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-4">
                    <div className="flex justify-between items-center">
                        <div className="text-gray-600 text-sm">{title}</div>
                        <div className="text-3xl font-bold text-gray-900">{value}</div>
                    </div>
                    <div className="mt-2 text-xs text-gray-600 flex items-center">
                        <i className={`fas fa-caret-${positive ? 'up text-green-600' : 'down text-red-600'} mr-1`}></i>
                        <span>{change}</span>
                    </div>
                </div>
            );
        };

        const TrendChart = () => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-6 mt-6">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-gray-800 font-semibold text-lg">Real-time trend — last 60 min</h3>
                        <div className="flex items-center space-x-4 text-sm">
                            <div className="flex items-center">
                                <div className="w-3 h-3 bg-green-700 mr-2"></div>
                                <span>Temp</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-3 h-3 bg-orange-500 mr-2"></div>
                                <span>Pressure</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-3 h-3 bg-red-700 mr-2"></div>
                                <span>Flow</span>
                            </div>
                        </div>
                    </div>
                    <div className="w-full h-24 relative border-b border-l border-gray-200">
                        <svg className="w-full h-full" viewBox="0 0 1000 100" preserveAspectRatio="none">
                            <path d="M0,70 L100,65 L200,60 L300,65 L400,50 L500,40 L600,55 L700,45 L800,35 L900,30 L1000,25" fill="none" stroke="#16a34a" strokeWidth="2" />
                            <path d="M0,80 L100,75 L200,72 L300,68 L400,65 L500,62 L600,60 L700,58 L800,55 L900,52 L1000,48" fill="none" stroke="#f97316" strokeWidth="2" />
                            <path d="M0,90 L100,88 L200,85 L300,82 L400,84 L500,86 L600,84 L700,82 L800,80 L900,78 L1000,75" fill="none" stroke="#dc2626" strokeWidth="2" />
                        </svg>
                    </div>
                </div>
            );
        };

        const AlarmPanel = () => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-6">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-gray-800 font-semibold text-lg">Active alarms</h3>
                        <span className="text-xs text-gray-500">3 of 14</span>
                    </div>
                    <div className="space-y-4">
                        <AlarmItem 
                            time="14:31" 
                            id="TT-301" 
                            description="Motor temperature high" 
                            level="ALARM" 
                        />
                        <AlarmItem 
                            time="14:28" 
                            id="PT-102" 
                            description="Discharge pressure" 
                            level="ALARM" 
                        />
                        <AlarmItem 
                            time="14:22" 
                            id="FT-401" 
                            description="Flow rate deviation" 
                            level="WARN" 
                        />
                        <AlarmItem 
                            time="14:15" 
                            id="CT-502" 
                            description="Cooling water temp" 
                            level="WARN" 
                        />
                        <AlarmItem 
                            time="14:05" 
                            id="PDT-201" 
                            description="Filter ΔP" 
                            level="INFO" 
                        />
                    </div>
                </div>
            );
        };

        const AlarmItem = ({ time, id, description, level }) => {
            const getLevelStyle = () => {
                switch (level) {
                    case "ALARM":
                        return "bg-red-700 text-white";
                    case "WARN":
                        return "bg-orange-500 text-white";
                    case "INFO":
                        return "bg-blue-600 text-white";
                    default:
                        return "bg-gray-500 text-white";
                }
            };

            return (
                <div className="border border-gray-300 rounded-md p-4">
                    <div className="flex justify-between items-center mb-2">
                        <div className="flex items-center space-x-4">
                            <span className="text-xs text-gray-600">{time}</span>
                            <span className="text-xs text-gray-600">{id}</span>
                        </div>
                    </div>
                    <div className="flex justify-between items-center">
                        <div>
                            <div className="text-sm text-gray-700">{description}</div>
                            <div className="mt-1">
                                <span className={`text-xs px-2 py-0.5 rounded text-white ${getLevelStyle()}`}>
                                    {level}
                                </span>
                            </div>
                        </div>
                        <button className="px-6 py-1 border border-gray-400 rounded-md text-sm font-medium text-gray-800 hover:bg-gray-50">
                            ACK
                        </button>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 border-t border-gray-200 py-4 px-6">
                    <div className="text-xs text-gray-500">
                        Connection: OK · Latency: 18 ms · Logged in as A. Petrov · ThingsBoard SCADA glyphs imported via 00_raw_svg
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
