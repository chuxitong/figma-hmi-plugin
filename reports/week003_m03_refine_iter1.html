<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Trend Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const MetricCard = ({ title, value, change, unit }) => {
            return (
                <div className="bg-white rounded-lg border-l-4 shadow-sm" style={{borderLeftColor: change.startsWith('+') ? '#10b981' : '#ef4444'}}>
                    <div className="p-4">
                        <div className="text-sm text-gray-600">{title}</div>
                        <div className="text-3xl font-bold text-gray-900">{value} <span className="text-lg">{unit}</span></div>
                        <div className="text-xs text-gray-600 mt-1">
                            <span className="mr-1">{change.startsWith('+') ? '▲' : '▼'}</span>
                            {change}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-slate-900 text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Process Trend Monitor</h1>
                                <p className="text-sm text-gray-300">Update Window: 60 min - Sample: 1 s</p>
                            </div>
                            <div className="bg-slate-800 rounded-md px-4 py-2 text-sm text-gray-300">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Metrics Section */}
                    <div className="px-6 py-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <MetricCard 
                                title="Temperature" 
                                value="72.4" 
                                change="+1.2 за секунду" 
                                unit="" 
                            />
                            <MetricCard 
                                title="Pressure" 
                                value="3.21" 
                                change="+0.04 за секунду" 
                                unit="" 
                            />
                            <MetricCard 
                                title="Flow" 
                                value="184" 
                                change="-3 за секунду" 
                                unit="min" 
                            />
                            <MetricCard 
                                title="Setpoint dev" 
                                value="1.8" 
                                change="+0.2 за секунду" 
                                unit="" 
                            />
                        </div>
                    </div>

                    {/* Trend Chart */}
                    <div className="px-6 mb-6">
                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-semibold text-gray-900">Trend window — 14:00 to 15:00</h2>
                                <div className="flex items-center space-x-6">
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-green-600 mr-2 rounded-sm"></div>
                                        <span className="text-xs text-gray-600">Temp (°C)</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-orange-500 mr-2 rounded-sm"></div>
                                        <span className="text-xs text-gray-600">Pressure (bar)</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-red-700 mr-2 rounded-sm"></div>
                                        <span className="text-xs text-gray-600">Flow (L/min) band: ±2σ</span>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Chart Area */}
                            <div className="relative h-64 w-full border border-gray-200">
                                {/* Y-axis labels */}
                                <div className="absolute left-0 top-0 h-full flex flex-col justify-between text-xs text-gray-500 py-2">
                                    <span>100</span>
                                    <span>90</span>
                                    <span>80</span>
                                    <span>70</span>
                                    <span>60</span>
                                    <span>50</span>
                                    <span>40</span>
                                </div>
                                
                                {/* X-axis labels */}
                                <div className="absolute bottom-0 left-12 right-0 flex justify-between text-xs text-gray-500 pb-2">
                                    <span>14:00</span>
                                    <span>14:05</span>
                                    <span>14:10</span>
                                    <span>14:15</span>
                                    <span>14:20</span>
                                    <span>14:25</span>
                                    <span>14:30</span>
                                    <span>14:35</span>
                                    <span>14:40</span>
                                    <span>14:45</span>
                                    <span>14:50</span>
                                    <span>14:55</span>
                                    <span>15:00</span>
                                </div>
                                
                                {/* Chart grid and lines */}
                                <div className="absolute left-12 right-0 top-0 bottom-6 bg-white">
                                    {/* Grid lines */}
                                    <div className="w-full h-full grid grid-cols-12 grid-rows-6">
                                        {Array(13).fill().map((_, i) => (
                                            <div key={`col-${i}`} className="border-r border-gray-100"></div>
                                        ))}
                                        {Array(7).fill().map((_, i) => (
                                            <div key={`row-${i}`} className="row-span-2 border-t border-gray-100"></div>
                                        ))}
                                    </div>
                                    
                                    {/* Temperature line (green) */}
                                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                        <polyline 
                                            points="0,40 30,42 60,50 90,45 120,35 150,40 180,30 210,35 240,40 270,30 300,35 330,25 360,30"
                                            fill="none" 
                                            stroke="#10b981" 
                                            strokeWidth="2"
                                        />
                                    </svg>
                                    
                                    {/* Pressure line (orange) */}
                                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                        <polyline 
                                            points="0,120 30,115 60,125 90,120 120,115 150,120 180,115 210,110 240,115 270,120 300,125 330,120 360,120"
                                            fill="none" 
                                            stroke="#f97316" 
                                            strokeWidth="2"
                                        />
                                    </svg>
                                    
                                    {/* Flow line (red) */}
                                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                        <polyline 
                                            points="0,160 30,165 60,155 90,160 120,165 150,160 180,170 210,165 240,160 270,165 300,155 330,160 360,160"
                                            fill="none" 
                                            stroke="#dc2626" 
                                            strokeWidth="2"
                                        />
                                    </svg>
                                </div>
                            </div>
                            
                            {/* Alert and Operator Info */}
                            <div className="flex justify-between items-center mt-4 pt-4 border-t border-gray-200">
                                <div className="text-sm text-gray-700">14:22 — Flow rate deviation > 12 % (FT-401)</div>
                                <div className="text-sm text-gray-700">Operator: A. Petrov</div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Footer */}
                    <div className="bg-gray-100 border-t border-gray-200 py-4 px-6">
                        <div className="text-xs text-gray-500">
                            Connection: OK - Latency: 18 ms - Logging: enabled - Export to CSV available via toolbar
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
