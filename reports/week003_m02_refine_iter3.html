<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm & Events Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow p-4">
                        <SummarySection />
                        <FilterSection />
                        <TableSection />
                    </main>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#0a3561] text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div className="flex items-center">
                            <i className="fas fa-exclamation-circle text-white text-2xl mr-3"></i>
                            <div>
                                <h1 className="text-2xl font-bold">Alarm & Events Monitor</h1>
                                <p className="text-sm text-gray-300">Refinery 2 - Shift B - All sites</p>
                            </div>
                        </div>
                        <div className="bg-[#1e3a5f] rounded-md px-6 py-2 text-sm">
                            2026-04-19 14:34:55 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const SummarySection = () => {
            const summaries = [
                { title: "Critical", value: "2", subtitle: "active", change: "+1 за смену", borderColor: "border-red-600", icon: "up" },
                { title: "Warning", value: "5", subtitle: "active", change: "-1 за смену", borderColor: "border-orange-500", icon: "down" },
                { title: "Information", value: "11", subtitle: "recent", change: "+3 за смену", borderColor: "border-green-600", icon: "up" },
                { title: "Acknowledged", value: "34", subtitle: "st 24h", change: "+7 за смену", borderColor: "border-green-800", icon: "up" },
                { title: "MTBA", value: "1h 42m", subtitle: "", change: "-12m за смену", borderColor: "border-orange-500", icon: "down" }
            ];

            return (
                <div className="grid grid-cols-5 gap-4 mb-6">
                    {summaries.map((summary, index) => (
                        <SummaryCard key={index} summary={summary} />
                    ))}
                </div>
            );
        };

        const SummaryCard = ({ summary }) => {
            return (
                <div className={`bg-white rounded-md border ${summary.borderColor} p-4`}>
                    <div className="text-gray-600 text-sm mb-1">{summary.title}</div>
                    <div className="flex items-baseline">
                        <span className="text-4xl font-bold text-gray-800">{summary.value}</span>
                        {summary.subtitle && <span className="ml-1 text-gray-600 text-sm">{summary.subtitle}</span>}
                    </div>
                    <div className="mt-2 text-xs text-gray-600 flex items-center">
                        <i className={`fas fa-arrow-${summary.icon} mr-1`}></i>
                        {summary.change}
                    </div>
                </div>
            );
        };

        const FilterSection = () => {
            return (
                <div className="bg-white border rounded-md p-4 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-4">
                            <span className="text-gray-600">Severity</span>
                            <div className="flex space-x-2">
                                <button className="px-4 py-1 bg-red-700 text-white text-xs font-bold rounded-full">
                                    CRITICAL
                                </button>
                                <button className="px-4 py-1 bg-orange-500 text-white text-xs font-bold rounded-full">
                                    WARNING
                                </button>
                                <button className="px-4 py-1 bg-blue-600 text-white text-xs font-bold rounded-full">
                                    INFO
                                </button>
                            </div>
                            <span className="text-gray-600">Tag / описание</span>
                            <input 
                                type="text" 
                                placeholder="Введите тер или часть описания..." 
                                className="border border-gray-300 rounded-md px-3 py-1 text-sm w-64" 
                            />
                        </div>
                        <div className="flex space-x-4">
                            <button className="px-6 py-1 bg-green-700 text-white text-sm font-bold rounded">
                                ACK ALL
                            </button>
                            <button className="px-6 py-1 border border-gray-300 text-gray-700 text-sm font-bold rounded">
                                Export...
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const TableSection = () => {
            const tableData = [
                {
                    severity: "CRITICAL",
                    time: "14:31:42",
                    tag: "TT-301",
                    description: "Motor temperature exceeds high-high limit",
                    value: "94.2",
                    unit: "°C",
                    source: "Refinery2/U2/M-301"
                },
                {
                    severity: "CRITICAL",
                    time: "14:28:15",
                    tag: "PT-102",
                    description: "Discharge pressure too high",
                    value: "5.8",
                    unit: "bar",
                    source: "Refinery2/U1/P-102"
                },
                {
                    severity: "WARNING",
                    time: "14:22:10",
                    tag: "FT-401",
                    description: "Flow rate deviation > 12 %",
                    value: "23.1",
                    unit: "m³/h",
                    source: "Refinery2/U4/F-401"
                },
                {
                    severity: "WARNING",
                    time: "14:15:30",
                    tag: "CT-502",
                    description: "Cooling water temperature rising",
                    value: "38.5",
                    unit: "°C",
                    source: "Utilities/CW-502"
                },
                {
                    severity: "WARNING",
                    time: "14:09:54",
                    tag: "LT-301",
                    description: "Tank level above setpoint",
                    value: "88.4",
                    unit: "%",
                    source: "Refinery2/U2/T-301"
                },
                {
                    severity: "INFO",
                    time: "14:05:18",
                    tag: "PDT-201",
                    description: "Filter differential pressure",
                    value: "0.8",
                    unit: "bar",
                    source: "Refinery2/U2/F-201"
                },
                {
                    severity: "INFO",
                    time: "14:01:09",
                    tag: "FT-902",
                    description: "Flow within tolerance — restored",
                    value: "180",
                    unit: "m³/h",
                    source: "Refinery2/U9/F-902"
                },
                {
                    severity: "INFO",
                    time: "13:54:22",
                    tag: "CT-101",
                    description: "Communication restored",
                    value: "–",
                    unit: "",
                    source: "Bus/CT-101"
                }
            ];

            return (
                <div className="bg-white border rounded-md overflow-hidden">
                    <table className="w-full">
                        <thead className="bg-gray-100">
                            <tr>
                                <th className="text-left py-3 px-4 font-medium text-gray-700">Severity</th>
                                <th className="text-left py-3 px-4 font-medium text-gray-700">Time</th>
                                <th className="text-left py-3 px-4 font-medium text-gray-700">Tag</th>
                                <th className="text-left py-3 px-4 font-medium text-gray-700">Description</th>
                                <th className="text-left py-3 px-4 font-medium text-gray-700">Value</th>
                                <th className="text-left py-3 px-4 font-medium text-gray-700">Source</th>
                                <th className="text-center py-3 px-4 font-medium text-gray-700">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {tableData.map((row, index) => (
                                <TableRow key={index} row={row} />
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const TableRow = ({ row }) => {
            const getSeverityClass = (severity) => {
                switch (severity) {
                    case "CRITICAL":
                        return "bg-red-700 text-white";
                    case "WARNING":
                        return "bg-orange-500 text-white";
                    case "INFO":
                        return "bg-blue-600 text-white";
                    default:
                        return "bg-gray-500 text-white";
                }
            };

            return (
                <tr className="border-b bg-white">
                    <td className="py-3 px-4">
                        <span className={`px-3 py-0.5 text-xs font-bold rounded ${getSeverityClass(row.severity)}`}>
                            {row.severity}
                        </span>
                    </td>
                    <td className="py-3 px-4 text-gray-700">{row.time}</td>
                    <td className="py-3 px-4 font-medium">{row.tag}</td>
                    <td className="py-3 px-4 text-gray-800">{row.description}</td>
                    <td className="py-3 px-4">
                        <span className="text-gray-800">{row.value}</span>
                        <span className="ml-2 text-gray-600">{row.unit}</span>
                    </td>
                    <td className="py-3 px-4 text-gray-600 text-sm">{row.source}</td>
                    <td className="py-3 px-4">
                        <div className="flex justify-center space-x-2">
                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-xs font-medium rounded">
                                ACK
                            </button>
                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-xs font-medium rounded">
                                View
                            </button>
                        </div>
                    </td>
                </tr>
            );
        };

        const Footer = () => {
            return (
                <footer className="p-4 text-xs text-gray-500 border-t">
                    <div className="container mx-auto">
                        Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
