<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm & Events Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="flex flex-col min-h-screen bg-gray-50">
                    <Header />
                    <main className="flex-grow p-6">
                        <SummaryCards />
                        <FilterBar />
                        <EventsTable />
                    </main>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#1a3b6d] text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <div className="flex items-center">
                                <div className="text-red-500 mr-2">
                                    <i className="fas fa-exclamation-circle text-2xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold">Alarm & Events Monitor</h1>
                                    <p className="text-sm text-gray-300">Refinery 2 - Shift B - All sites</p>
                                </div>
                            </div>
                        </div>
                        <div className="bg-gray-800 rounded px-4 py-2 text-sm">
                            2026-04-19 14:34:55 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const SummaryCards = () => {
            const cards = [
                {
                    title: "Critical",
                    count: "2",
                    change: "+1 за смену",
                    color: "red"
                },
                {
                    title: "Warning",
                    count: "5",
                    change: "-1 за смену",
                    color: "orange"
                },
                {
                    title: "Information",
                    count: "11",
                    change: "+3 за смену",
                    color: "green"
                },
                {
                    title: "Acknowledged",
                    count: "34",
                    change: "+7 за смену",
                    color: "gray"
                },
                {
                    title: "MTBA",
                    count: "1h 42m",
                    change: "-12m за смену",
                    color: "orange"
                }
            ];

            return (
                <div className="grid grid-cols-5 gap-4 mb-6">
                    {cards.map((card, index) => (
                        <div key={index} className="bg-white rounded-md p-4 shadow-sm">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-gray-700">{card.title}</span>
                            </div>
                            <div className="text-2xl font-bold text-gray-800 mb-1">
                                {card.count}
                                <span className="text-sm font-normal text-gray-600 ml-1">
                                    {card.title === "MTBA" ? "st 24h" : card.title === "Critical" ? "active" : 
                                     card.title === "Warning" ? "active" : card.title === "Information" ? "recent" : "st 24h"}
                                </span>
                            </div>
                            <div className="text-xs text-gray-600 flex items-center">
                                <i className="fas fa-arrow-up mr-1"></i>
                                {card.change}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const FilterBar = () => {
            return (
                <div className="bg-white rounded-md shadow-sm p-4 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-6">
                            <span className="text-gray-700">Severity</span>
                            <div className="flex space-x-2">
                                <span className="px-4 py-1 bg-red-800 text-white text-xs rounded-full">CRITICAL</span>
                                <span className="px-4 py-1 bg-orange-500 text-white text-xs rounded-full">WARNING</span>
                                <span className="px-4 py-1 bg-blue-600 text-white text-xs rounded-full">INFO</span>
                            </div>
                            <span className="text-gray-700">Tag / описание</span>
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="Введите тег..." 
                                    className="w-64 px-4 py-1 border border-gray-300 rounded-md text-sm"
                                />
                            </div>
                        </div>
                        <div className="flex space-x-4">
                            <button className="px-6 py-1.5 bg-green-800 text-white text-sm font-bold rounded">
                                ACK ALL
                            </button>
                            <button className="px-6 py-1.5 border border-gray-300 text-gray-700 text-sm font-bold rounded">
                                Export...
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EventsTable = () => {
            const events = [
                {
                    severity: "CRITICAL",
                    time: "14:31:42",
                    tag: "TT-301",
                    description: "Motor temperature exceeds high-high limit",
                    value: "94.2",
                    unit: "°C",
                    source: "Refinery2/U2/M-301"
                },
                {
                    severity: "CRITICAL",
                    time: "14:28:15",
                    tag: "PT-102",
                    description: "Discharge pressure too high",
                    value: "5.8",
                    unit: "bar",
                    source: "Refinery2/U1/P-102"
                },
                {
                    severity: "WARNING",
                    time: "14:22:10",
                    tag: "FT-401",
                    description: "Flow rate deviation > 12 %",
                    value: "23.1",
                    unit: "m³/h",
                    source: "Refinery2/U4/F-401"
                },
                {
                    severity: "WARNING",
                    time: "14:15:30",
                    tag: "CT-502",
                    description: "Cooling water temperature rising",
                    value: "38.5",
                    unit: "°C",
                    source: "Utilities/CW-502"
                },
                {
                    severity: "WARNING",
                    time: "14:09:54",
                    tag: "LT-301",
                    description: "Tank level above setpoint",
                    value: "88.4",
                    unit: "%",
                    source: "Refinery2/U2/T-301"
                },
                {
                    severity: "INFO",
                    time: "14:05:18",
                    tag: "PDT-201",
                    description: "Filter differential pressure",
                    value: "0.8",
                    unit: "bar",
                    source: "Refinery2/U2/F-201"
                },
                {
                    severity: "INFO",
                    time: "14:01:09",
                    tag: "FT-902",
                    description: "Flow within tolerance — restored",
                    value: "180",
                    unit: "m³/h",
                    source: "Refinery2/U9/F-902"
                },
                {
                    severity: "INFO",
                    time: "13:54:22",
                    tag: "CT-101",
                    description: "Communication restored",
                    value: "-",
                    unit: "",
                    source: "Bus/CT-101"
                }
            ];

            return (
                <div className="bg-white rounded-md shadow-sm">
                    <table className="w-full">
                        <thead className="bg-gray-100 text-gray-700 text-sm">
                            <tr>
                                <th className="py-3 px-4 text-left">Severity</th>
                                <th className="py-3 px-4 text-left">Time</th>
                                <th className="py-3 px-4 text-left">Tag</th>
                                <th className="py-3 px-4 text-left">Description</th>
                                <th className="py-3 px-4 text-left">Value</th>
                                <th className="py-3 px-4 text-left">Source</th>
                                <th className="py-3 px-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {events.map((event, index) => (
                                <tr key={index} className="border-b border-gray-200 hover:bg-gray-50">
                                    <td className="py-3 px-4">
                                        <span className={
                                            event.severity === "CRITICAL" ? "bg-red-600" : 
                                            event.severity === "WARNING" ? "bg-orange-500" : "bg-blue-600"
                                        } className="text-white text-xs px-3 py-1 rounded">
                                            {event.severity}
                                        </span>
                                    </td>
                                    <td className="py-3 px-4 text-gray-700">{event.time}</td>
                                    <td className="py-3 px-4 font-medium">{event.tag}</td>
                                    <td className="py-3 px-4 text-gray-700">{event.description}</td>
                                    <td className="py-3 px-4">
                                        <span className="text-gray-700">{event.value}</span>
                                        {event.unit && <span className="ml-1 text-gray-600">{event.unit}</span>}
                                    </td>
                                    <td className="py-3 px-4 text-gray-600 text-sm">{event.source}</td>
                                    <td className="py-3 px-4">
                                        <div className="flex justify-center space-x-2">
                                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-xs rounded">ACK</button>
                                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-xs rounded">View</button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-4 px-6 text-xs text-gray-500 border-t">
                    <div className="flex items-center justify-between">
                        <div>
                            Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state
                        </div>
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
