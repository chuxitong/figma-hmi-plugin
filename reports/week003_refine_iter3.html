<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const StatusCard = ({ title, value, unit, trend, status, hasRedBorder }) => {
            const getStatusBadge = () => {
                switch(status) {
                    case 'OK':
                        return <span className="bg-green-700 text-white px-3 py-1 text-xs font-bold rounded">OK</span>;
                    case 'ALARM':
                        return <span className="bg-red-700 text-white px-3 py-1 text-xs font-bold rounded">ALARM</span>;
                    case 'MAINT':
                        return <span className="bg-orange-500 text-white px-3 py-1 text-xs font-bold rounded">MAINT</span>;
                    case 'IDLE':
                        return <span className="bg-gray-500 text-white px-3 py-1 text-xs font-bold rounded">IDLE</span>;
                    case 'WARN':
                        return <span className="bg-orange-600 text-white px-3 py-1 text-xs font-bold rounded">WARN</span>;
                    default:
                        return null;
                }
            };

            return (
                <div className={`bg-white rounded-lg p-4 shadow-sm border ${hasRedBorder ? 'border-l-4 border-red-600' : 'border-l-4 border-green-700'}`}>
                    <div className="text-gray-600 text-sm mb-2">{title}</div>
                    <div className="text-4xl font-bold text-gray-900 mb-2">
                        {value}
                        {unit && <span className="text-lg font-bold text-gray-600 ml-1">{unit}</span>}
                    </div>
                    <div className="text-gray-600 text-xs mb-2">trend: {trend}</div>
                    <div>
                        {getStatusBadge()}
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-[#0a2e56] text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Equipment Status Dashboard</h1>
                                <div className="text-gray-300 text-sm mt-1">Shift: Assembly 2 - Line A - Shift B</div>
                            </div>
                            <div className="bg-gray-700 bg-opacity-50 px-4 py-2 rounded text-sm">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="p-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <StatusCard 
                                title="Pump P-101"
                                value="1480"
                                trend="+12"
                                status="OK"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Pump P-102"
                                value="1492"
                                trend="+8"
                                status="OK"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Compressor C-201"
                                value="3.21"
                                unit="bar"
                                trend="+0.04"
                                status="OK"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Motor M-301"
                                value="94.2"
                                trend="+5.1"
                                status="ALARM"
                                hasRedBorder={true}
                            />
                            <StatusCard 
                                title="Valve V-102"
                                value="CLOSED"
                                trend="—"
                                status="ALARM"
                                hasRedBorder={true}
                            />
                            <StatusCard 
                                title="Conveyor CV-401"
                                value="0.00"
                                unit="/s"
                                trend="—"
                                status="MAINT"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Mixer MX-501"
                                value="240"
                                trend="—"
                                status="IDLE"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Heater H-201"
                                value="62.0"
                                trend="-1.2"
                                status="WARN"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Tank T-101"
                                value="72"
                                trend="+2"
                                status="OK"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Tank T-102"
                                value="41"
                                trend="-1"
                                status="OK"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Sensor T-405"
                                value="38.5"
                                trend="+0.4"
                                status="OK"
                                hasRedBorder={false}
                            />
                            <StatusCard 
                                title="Sensor F-902"
                                value="180"
                                unit="h"
                                trend="+3"
                                status="OK"
                                hasRedBorder={false}
                            />
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="border-t bg-gray-50 px-6 py-3">
                        <div className="text-gray-600 text-sm">
                            Connection: OK - Items: 12 - Critical: 2 - Warnings: 2
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
