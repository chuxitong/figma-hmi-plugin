<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Status Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow p-6 bg-gray-50">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <StatusCard 
                                title="Pump P-101" 
                                value="1480" 
                                trend="+12" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                            <StatusCard 
                                title="Pump P-102" 
                                value="1492" 
                                trend="+8" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                            <StatusCard 
                                title="Compressor C-201" 
                                value="3.21" 
                                unit="bar"
                                trend="+0.04" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                            <StatusCard 
                                title="Motor M-301" 
                                value="94.2" 
                                trend="+5.1" 
                                status="ALARM" 
                                borderColor="border-l-4 border-red-700"
                            />
                            <StatusCard 
                                title="Valve V-102" 
                                value="CLOSED" 
                                trend="—" 
                                status="ALARM" 
                                borderColor="border-l-4 border-red-700"
                                fullWidth
                            />
                            <StatusCard 
                                title="Conveyor CV-401" 
                                value="0.00" 
                                unit="/s"
                                trend="—" 
                                status="MAINT" 
                                borderColor="border-l-4 border-orange-500"
                            />
                            <StatusCard 
                                title="Mixer MX-501" 
                                value="240" 
                                trend="—" 
                                status="IDLE" 
                                borderColor="border-l-4 border-gray-500"
                            />
                            <StatusCard 
                                title="Heater H-201" 
                                value="62.0" 
                                trend="-1.2" 
                                status="WARN" 
                                borderColor="border-l-4 border-orange-500"
                            />
                            <StatusCard 
                                title="Tank T-101" 
                                value="72" 
                                trend="+2" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                            <StatusCard 
                                title="Tank T-102" 
                                value="41" 
                                trend="-1" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                            <StatusCard 
                                title="Sensor T-405" 
                                value="38.5" 
                                trend="+0.4" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                            <StatusCard 
                                title="Sensor F-902" 
                                value="180" 
                                unit="/h"
                                trend="+3" 
                                status="OK" 
                                borderColor="border-l-4 border-green-700"
                            />
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#0a2e56] text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold">Equipment Status Dashboard</h1>
                            <p className="text-sm text-gray-300">Shift: Assembly 2 - Line A - Shift B</p>
                        </div>
                        <div className="bg-[#1c3c67] px-6 py-2 rounded text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const StatusCard = ({ title, value, unit = "", trend, status, borderColor = "", fullWidth = false }) => {
            const getStatusClass = (status) => {
                switch(status) {
                    case "OK": return "bg-green-700 text-white";
                    case "ALARM": return "bg-red-700 text-white";
                    case "MAINT": return "bg-orange-500 text-white";
                    case "IDLE": return "bg-gray-400 text-white";
                    case "WARN": return "bg-orange-500 text-white";
                    default: return "bg-gray-700 text-white";
                }
            };

            return (
                <div className={`bg-white rounded-md shadow-sm border ${borderColor} ${fullWidth ? 'lg:col-span-2' : ''}`}>
                    <div className="p-4">
                        <h3 className="text-gray-600 text-sm mb-2">{title}</h3>
                        <div className="text-4xl font-bold text-gray-900 mb-2">
                            {value}{unit}
                        </div>
                        <div className="text-gray-600 text-xs mb-2">
                            trend: {trend}
                        </div>
                        <div className="flex">
                            <span className={`text-xs px-3 py-1 rounded ${getStatusClass(status)}`}>
                                {status}
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-3 px-6 border-t">
                    <div className="text-xs text-gray-600">
                        Connection: OK - Items: 12 - Critical: 2 - Warnings: 2
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
