<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm & Events Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f7fa;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="flex flex-col min-h-screen">
                    <Header />
                    <div className="flex-grow p-6 bg-gray-50">
                        <SummaryCards />
                        <FilterBar />
                        <EventsTable />
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#0a2e5e] text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center space-x-2">
                            <div className="text-red-500">
                                <i className="fas fa-exclamation-circle text-2xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold">Alarm & Events Monitor</h1>
                                <p className="text-sm text-blue-200">Refinery 2 - Shift B - All sites</p>
                            </div>
                        </div>
                        <div className="bg-[#1c3b73] px-6 py-2 rounded-md text-sm">
                            2026-04-19 14:34:55 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const SummaryCards = () => {
            const cards = [
                {
                    title: 'Critical',
                    count: '2',
                    unit: 'active',
                    change: '+1 за смену',
                    color: 'border-red-500',
                    bgColor: 'bg-red-50',
                    textColor: 'text-red-500'
                },
                {
                    title: 'Warning',
                    count: '5',
                    unit: 'active',
                    change: '-1 за смену',
                    color: 'border-orange-500',
                    bgColor: 'bg-orange-50',
                    textColor: 'text-orange-500'
                },
                {
                    title: 'Information',
                    count: '11',
                    unit: 'recent',
                    change: '+3 за смену',
                    color: 'border-green-500',
                    bgColor: 'bg-green-50',
                    textColor: 'text-green-500'
                },
                {
                    title: 'Acknowledged',
                    count: '34',
                    unit: 'st 24h',
                    change: '+7 за смену',
                    color: 'border-gray-500',
                    bgColor: 'bg-gray-50',
                    textColor: 'text-gray-500'
                },
                {
                    title: 'MTBA',
                    count: '1h 42m',
                    unit: '',
                    change: '-12m за смену',
                    color: 'border-orange-500',
                    bgColor: 'bg-orange-50',
                    textColor: 'text-orange-500'
                }
            ];

            return (
                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                    {cards.map((card, index) => (
                        <div key={index} className={`border ${card.color} rounded-md p-4 bg-white`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <div className="text-gray-600 text-sm">{card.title}</div>
                                    <div className="text-3xl font-bold text-gray-900">
                                        {card.count} <span className="text-sm font-normal">{card.unit}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-2 text-xs text-gray-600">
                                <span className="inline-block mr-1">
                                    <i className="fas fa-caret-up"></i>
                                </span>
                                {card.change}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const FilterBar = () => {
            return (
                <div className="bg-white rounded-md shadow-sm mb-6 p-4">
                    <div className="flex flex-wrap items-center justify-between">
                        <div className="flex items-center space-x-6 mb-2 md:mb-0">
                            <div className="text-gray-600">Severity</div>
                            <div className="flex space-x-2">
                                <button className="px-4 py-1 bg-red-700 text-white text-xs font-bold rounded-full">
                                    CRITICAL
                                </button>
                                <button className="px-4 py-1 bg-orange-500 text-white text-xs font-bold rounded-full">
                                    WARNING
                                </button>
                                <button className="px-4 py-1 bg-blue-600 text-white text-xs font-bold rounded-full">
                                    INFO
                                </button>
                            </div>
                            <div className="ml-4 text-gray-600">
                                Tag / описание
                            </div>
                            <div className="w-64 mx-4">
                                <input 
                                    type="text" 
                                    placeholder="Введите тер или часть описания..." 
                                    className="w-full px-4 py-1 border border-gray-300 rounded-md text-sm"
                                />
                            </div>
                        </div>
                        <div className="flex space-x-4">
                            <button className="px-6 py-1.5 bg-green-700 text-white text-sm font-bold rounded">
                                ACK ALL
                            </button>
                            <button className="px-6 py-1.5 border border-gray-300 text-gray-700 text-sm font-bold rounded">
                                Export...
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EventsTable = () => {
            const events = [
                {
                    severity: 'CRITICAL',
                    severityColor: 'bg-red-600',
                    time: '14:31:42',
                    tag: 'TT-301',
                    description: 'Motor temperature exceeds high-high limit',
                    value: '94.2',
                    unit: '°C',
                    source: 'Refinery2/U2/M-301'
                },
                {
                    severity: 'CRITICAL',
                    severityColor: 'bg-red-600',
                    time: '14:28:15',
                    tag: 'PT-102',
                    description: 'Discharge pressure too high',
                    value: '5.8',
                    unit: 'bar',
                    source: 'Refinery2/U1/P-102'
                },
                {
                    severity: 'WARNING',
                    severityColor: 'bg-orange-500',
                    time: '14:22:10',
                    tag: 'FT-401',
                    description: 'Flow rate deviation > 12 %',
                    value: '23.1',
                    unit: 'm³/h',
                    source: 'Refinery2/U4/F-401'
                },
                {
                    severity: 'WARNING',
                    severityColor: 'bg-orange-500',
                    time: '14:15:30',
                    tag: 'CT-502',
                    description: 'Cooling water temperature rising',
                    value: '38.5',
                    unit: '°C',
                    source: 'Utilities/CW-502'
                },
                {
                    severity: 'WARNING',
                    severityColor: 'bg-orange-500',
                    time: '14:09:54',
                    tag: 'LT-301',
                    description: 'Tank level above setpoint',
                    value: '88.4',
                    unit: '%',
                    source: 'Refinery2/U2/T-301'
                },
                {
                    severity: 'INFO',
                    severityColor: 'bg-blue-600',
                    time: '14:05:18',
                    tag: 'PDT-201',
                    description: 'Filter differential pressure',
                    value: '0.8',
                    unit: 'bar',
                    source: 'Refinery2/U2/F-201'
                },
                {
                    severity: 'INFO',
                    severityColor: 'bg-blue-600',
                    time: '14:01:09',
                    tag: 'FT-902',
                    description: 'Flow within tolerance — restored',
                    value: '180',
                    unit: 'm³/h',
                    source: 'Refinery2/U9/F-902'
                },
                {
                    severity: 'INFO',
                    severityColor: 'bg-blue-600',
                    time: '13:54:22',
                    tag: 'CT-101',
                    description: 'Communication restored',
                    value: '-',
                    unit: '',
                    source: 'Bus/CT-101'
                }
            ];

            return (
                <div className="bg-white rounded-md shadow-sm overflow-hidden">
                    <table className="w-full">
                        <thead className="bg-gray-100 text-gray-700 text-sm">
                            <tr>
                                <th className="py-3 px-4 text-left">Severity</th>
                                <th className="py-3 px-4 text-left">Time</th>
                                <th className="py-3 px-4 text-left">Tag</th>
                                <th className="py-3 px-4 text-left">Description</th>
                                <th className="py-3 px-4 text-left">Value</th>
                                <th className="py-3 px-4 text-left">Source</th>
                                <th className="py-3 px-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {events.map((event, index) => (
                                <tr key={index} className="border-b border-gray-200 hover:bg-gray-50">
                                    <td className="py-3 px-4">
                                        <span className={`${event.severityColor} text-white text-xs px-3 py-1 rounded`}>
                                            {event.severity}
                                        </span>
                                    </td>
                                    <td className="py-3 px-4 text-gray-700">{event.time}</td>
                                    <td className="py-3 px-4 font-medium text-gray-900">{event.tag}</td>
                                    <td className="py-3 px-4 text-gray-700">{event.description}</td>
                                    <td className="py-3 px-4">
                                        <span className="text-gray-700">{event.value}</span>
                                        {event.unit && <span className="ml-2 text-gray-600">{event.unit}</span>}
                                    </td>
                                    <td className="py-3 px-4 text-gray-600 text-sm">{event.source}</td>
                                    <td className="py-3 px-4 text-center">
                                        <div className="flex justify-center space-x-2">
                                            <button className="px-6 py-1 border border-gray-300 text-gray-700 text-xs font-bold rounded">
                                                ACK
                                            </button>
                                            <button className="px-6 py-1 border border-gray-300 text-gray-700 text-xs font-bold rounded">
                                                View
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-4 px-6 text-xs text-gray-600 border-t">
                    <div className="flex items-center justify-between">
                        <div>
                            Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state
                        </div>
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
