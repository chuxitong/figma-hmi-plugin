<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Status Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            header: '#13314f',
            statusGreen: '#2e7d32',
            statusRed: '#c62828',
            statusOrange: '#f9a825',
            statusGray: '#757575',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const App = () => {
      return (
        <div className="min-h-screen bg-slate-50">
          {/* Header */}
          <header className="bg-header text-white px-4 py-3 flex justify-between items-center">
            <div>
              <h1 className="text-2xl font-bold">Equipment Status Dashboard</h1>
              <p className="text-slate-200 text-sm">Facility 2 • Line A • Shift B</p>
            </div>
            <div className="bg-slate-700 px-4 py-2 rounded-md text-sm">
              2026-04-19 14:32:07 MSK
            </div>
          </header>

          {/* Main Content */}
          <main className="p-6 bg-slate-50">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
              <StatusCard 
                name="Pump P-101"
                value="1480"
                trend="+12"
                status="OK"
                borderColor="border-green-600"
              />
              
              <StatusCard 
                name="Pump P-102"
                value="1492"
                trend="+8"
                status="OK"
                borderColor="border-green-600"
              />
              
              <StatusCard 
                name="Compressor C-201"
                value="3.21"
                trend="+0.04"
                status="OK"
                borderColor="border-green-600"
              />
              
              <StatusCard 
                name="Motor M-301"
                value="94.2"
                trend="+5.1"
                status="ALARM"
                borderColor="border-red-600"
              />
              
              <StatusCard 
                name="Valve V-102"
                value="CLOSED"
                trend="—"
                status="ALARM"
                borderColor="border-red-600"
              />
              
              <StatusCard 
                name="Conveyor CV-401"
                value="0.00"
                trend="—"
                status="MAINT"
                borderColor="border-orange-500"
              />
              
              <StatusCard 
                name="Mixer MX-501"
                value="240"
                trend="—"
                status="IDLE"
                borderColor="border-gray-500"
              />
              
              <StatusCard 
                name="Heater H-201"
                value="62.0"
                trend="-1.2"
                status="WARN"
                borderColor="border-orange-500"
              />
              
              <StatusCard 
                name="Tank T-101"
                value="72"
                trend="+2"
                status="OK"
                borderColor="border-green-600"
              />
              
              <StatusCard 
                name="Tank T-102"
                value="41"
                trend="-1"
                status="OK"
                borderColor="border-green-600"
              />
              
              <StatusCard 
                name="Sensor T-405"
                value="38.5"
                trend="+0.4"
                status="OK"
                borderColor="border-green-600"
              />
              
              <StatusCard 
                name="Sensor F-902"
                value="180"
                trend="+3"
                status="OK"
                borderColor="border-green-600"
              />
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-gray-200 py-4 px-6 text-gray-500 text-sm">
            Connection: OK · Items: 12 · Critical: 2 · Warning: 2
          </footer>
        </div>
      );
    };

    const StatusCard = ({ name, value, trend, status, borderColor }) => {
      const getStatusBgColor = () => {
        switch(status) {
          case 'OK': return 'bg-statusGreen';
          case 'ALARM': return 'bg-statusRed';
          case 'MAINT': return 'bg-statusOrange';
          case 'IDLE': return 'bg-statusGray';
          case 'WARN': return 'bg-statusOrange';
          default: return 'bg-statusGreen';
        }
      };

      const getStatusTextColor = () => {
        return 'text-white';
      };

      return (
        <div className={`bg-white rounded-lg border-l-4 ${borderColor} shadow-sm p-4`}>
          <div className="text-gray-500 text-sm mb-2">{name}</div>
          <div className="text-4xl text-gray-800 font-bold mb-2">{value}</div>
          <div className="text-gray-500 text-xs mb-2">trend: {trend}</div>
          <div>
            <span className={`px-3 py-1 rounded text-xs font-medium ${getStatusBgColor()} ${getStatusTextColor()}`}>
              {status}
            </span>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
