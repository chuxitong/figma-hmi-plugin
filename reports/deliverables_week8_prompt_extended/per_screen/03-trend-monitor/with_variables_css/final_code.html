<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Data Time Trend Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col bg-gray-50">
                    <Header />
                    <div className="flex-grow p-4">
                        <MetricCards />
                        <TrendChart />
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#13314f] text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-semibold">Process Data Time Trend Monitor</h1>
                            <p className="text-sm text-gray-300 mt-1">Trend Window: 60 min · Sample: 1 s</p>
                        </div>
                        <div className="bg-[#263566] px-4 py-2 rounded-md text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const MetricCards = () => {
            return (
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <MetricCard 
                        title="Temperature"
                        value="72.4"
                        change="+1.2 за смеху"
                        color="green"
                    />
                    <MetricCard 
                        title="Pressure"
                        value="3.21"
                        change="+0.04 за смеху"
                        color="green"
                    />
                    <MetricCard 
                        title="Flow"
                        value="184"
                        change="-3 за смеху"
                        color="orange"
                    />
                    <MetricCard 
                        title="Setpoint dev"
                        value="1.8"
                        change="+0.2 за смеху"
                        color="green"
                    />
                </div>
            );
        };

        const MetricCard = ({ title, value, change, color }) => {
            const leftBorderColor = color === 'green' ? 'border-green-600' : color === 'orange' ? 'border-orange-500' : 'border-gray-400';
            
            return (
                <div className={`bg-white rounded-md border-l-4 ${leftBorderColor} p-4 shadow-sm`}>
                    <div className="text-sm text-gray-500">{title}</div>
                    <div className="text-4xl font-bold text-gray-800 mt-1">{value}</div>
                    <div className="text-xs text-gray-600 mt-2">
                        <span className="mr-1">▲</span> {change}
                    </div>
                </div>
            );
        };

        const TrendChart = () => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-4 shadow-sm">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-lg font-semibold text-gray-800">Trend window — 14:00 to 15:00</h2>
                        <div className="flex items-center space-x-4">
                            <div className="flex items-center">
                                <div className="w-4 h-2 bg-green-600 mr-2"></div>
                                <span className="text-xs text-gray-600">Temp (°C)</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-2 bg-orange-500 mr-2"></div>
                                <span className="text-xs text-gray-600">Pressure (bar)</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-2 bg-red-600 mr-2"></div>
                                <span className="text-xs text-gray-600">Flow (L/min) band: ±2σ</span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="w-full h-64 relative border border-gray-100 bg-white">
                        {/* Y-axis labels */}
                        <div className="absolute left-0 top-0 h-full flex flex-col justify-between text-xs text-gray-500 py-2">
                            <span>100</span>
                            <span>90</span>
                            <span>80</span>
                            <span>70</span>
                            <span>60</span>
                            <span>50</span>
                            <span>40</span>
                        </div>
                        
                        {/* Grid lines */}
                        <div className="ml-8 h-full w-full grid grid-rows-6">
                            {[0, 1, 2, 3, 4, 5].map((row) => (
                                <div key={row} className="border-b border-gray-200 w-full"></div>
                            ))}
                        </div>
                        
                        {/* Chart lines */}
                        <svg className="absolute inset-0 w-full h-full" viewBox="0 0 1200 300" preserveAspectRatio="none">
                            {/* Temperature line (green) */}
                            <path 
                                d="M0,90 L100,95 L200,100 L300,75 L400,80 L500,70 L600,85 L700,90 L800,75 L900,80 L1000,65 L1100,80 L1200,85" 
                                stroke="#16a34a" 
                                strokeWidth="2" 
                                fill="none" 
                            />
                            
                            {/* Pressure line (orange) */}
                            <path 
                                d="M0,150 L100,140 L200,160 L300,150 L400,170 L500,140 L600,150 L700,140 L800,155 L900,130 L1000,145 L1100,125 L1200,140" 
                                stroke="#f97316" 
                                strokeWidth="2" 
                                fill="none" 
                            />
                            
                            {/* Flow line (red) */}
                            <path 
                                d="M0,180 L100,190 L200,170 L300,175 L400,180 L500,160 L600,175 L700,185 L800,170 L900,180 L1000,160 L1100,175 L1200,180" 
                                stroke="#dc2626" 
                                strokeWidth="2" 
                                fill="none" 
                            />
                        </svg>
                        
                        {/* Time labels */}
                        <div className="absolute bottom-0 left-8 right-4 flex justify-between text-xs text-gray-500 pb-2">
                            <span>14:00</span>
                            <span>14:05</span>
                            <span>14:10</span>
                            <span>14:15</span>
                            <span>14:20</span>
                            <span>14:25</span>
                            <span>14:30</span>
                            <span>14:35</span>
                            <span>14:40</span>
                            <span>14:45</span>
                            <span>14:50</span>
                            <span>14:55</span>
                            <span>14:60</span>
                        </div>
                    </div>
                    
                    <div className="mt-4 bg-gray-50 rounded-md border border-gray-200 p-3 text-sm text-gray-700">
                        <div className="flex justify-between">
                            <span>14:22 — Flow rate deviation > 12 % (FT-401)</span>
                            <span>Operator: A. Petrov</span>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="p-4 bg-gray-50 text-xs text-gray-500 border-t">
                    <div>Connection: OK · Latency: 18 ms · Logging: enabled · Export to CSV available via toolbar</div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
