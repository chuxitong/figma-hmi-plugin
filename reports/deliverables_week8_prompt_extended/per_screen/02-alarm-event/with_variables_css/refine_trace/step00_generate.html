<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-semibold">Alarms & Events Monitor</h1>
                                <p className="text-[#899bb8] text-sm mt-1">Refinery 2 · Shift B · All sites</p>
                            </div>
                            <div className="bg-[#1e3a5c] px-4 py-2 rounded text-[#899bb8] text-sm">
                                2026-04-19 14:34:55 MSK

                        </div>
                    </div>

                    {/* Status Cards */}
                    <div className="p-6 grid grid-cols-5 gap-4">
                        <StatusCard 
                            title="Critical" 
                            count="2" 
                            subtitle="active" 
                            change="+1 за смену" 
                            borderColor="border-l-red-500" 
                            bgColor="bg-red-500"

                        <StatusCard 
                            title="Warning" 
                            count="5" 
                            subtitle="active" 
                            change="-1 за смену" 
                            borderColor="border-l-orange-500" 
                            bgColor="bg-orange-500"

                        <StatusCard 
                            title="Information" 
                            count="11" 
                            subtitle="recent" 
                            change="+3 за смену" 
                            borderColor="border-l-green-600" 
                            bgColor="bg-green-600"
                        />
                        <StatusCard 
                            title="Acknowledged" 
                            count="34" 
                            subtitle="last 24h" 
                            change="+7 за смену" 
                            borderColor="border-l-green-800" 
                            bgColor="bg-gray-800"
                        />
                        <StatusCard 
                            title="MTBA" 
                            count="1h 42m" 
                            subtitle="" 
                            change="-12m за смену" 
                            borderColor="border-l-orange-500" 
                            bgColor="bg-orange-500"
                        />
                    </div>

                    {/* Filter Section */}
                    <div className="px-6 pb-4">
                        <div className="bg-white rounded-lg shadow-sm border p-4">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-1">
                                    <span className="text-gray-600 text-sm">Severity</span>
                                    <div className="flex gap-2 ml-4">
                                        <button className="px-4 py-1 bg-red-600 text-white text-xs rounded-full font-medium">CRITICAL</button>
                                        <button className="px-4 py-1 bg-orange-500 text-white text-xs rounded-full font-medium">WARNING</button>
                                        <button className="px-4 py-1 bg-blue-600 text-white text-xs rounded-full font-medium">INFO</button>
                                    </div>
                                </div>
                                <div className="ml-auto">
                                    <div className="flex items-center gap-4">
                                        <span className="text-gray-600 text-sm">Tag / описание</span>
                                        <input 
                                            type="text" 
                                            placeholder="Введите тер или часть описания..." 
                                            className="border border-gray-300 rounded px-3 py-1 text-sm w-64"
                                        />
                                        <button className="px-6 py-1 bg-green-700 text-white text-sm rounded font-medium">ACK ALL</button>
                                        <button className="px-6 py-1 border border-gray-400 text-gray-800 text-sm rounded font-medium">Export...</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Alarm Table */}
                    <div className="px-6 pb-6">
                        <div className="bg-white rounded-lg shadow-sm border">
                            <table className="w-full">
                                <thead className="bg-gray-100">
                                    <tr>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Severity</th>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Time</th>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Tag</th>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Description</th>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Value</th>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Source</th>
                                        <th className="text-left px-4 py-3 text-sm font-medium text-gray-700">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <AlarmRow 
                                        severity="CRITICAL"
                                        severityColor="bg-red-600"
                                        time="14:31:42"
                                        tag="TT-301"
                                        description="Motor temperature exceeds high-high limit"
                                        value="94.2"
                                        unit="°C"
                                        source="Refinery2/U2/M-301"
                                    />

                                        severity="CRITICAL"
                                        severityColor="bg-red-600"
                                        time="14:28:15"
                                        tag="PT-102"
                                        description="Discharge pressure too high"
                                        value="5.8"
                                        unit="bar"
                                        source="Refinery2/U1/P-102"
                                    />
                                    <AlarmRow 
                                        severity="WARNING"
                                        severityColor="bg-orange-500"
                                        time="14:22:10"
                                        tag="FT-401"
                                        description="Flow rate deviation > 12 %"
                                        value="23.1"
                                        unit="m³/h"
                                        source="Refinery2/U4/F-401"
                                    />
                                    <AlarmRow 
                                        severity="WARNING"
                                        severityColor="bg-orange-500"
                                        time="14:15:30"
                                        tag="CT-502"
                                        description="Cooling water temperature rising"
                                        value="38.5"
                                        unit="°C"
                                        source="Utilities/CW-502"
                                    />
                                    <AlarmRow 
                                        severity="WARNING"
                                        severityColor="bg-orange-500"
                                        time="14:09:54"
                                        tag="LT-301"
                                        description="Tank level above setpoint"
                                        value="88.4"
                                        unit="%"
                                        source="Refinery2/U2/T-301"
                                    />
                                    <AlarmRow 
                                        severity="INFO"
                                        severityColor="bg-blue-600"
                                        time="14:05:18"
                                        tag="PDT-201"
                                        description="Filter differential pressure"
                                        value="0.8"
                                        unit="bar"
                                        source="Refinery2/U2/F-201"
                                    />
                                    <AlarmRow 
                                        severity="INFO"
                                        severityColor="bg-blue-600"
                                        time="14:01:09"
                                        tag="FT-902"
                                        description="Flow within tolerance — restored"
                                        value="180"
                                        unit="m³/h"
                                        source="Refinery2/U9/F-902"
                                    />
                                    <AlarmRow 
                                        severity="INFO"
                                        severityColor="bg-blue-600"
                                        time="13:54:22"
                                        tag="CT-101"
                                        description="Communication restored"
                                        value="—"
                                        unit=""
                                        source="Bus/CT-101"
                                    />
                                </tbody>
                            </table>
                            <div className="p-4 border-t">
                                <div className="text-xs text-gray-500">
                                    Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StatusCard = ({ title, count, subtitle, change, borderColor, bgColor }) => {
            return (
                <div className={`bg-white rounded-lg border ${borderColor} p-4`}>
                    <div className="text-gray-500 text-sm mb-1">{title}</div>
                    <div className="text-3xl font-bold text-gray-900">{count}</div>
                    <div className="text-gray-500 text-xs mt-1">{subtitle}</div>
                    <div className="text-gray-600 text-xs mt-1">{change}</div>
                </div>
            );
        };

        const AlarmRow = ({ severity, severityColor, time, tag, description, value, unit, source }) => {
            return (
                <tr className="border-b border-gray-100 hover:bg-gray-50">
                    <td className="px-4 py-3">
                        <span className={`${severityColor} text-white text-xs px-3 py-1 rounded`}>
                            {severity}
                        </span>
                    </td>
                    <td className="px-4 py-3 text-sm text-gray-700">{time}</td>
                    <td className="px-4 py-3 text-sm font-medium text-gray-900">{tag}</td>
                    <td className="px-4 py-3 text-sm text-gray-700">{description}</td>
                    <td className="px-4 py-3 text-sm text-gray-700">
                        <span className="font-medium">{value}</span> {unit}
                    </td>
                    <td className="px-4 py-3 text-sm text-gray-500">{source}</td>
                    <td className="px-4 py-3">
                        <div className="flex gap-2">
                            <button className="px-4 py-1 border border-gray-400 text-gray-800 text-xs rounded hover:bg-gray-50">ACK</button>
                            <button className="px-4 py-1 border border-gray-400 text-gray-800 text-xs rounded hover:bg-gray-50">View</button>
                        </div>
                    </td>
                </tr>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
