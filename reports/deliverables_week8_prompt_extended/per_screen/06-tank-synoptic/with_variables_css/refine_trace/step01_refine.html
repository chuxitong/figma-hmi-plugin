<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const TankStatus = ({ tankId, percentage, status }) => {
            const getStatusColor = (status) => {
                switch(status) {
                    case 'OK': return 'bg-green-700 text-white';
                    case 'WARN': return 'bg-orange-500 text-white';
                    case 'ALARM': return 'bg-red-700 text-white';
                    default: return 'bg-gray-500 text-white';
                }
            };

            const getFillColor = (percentage, status) => {
                if (status === 'ALARM') return 'bg-red-600';
                if (status === 'WARN') return 'bg-orange-500';
                return 'bg-green-700';
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative mb-2 w-24 h-44 border-2 border-gray-500 rounded">
                        <div className="absolute bottom-0 w-full">
                            <div 
                                className={`w-full h-${percentage} bg-green-700`}
                                style={{ height: `${percentage}%`, backgroundColor: status === 'ALARM' ? '#dc2626' : status === 'WARN' ? '#f97316' : '#16a34a' }}
                            ></div>
                        </div>
                        <div className="absolute top-2 right-0 text-gray-600 text-sm">
                            {percentage}%
                        </div>
                    </div>
                    <div className="text-center mb-2">
                        <div className="font-semibold text-gray-800">{tankId}</div>
                    </div>
                    <div className={`px-4 py-0.5 rounded text-xs ${getStatusColor(status)}`}>
                        {status}
                    </div>
                </div>
            );
        };

        const App = () => {
            const tanks = [
                { id: 'T-101', percentage: 72, status: 'OK' },
                { id: 'T-102', percentage: 41, status: 'OK' },
                { id: 'T-103', percentage: 88, status: 'WARN' },
                { id: 'T-104', percentage: 12, status: 'ALARM' },
                { id: 'T-201', percentage: 64, status: 'OK' },
                { id: 'T-202', percentage: 95, status: 'ALARM' },
                { id: 'T-203', percentage: 33, status: 'OK' },
                { id: 'T-204', percentage: 58, status: 'OK' },
                { id: 'T-301', percentage: 47, status: 'OK' },
                { id: 'T-302', percentage: 22, status: 'WARN' }
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-slate-900 text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <i className="fas fa-water text-xl"></i>
                                <div>
                                    <h1 className="text-xl font-semibold">Tank Farm Synoptic</h1>
                                    <p className="text-sm text-gray-300">Process Gallery 2 - Tank yard A - 10 tanks</p>
                                </div>
                            </div>
                            <div className="bg-slate-800 px-4 py-2 rounded text-sm text-gray-300">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="p-6">
                        <div className="bg-white rounded-lg border border-gray-200 p-6">
                            <h2 className="text-lg font-semibold text-gray-800 mb-6">Levels and connections</h2>
                            
                            {/* Tank Grid */}
                            <div className="grid grid-cols-5 gap-8 mb-8">
                                {tanks.map((tank) => (
                                    <TankStatus 
                                        key={tank.id}
                                        tankId={tank.id}
                                        percentage={tank.percentage}
                                        status={tank.status}
                                    />
                                ))}
                            </div>

                            {/* Connection Line */}
                            <div className="w-full h-4 bg-gray-400 rounded mb-8"></div>

                            {/* Status Legend */}
                            <div className="border-t pt-6">
                                <h3 className="text-md font-semibold text-gray-800 mb-4">Status legend</h3>
                                <div className="flex items-center space-x-6 mb-4">
                                    <div className="flex items-center space-x-2">
                                        <div className="px-4 py-1 bg-green-700 text-white text-xs rounded">OK</div>
                                        <span className="text-sm text-gray-600">в норме</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <div className="px-4 py-1 bg-orange-500 text-white text-xs rounded">WARN</div>
                                        <span className="text-sm text-gray-600">отключение, нужно вмешательство</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <div className="px-4 py-1 bg-red-700 text-white text-xs rounded">ALARM</div>
                                        <span className="text-sm text-gray-600">критическое отключение, требуется ACK</span>
                                    </div>
                                </div>
                                <p className="text-xs text-gray-500">
                                    Сообщение закодировано тремя независимыми признаками: цвет state-fill, текстовый белый state-badge, форма state-shape.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="px-6 py-4 border-t bg-gray-50">
                        <div className="text-sm text-gray-500">
                            Connection: OK - Tanks online: 10/10 - Critical: 2 - Warning: 2
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
