<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <main className="p-6">
                        <div className="bg-white rounded-lg border border-gray-200 p-6 mb-6">
                            <h2 className="text-lg font-semibold text-gray-800 mb-6">Levels and connections</h2>
                            <TankGrid />
                        </div>
                        <div className="bg-white rounded-lg border border-gray-200 p-6">
                            <h2 className="text-lg font-semibold text-gray-800 mb-4">Status legend</h2>
                            <div className="flex items-center space-x-6">
                                <div className="flex items-center">
                                    <span className="bg-green-600 text-white px-4 py-0.5 text-sm rounded-sm mr-2">OK</span>
                                    <span className="text-sm text-gray-600">в норме</span>
                                </div>
                                <div className="flex items-center">
                                    <span className="bg-orange-500 text-white px-4 py-0.5 text-sm rounded-sm mr-2">WARN</span>
                                    <span className="text-sm text-gray-600">отключение, нужно вмешательство</span>
                                </div>
                                <div className="flex items-center">
                                    <span className="bg-red-600 text-white px-4 py-0.5 text-sm rounded-sm mr-2">ALARM</span>
                                    <span className="text-sm text-gray-600">критическое отключение, требуется ACK</span>
                                </div>
                            </div>
                            <p className="mt-6 text-xs text-gray-500">
                                Сообщение закодировано терма независимыми признаками: цвет state-fill, текстовая белёж state-badge, форма state-shape.
                            </p>
                        </div>
                    </main>
                    <footer className="bg-gray-50 border-t border-gray-200 p-4">
                        <div className="container mx-auto">
                            <p className="text-xs text-gray-500">
                                Connection: OK - Tanks online: 10/10 - Critical: 2 - Warning: 2
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        function Header() {
            return (
                <header className="bg-[#0f3a5e] text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold flex items-center">
                                <i className="fas fa-tint mr-2"></i> Tank Farm Synoptic
                            </h1>
                            <p className="text-sm text-gray-300 mt-1">Facility 2 - Tank yard A - 10 tanks</p>
                        </div>
                        <div>
                            <p className="text-sm bg-[#1c4a7b] px-4 py-2 rounded-md">
                                2026-04-19 14:32:07 MSK
                            </p>
                        </div>
                    </div>
                </header>
            );
        }

        function TankGrid() {
            const tanks = [
                { id: 'T-101', level: 72, status: 'OK', color: 'bg-green-600' },
                { id: 'T-102', level: 41, status: 'OK', color: 'bg-green-600' },
                { id: 'T-103', level: 88, status: 'WARN', color: 'bg-orange-500' },
                { id: 'T-104', level: 12, status: 'ALARM', color: 'bg-red-600' },
                { id: 'T-201', level: 64, status: 'OK', color: 'bg-green-600' },
                { id: 'T-202', level: 95, status: 'ALARM', color: 'bg-red-600' },
                { id: 'T-203', level: 33, status: 'OK', color: 'bg-green-600' },
                { id: 'T-204', level: 58, status: 'OK', color: 'bg-green-600' },
                { id: 'T-301', level: 47, status: 'OK', color: 'bg-green-600' },
                { id: 'T-302', level: 22, status: 'WARN', color: 'bg-orange-500' }
            ];

            return (
                <div className="grid grid-cols-5 gap-4">
                    {tanks.map((tank) => (
                        <TankWidget key={tank.id} tank={tank} />
                    ))}
                </div>
            );
        }

        function TankWidget({ tank }) {
            return (
                <div className="flex flex-col">
                    <div className="relative">
                        <div className="w-full h-40 border-2 border-gray-300 rounded-sm bg-gray-100">
                            <div 
                                className={`absolute bottom-0 w-full ${tank.color}`} 
                                style={{ height: `${tank.level}%` }}
                            ></div>
                        </div>
                        <div className="absolute top-1/2 right-0 transform -translate-y-1/2 mr-2">
                            <span className="text-xs text-gray-600">{tank.level}%</span>
                        </div>
                    </div>
                    <div className="text-center mt-2 mb-2">
                        <p className="text-sm font-bold text-gray-800">{tank.id}</p>
                    </div>
                    <div className="flex justify-center">
                        <span className={`text-xs text-white px-4 py-0.5 rounded-sm ${
                            tank.status === 'OK' ? 'bg-green-600' : 
                            tank.status === 'WARN' ? 'bg-orange-500' : 'bg-red-600'
                        }`}>
                            {tank.status}
                        </span>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
