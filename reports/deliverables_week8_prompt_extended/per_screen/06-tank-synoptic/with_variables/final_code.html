<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Farm Synoptic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="container mx-auto p-6">
                        <TankLevels />
                        <StatusLegend />
                    </div>
                    <Footer />
                </div>
            );
        }

        function Header() {
            return (
                <header className="bg-[#0a2847] text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold">Tank Farm Synoptic</h1>
                            <p className="text-sm text-gray-300">Facility 2 - Tank yard A - 10 tanks</p>
                        </div>
                        <div className="bg-[#1a2e46] rounded-md px-4 py-2 text-sm text-gray-300">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        }

        function TankIndicator({ id, percentage, status }) {
            const getTankColor = () => {
                switch(status) {
                    case 'OK': return 'bg-green-600';
                    case 'WARN': return 'bg-orange-500';
                    case 'ALARM': return 'bg-red-600';
                    default: return 'bg-gray-400';
                }
            };

            const getStatusBadgeColor = () => {
                switch(status) {
                    case 'OK': return 'bg-green-700 text-white';
                    case 'WARN': return 'bg-orange-500 text-white';
                    case 'ALARM': return 'bg-red-700 text-white';
                    default: return 'bg-gray-500 text-white';
                }
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative w-24 h-40 border-2 border-gray-400 bg-gray-100">
                        <div 
                            className={`absolute bottom-0 w-full ${getTankColor()}`} 
                            style={{height: `${100 - percentage}%`}}
                        ></div>
                        <div className="absolute right-0 top-1/2 transform -translate-y-1/2 text-xs text-gray-600">
                            <div className="border-l-2 border-gray-400 w-6 h-12"></div>
                            <div className="mt-1">{percentage}%</div>
                        </div>
                    </div>
                    <div className="mt-2 text-sm font-bold text-gray-700">{id}</div>
                    <div className="mt-1">
                        <span className={`px-4 py-0.5 text-xs rounded-sm ${getStatusBadgeColor()}`}>
                            {status}
                        </span>
                    </div>
                </div>
            );
        }

        function TankLevels() {
            const tanks = [
                { id: 'T-101', percentage: 72, status: 'OK' },
                { id: 'T-102', percentage: 41, status: 'OK' },
                { id: 'T-103', percentage: 88, status: 'WARN' },
                { id: 'T-104', percentage: 12, status: 'ALARM' },
                { id: 'T-201', percentage: 64, status: 'OK' },
                { id: 'T-202', percentage: 95, status: 'ALARM' },
                { id: 'T-203', percentage: 33, status: 'OK' },
                { id: 'T-204', percentage: 58, status: 'OK' },
                { id: 'T-301', percentage: 47, status: 'OK' },
                { id: 'T-302', percentage: 22, status: 'WARN' }
            ];

            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6 mb-6">
                    <h2 className="text-lg font-semibold text-gray-800 mb-8">Levels and connections</h2>
                    <div className="grid grid-cols-5 gap-8">
                        {tanks.map((tank) => (
                            <TankIndicator 
                                key={tank.id} 
                                id={tank.id} 
                                percentage={tank.percentage} 
                                status={tank.status} 
                            />
                        ))}
                    </div>
                    <div className="mt-4 h-2 bg-gray-400 rounded-full"></div>
                </div>
            );
        }

        function StatusLegend() {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h3 className="text-md font-semibold text-gray-800 mb-4">Status legend</h3>
                    <div className="flex items-center space-x-6">
                        <div className="flex items-center">
                            <span className="bg-green-700 text-white px-4 py-0.5 text-xs rounded mr-2">OK</span>
                            <span className="text-xs text-gray-600">в норме</span>
                        </div>
                        <div className="flex items-center">
                            <span className="bg-orange-500 text-white px-4 py-0.5 text-xs rounded mr-2">WARN</span>
                            <span className="text-xs text-gray-600">отключение, нужно вмешательство</span>
                        </div>
                        <div className="flex items-center">
                            <span className="bg-red-700 text-white px-4 py-0.5 text-xs rounded mr-2">ALARM</span>
                            <span className="text-xs text-gray-600">критическое отключение, требуется ACK</span>
                        </div>
                    </div>
                    <p className="text-xs text-gray-500 mt-4">
                        Сообщение закодировано терма независимыми признаками: цвет state-fill, текстовая белёж state-badge, форма state-shape.
                    </p>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="py-4 px-6 border-t border-gray-200">
                    <div className="container mx-auto">
                        <p className="text-xs text-gray-500">
                            Connection: OK - Tanks online: 10/10 - Critical: 2 - Warning: 2
                        </p>
                    </div>
                </footer>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
