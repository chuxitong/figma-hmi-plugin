<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Farm Synoptic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="container mx-auto py-6 px-4">
                        <TankLevels />
                        <StatusLegend />
                    </div>
                    <Footer />
                </div>
            );
        }

        function Header() {
            return (
                <header className="bg-[#0a2847] text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold">Tank Farm Synoptic</h1>
                            <p className="text-sm text-gray-300">Facility 2 - Tank yard A - 10 tanks</p>
                        </div>
                        <div className="bg-[#1e3a5c] rounded-md px-4 py-2 text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        }

        function TankLevelIndicator({ id, percentage, status }) {
            const getStatusColor = () => {
                switch(status) {
                    case 'OK': return 'bg-green-700';
                    case 'WARN': return 'bg-orange-500';
                    case 'ALARM': return 'bg-red-700';
                    default: return 'bg-gray-300';
                }
            };

            const getBadgeColor = () => {
                switch(status) {
                    case 'OK': return 'bg-green-700 text-white';
                    case 'WARN': return 'bg-orange-500 text-white';
                    case 'ALARM': return 'bg-red-700 text-white';
                    default: return 'bg-gray-500 text-white';
                }
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative w-24 h-44 border-2 border-gray-400 bg-gray-100">
                        <div 
                            className={`absolute w-full bottom-0`} 
                            style={{height: `${percentage}%`, backgroundColor: status === 'OK' ? '#22c55e' : status === 'WARN' ? '#f97316' : '#ef4444`}}
                        ></div>
                        <div className="absolute top-1/2 transform -translate-y-1/2 w-16 h-0.5 bg-gray-400" style={{left: '75%'}}></div>
                        <div className="absolute top-1/2 transform -translate-y-1/2 text-xs text-gray-600" style={{right: '0', textAlign: 'right'}}>
                            {percentage}%
                        </div>
                    </div>
                    <div className="mt-2 text-sm font-bold text-gray-800">{id}</div>
                    <div className="mt-1">
                        <span className={`px-4 py-0.5 text-xs rounded-sm ${getBadgeColor()}`}>
                            {status}
                        </span>
                    </div>
                </div>
            );
        }

        function TankLevels() {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6 mb-6">
                    <h2 className="text-lg font-semibold text-gray-800 mb-6">Levels and connections</h2>
                    <div className="grid grid-cols-5 gap-8">
                        <TankLevelIndicator id="T-101" percentage={72} status="OK" />
                        <TankLevelIndicator id="T-102" percentage={41} status="OK" />
                        <TankLevelIndicator id="T-103" percentage={88} status="WARN" />
                        <TankLevelIndicator id="T-104" percentage={12} status="ALARM" />
                        <TankLevelIndicator id="T-201" percentage={64} status="OK" />
                        <TankLevelIndicator id="T-202" percentage={95} status="ALARM" />
                        <TankLevelIndicator id="T-203" percentage={33} status="OK" />
                        <TankLevelIndicator id="T-204" percentage={58} status="OK" />
                        <TankLevelIndicator id="T-301" percentage={47} status="OK" />
                        <TankLevelIndicator id="T-302" percentage={22} status="WARN" />
                    </div>
                </div>
            );
        }

        function StatusLegend() {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h3 className="text-md font-semibold text-gray-800 mb-4">Status legend</h3>
                    <div className="flex items-center space-x-6">
                        <div className="flex items-center">
                            <span className="bg-green-700 text-white px-4 py-0.5 text-xs rounded-sm mr-2">OK</span>
                            <span className="text-xs text-gray-600">в норме</span>
                        </div>
                        <div className="flex items-center">
                            <span className="bg-orange-500 text-white px-4 py-0.5 text-xs rounded-sm mr-2">WARN</span>
                            <span className="text-xs text-gray-600">отключение, нужно вмешательство</span>
                        </div>
                        <div className="flex items-center">
                            <span className="bg-red-700 text-white px-4 py-0.5 text-xs rounded-sm mr-2">ALARM</span>
                            <span className="text-xs text-gray-600">критическое отключение, требуется ACK</span>
                        </div>
                    </div>
                    <p className="text-xs text-gray-500 mt-4">
                        Сообщение закодировано терма независимыми признаками: цвет state-fill, текстовая белёж state-badge, форма state-shape.
                    </p>
                </div>
            );
        }

        function Footer() {
            return (
                <footer className="py-4 px-6 border-t border-gray-200">
                    <div className="container mx-auto">
                        <p className="text-xs text-gray-500">
                            Connection: OK - Tanks online: 10/10 - Critical: 2 - Warning: 2
                        </p>
                    </div>
                </footer>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
