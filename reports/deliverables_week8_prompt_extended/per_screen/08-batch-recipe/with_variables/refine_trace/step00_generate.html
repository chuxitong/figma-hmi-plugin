<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Recipe Management</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow p-6 bg-[#f3f5f8]">
                        <div className="flex gap-6">
                            <div className="w-2/3 bg-white rounded-lg border border-gray-300 p-6">
                                <StepsTable />
                            </div>
                            <div className="w-1/3">
                                <LiveParameters />
                            </div>
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#13314f] text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center space-x-2">
                            <div className="bg-[#45a29e] rounded-full p-2">
                                <i className="fas fa-cog text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-semibold">Batch Recipe Management</h1>
                                <p className="text-sm text-gray-300">Recipe: R-204 · Lot 2026-017 · Batch operator: A. Petrov</p>
                            </div>
                        </div>
                        <div className="bg-[#1c4587] px-4 py-2 rounded-md text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const StepsTable = () => {
            const steps = [
                { id: 1, step: 'Pre-heat', duration: '10 min', status: 'DONE' },
                { id: 2, step: 'Fill base', duration: '8 min', status: 'DONE' },
                { id: 3, step: 'Mix', duration: '15 min', status: 'ACTIVE' },
                { id: 4, step: 'Add catalyst', duration: '4 min', status: 'PENDING' },
                { id: 5, step: 'Hold', duration: '20 min', status: 'PENDING' },
                { id: 6, step: 'Cool down', duration: '12 min', status: 'PENDING' },
                { id: 7, step: 'Discharge', duration: '6 min', status: 'PENDING' }
            ];

            return (
                <div>
                    <h2 className="text-lg font-semibold text-gray-800 mb-4">Steps</h2>
                    <div className="overflow-x-auto">
                        <table className="w-full border-collapse">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="text-left py-2 px-4 text-sm text-gray-600 border-b">#</th>
                                    <th className="text-left py-2 px-4 text-sm text-gray-600 border-b">Step</th>
                                    <th className="text-left py-2 px-4 text-sm text-gray-600 border-b">Duration</th>
                                    <th className="text-left py-2 px-4 text-sm text-gray-600 border-b">Status</th>
                                    <th className="text-left py-2 px-4 text-sm text-gray-600 border-b">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                {steps.map((step) => (
                                    <StepRow key={step.id} step={step} />
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StepRow = ({ step }) => {
            const getStatusClass = () => {
                switch (step.status) {
                    case 'DONE':
                        return 'bg-[#2e7d32] text-white';
                    case 'ACTIVE':
                        return 'bg-[#1976d2] text-white';
                    case 'PENDING':
                        return 'bg-[#4e5b70] text-white';
                    default:
                        return 'bg-gray-500 text-white';
                }
            };

            return (
                <tr className="border-b hover:bg-gray-50">
                    <td className="py-3 px-4 text-gray-800">{step.id}</td>
                    <td className="py-3 px-4 text-gray-800 font-medium">{step.step}</td>
                    <td className="py-3 px-4 text-gray-800">{step.duration}</td>
                    <td className="py-3 px-4">
                        <span className={`px-6 py-1 rounded text-xs font-medium ${getStatusClass()}`}>
                            {step.status}
                        </span>
                    </td>
                    <td className="py-3 px-4">
                        <button className="border border-gray-400 rounded px-4 py-1 text-gray-800 hover:bg-gray-100 text-sm font-medium">
                            View
                        </button>
                    </td>
                </tr>
            );
        };

        const LiveParameters = () => {
            return (
                <div className="space-y-6">
                    <div className="bg-white rounded-lg border border-gray-300 p-6">
                        <h2 className="text-lg font-semibold text-gray-800 mb-4">Live parameters</h2>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white rounded-lg border border-gray-300 p-4">
                                <div className="text-sm text-gray-500 mb-1">Temperature</div>
                                <div className="flex items-end">
                                    <span className="text-4xl font-medium text-gray-800">65.4</span>
                                    <span className="text-2xl text-gray-600 ml-2">°C</span>
                                </div>
                                <div className="mt-2">
                                    <span className="bg-[#2e7d32] text-white text-xs px-4 py-0.5 rounded">OK</span>
                                </div>
                            </div>
                            
                            <div className="bg-white rounded-lg border border-gray-300 p-4">
                                <div className="text-sm text-gray-500 mb-1">pH</div>
                                <div className="text-4xl font-medium text-gray-800">7.1</div>
                                <div className="mt-2">
                                    <span className="bg-[#2e7d32] text-white text-xs px-4 py-0.5 rounded">OK</span>
                                </div>
                            </div>
                            
                            <div className="bg-white rounded-lg border border-gray-300 p-4">
                                <div className="text-sm text-gray-500 mb-1">RPM</div>
                                <div className="text-4xl font-medium text-gray-800">240</div>
                                <div className="mt-2">
                                    <span className="bg-[#2e7d32] text-white text-xs px-4 py-0.5 rounded">OK</span>
                                </div>
                            </div>
                            
                            <div className="bg-white rounded-lg border border-gray-300 p-4">
                                <div className="text-sm text-gray-500 mb-1">Pressure</div>
                                <div className="flex items-end">
                                    <span className="text-4xl font-medium text-gray-800">1.18</span>
                                    <span className="text-2xl text-gray-600 ml-2">bar</span>
                                </div>
                                <div className="mt-2">
                                    <span className="bg-[#e65100] text-white text-xs px-4 py-0.5 rounded">WARN</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="bg-white rounded-lg border border-gray-300 p-6">
                        <h2 className="text-lg font-semibold text-gray-800 mb-4">Timeline</h2>
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center">
                                <div className="bg-green-700 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    1
                                </div>
                                <span className="ml-2 text-xs text-gray-500">10m</span>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-green-700 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    2
                                </div>
                                <span className="ml-2 text-xs text-gray-500">8m</span>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    3
                                </div>
                                <span className="ml-2 text-xs text-gray-500">15m</span>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-gray-500 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    4
                                </div>
                                <span className="ml-2 text-xs text-gray-500">4m</span>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-gray-500 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    5
                                </div>
                                <span className="ml-2 text-xs text-gray-500">20m</span>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-gray-500 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    6
                                </div>
                                <span className="ml-2 text-xs text-gray-500">12m</span>
                            </div>
                            <div className="flex items-center">
                                <div className="bg-gray-500 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">
                                    7
                                </div>
                                <span className="ml-2 text-xs text-gray-500">6m</span>
                            </div>
                        </div>
                        
                        <div className="flex space-x-2 mt-12">
                            <button className="bg-[#2e7d32] text-white px-8 py-3 rounded-md text-lg font-bold hover:bg-[#1b5e20]">
                                RESUME
                            </button>
                            <button className="bg-[#e65100] text-white px-8 py-3 rounded-md text-lg font-bold hover:bg-[#c62828]">
                                HOLD
                            </button>
                            <button className="bg-[#dc3545] text-white px-8 py-3 rounded-md text-lg font-bold hover:bg-[#cc2929]">
                                ABORT
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-3 px-6 border-t">
                    <div className="text-xs text-gray-500">
                        Recipe R-204 · Step 3 of 7 ACTIVE · Compliance: ANSI/ISA-101.01
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
