<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Recipe Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Header />
                    <div className="flex flex-1 p-6 gap-6">
                        <StepsPanel />
                        <div className="w-1/3 space-y-6">
                            <LiveParameters />
                            <Timeline />
                        </div>
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#13314f] text-white px-6 py-4">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <i className="fas fa-industry text-white text-xl"></i>
                            <div>
                                <h1 className="text-xl font-semibold">Batch Recipe Management</h1>
                                <p className="text-sm text-gray-300">Recipe: R-204 · Lot 2026-017 · Batch operator: A. Petrov</p>
                            </div>
                        </div>
                        <div className="bg-[#1d4e8c] px-4 py-2 rounded-md text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const StepsPanel = () => {
            const steps = [
                { id: 1, name: "Pre-heat", duration: "10 min", status: "DONE" },
                { id: 2, name: "Fill base", duration: "8 min", status: "DONE" },
                { id: 3, name: "Mix", duration: "15 min", status: "ACTIVE" },
                { id: 4, name: "Add catalyst", duration: "4 min", status: "PENDING" },
                { id: 5, name: "Hold", duration: "20 min", status: "PENDING" },
                { id: 6, name: "Cool down", duration: "12 min", status: "PENDING" },
                { id: 7, name: "Discharge", duration: "6 min", status: "PENDING" }
            ];

            return (
                <div className="w-2/3 bg-white rounded-lg border border-gray-200 p-6">
                    <h2 className="text-lg font-semibold text-gray-800 mb-4">Steps</h2>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead className="bg-gray-100">
                                <tr>
                                    <th className="text-left py-2 px-4 border-b text-sm font-medium text-gray-700">#</th>
                                    <th className="text-left py-2 px-4 border-b text-sm font-medium text-gray-700">Step</th>
                                    <th className="text-left py-2 px-4 border-b text-sm font-medium text-gray-700">Duration</th>
                                    <th className="text-left py-2 px-4 border-b text-sm font-medium text-gray-700">Status</th>
                                    <th className="text-left py-2 px-4 border-b text-sm font-medium text-gray-700">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                {steps.map((step) => (
                                    <tr key={step.id} className="border-b hover:bg-gray-50">
                                        <td className="py-3 px-4 text-sm text-gray-700">{step.id}</td>
                                        <td className="py-3 px-4 text-sm font-medium text-gray-800">{step.name}</td>
                                        <td className="py-3 px-4 text-sm text-gray-700">{step.duration}</td>
                                        <td className="py-3 px-4">
                                            <span className={`inline-block px-6 py-1 text-white text-xs font-medium rounded ${
                                                step.status === "DONE" ? "bg-green-700" : 
                                                step.status === "ACTIVE" ? "bg-blue-600" : "bg-gray-500"
                                            }`}>
                                                {step.status}
                                            </span>
                                        </td>
                                        <td className="py-3 px-4">
                                            <button className="border border-gray-400 text-gray-700 px-6 py-1 rounded hover:bg-gray-50 text-sm font-medium">
                                                View
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const LiveParameters = () => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h2 className="text-lg font-semibold text-gray-800 mb-6">Live parameters</h2>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="border rounded-lg p-4">
                            <div className="text-sm text-gray-500 mb-1">Temperature</div>
                            <div className="flex items-baseline">
                                <span className="text-4xl font-medium text-gray-800">65.4</span>
                                <span className="text-2xl text-gray-600 ml-2">°C</span>
                            </div>
                            <div className="mt-2">
                                <span className="bg-green-700 text-white text-xs px-4 py-0.5 rounded">OK</span>
                            </div>
                        </div>
                        
                        <div className="border rounded-lg p-4">
                            <div className="text-sm text-gray-500 mb-1">pH</div>
                            <div className="text-4xl font-medium text-gray-800">7.1</div>
                            <div className="mt-2">
                                <span className="bg-green-700 text-white text-xs px-4 py-0.5 rounded">OK</span>
                            </div>
                        </div>
                        
                        <div className="border rounded-lg p-4">
                            <div className="text-sm text-gray-500 mb-1">RPM</div>
                            <div className="text-4xl font-medium text-gray-800">240</div>
                            <div className="mt-2">
                                <span className="bg-green-700 text-white text-xs px-4 py-0.5 rounded">OK</span>
                            </div>
                        </div>
                        
                        <div className="border rounded-lg p-4">
                            <div className="text-sm text-gray-500 mb-1">Pressure</div>
                            <div className="flex items-baseline">
                                <span className="text-4xl font-medium text-gray-800">1.18</span>
                                <span className="text-2xl text-gray-600 ml-2">bar</span>
                            </div>
                            <div className="mt-2">
                                <span className="bg-orange-500 text-white text-xs px-4 py-0.5 rounded">WARN</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Timeline = () => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <h2 className="text-lg font-semibold text-gray-800 mb-6">Timeline</h2>
                    
                    <div className="flex justify-between items-center mb-8 relative">
                        <div className="absolute top-0 left-0 w-full h-px bg-gray-300"></div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-green-700 text-white flex items-center justify-center text-sm font-medium z-10">
                                1
                            </div>
                            <span className="text-xs text-gray-500 mt-1">10m</span>
                        </div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-green-700 text-white flex items-center justify-center text-sm font-medium z-10">
                                2
                            </div>
                            <span className="text-xs text-gray-500 mt-1">8m</span>
                        </div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-medium z-10">
                                3
                            </div>
                            <span className="text-xs text-gray-500 mt-1">15m</span>
                        </div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-gray-500 text-white flex items-center justify-center text-sm font-medium z-10">
                                4
                            </div>
                            <span className="text-xs text-gray-500 mt-1">4m</span>
                        </div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-gray-500 text-white flex items-center justify-center text-sm font-medium z-10">
                                5
                            </div>
                            <span className="text-xs text-gray-500 mt-1">20m</span>
                        </div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-gray-500 text-white flex items-center justify-center text-sm font-medium z-10">
                                6
                            </div>
                            <span className="text-xs text-gray-500 mt-1">12m</span>
                        </div>
                        
                        <div className="flex flex-col items-center">
                            <div className="w-8 h-8 rounded-full bg-gray-500 text-white flex items-center justify-center text-sm font-medium z-10">
                                7
                            </div>
                            <span className="text-xs text-gray-500 mt-1">6m</span>
                        </div>
                    </div>
                    
                    <div className="flex space-x-4 mt-16">
                        <button className="flex-1 bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-4 rounded">
                            RESUME
                        </button>
                        <button className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded">
                            HOLD
                        </button>
                        <button className="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded">
                            ABORT
                        </button>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-3 px-6 border-t">
                    <div className="text-xs text-gray-500">
                        Recipe R-204 · Step 3 of 7 ACTIVE · Compliance: ANSI/ISA-101.01
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
