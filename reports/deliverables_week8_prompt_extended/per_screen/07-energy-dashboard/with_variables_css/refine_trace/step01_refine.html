<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const MetricCard = ({ title, value, change, color = "green", icon = "triangle-up" }) => {
            return (
                <div className="bg-white rounded-lg border-l-4 border-" style={{borderLeftColor: color === "green" ? "#2e7d32" : "#f57c00"}}>
                    <div className="p-4">
                        <div className="text-xs text-gray-500 mb-1">{title}</div>
                        <div className="text-3xl font-bold text-gray-800 mb-2">{value}</div>
                        <div className="text-xs text-gray-500">
                            <span className="text-green-600">▲ {change}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const ZoneRow = ({ zone, percentage, status }) => {
            const getStatusColor = () => {
                switch (status.toLowerCase()) {
                    case 'ok': return 'bg-green-600';
                    case 'warn': return 'bg-orange-500';
                    case 'alarm': return 'bg-red-600';
                    default: return 'bg-green-600';
                }
            };

            return (
                <div className="flex items-center justify-between py-2">
                    <div className="w-16 text-sm font-medium text-gray-700">{zone}</div>
                    <div className="flex-1 mx-4">
                        <div className="w-full bg-gray-100 rounded-full h-6">
                            <div 
                                className="h-6 rounded-full bg-green-600" 
                                style={{width: `${percentage}%`}}
                            ></div>
                        </div>
                    </div>
                    <div className="w-12 text-right">
                        <span className="text-sm text-gray-600">{percentage}%</span>
                    </div>
                    <div className="ml-4 w-16">
                        <span className={`px-3 py-1 rounded text-xs text-white ${getStatusColor()}`}>
                            {status.toUpperCase()}
                        </span>
                    </div>
                </div>
            );
        };

        const App = () => {
            const zoneData = [
                { zone: 'Zone A', percentage: 62, status: 'ok' },
                { zone: 'Zone B', percentage: 48, status: 'ok' },
                { zone: 'Zone C', percentage: 81, status: 'warn' },
                { zone: 'Zone D', percentage: 35, status: 'ok' },
                { zone: 'Zone E', percentage: 90, status: 'alarm' },
                { zone: 'Zone F', percentage: 27, status: 'ok' }
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-slate-800 text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Energy Monitoring Dashboard</h1>
                                <p className="text-sm text-slate-300 mt-1">Industrial-2 - Day shift - All zones</p>
                            </div>
                            <div className="bg-slate-700 rounded-md px-4 py-2 text-sm text-slate-300">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Metrics Cards */}
                    <div className="p-6 bg-gray-50">
                        <div className="grid grid-cols-4 gap-6 mb-6">
                            <div>
                                <div className="bg-white rounded-lg border-l-4 border-green-600 p-4">
                                    <div className="text-xs text-gray-500 mb-1">Total kWh</div>
                                    <div className="text-3xl font-bold text-gray-800 mb-2">12 845</div>
                                    <div className="text-xs text-gray-500">
                                        <span className="text-green-600">▲ +340 за смену</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <div className="bg-white rounded-lg border-l-4 border-orange-500 p-4">
                                    <div className="text-xs text-gray-500 mb-1">Peak load</div>
                                    <div className="text-3xl font-bold text-gray-800 mb-2">742</div>
                                    <div className="text-xs text-gray-500">
                                        <span className="text-orange-600">▲ +18 за смену</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <div className="bg-white rounded-lg border-l-4 border-orange-500 p-4">
                                    <div className="text-xs text-gray-500 mb-1">Cost (today)</div>
                                    <div className="text-3xl font-bold text-gray-800 mb-2">€ 1 932</div>
                                    <div className="text-xs text-gray-500">
                                        <span className="text-orange-600">▲ +78 за смену</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <div className="bg-white rounded-lg border-l-4 border-green-600 p-4">
                                    <div className="text-xs text-gray-500 mb-1">Power factor</div>
                                    <div className="text-3xl font-bold text-gray-800 mb-2">0.92</div>
                                    <div className="text-xs text-gray-500">
                                        <span className="text-green-600">▲ +0.01 за смену</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Main Content Grid */}
                        <div className="grid grid-cols-2 gap-6">
                            {/* Power Consumption by Zone */}
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 className="text-lg font-semibold text-gray-800 mb-6">Power consumption by zone</h2>
                                
                                {zoneData.map((item, index) => (
                                    <ZoneRow 
                                        key={index}
                                        zone={item.zone}
                                        percentage={item.percentage}
                                        status={item.status}
                                    />
                                ))}
                            </div>

                            {/* Source Breakdown */}
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 className="text-lg font-semibold text-gray-800 mb-6">Source breakdown</h2>
                                
                                <div className="flex items-center justify-center">
                                    <div className="relative w-64 h-64">
                                        {/* Donut chart would go here - using border-radius to create pie segments */}
                                        <div className="absolute inset-0 rounded-full overflow-hidden">
                                            <div style={{
                                                position: 'absolute',
                                                width: '100%',
                                                height: '100%',
                                                background: 'conic-gradient(#2e7d32 0% 57%, #1976d2 57% 82%, #ff9800 82% 100%)',
                                                clipPath: 'circle(50% at center)'
                                            }}></div>
                                            <div style={{
                                                position: 'absolute',
                                                width: '80%',
                                                height: '80%',
                                                left: '10%',
                                                top: '10%',
                                                background: 'white',
                                                borderRadius: '50%'
                                            }}></div>
                                        </div>
                                        
                                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                                            <div className="text-4xl font-bold text-gray-800">100%</div>
                                            <div className="text-sm text-gray-500 mt-1">today</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-8 grid grid-cols-1 gap-2">
                                    <div className="flex items-center">
                                        <div className="w-4 h-4 bg-green-700 mr-2"></div>
                                        <span className="text-sm text-gray-700">Электроэнергия · 57 %</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-4 h-4 bg-orange-500 mr-2"></div>
                                        <span className="text-sm text-gray-700">Газ · 25 %</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-4 h-4 bg-blue-500 mr-2"></div>
                                        <span className="text-sm text-gray-700">Утилизация тепла · 18 %</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="bg-gray-100 border-t border-gray-200 py-4 px-6">
                        <div className="text-xs text-gray-500">
                            Connection: OK · Tariff plan: Industrial-2 · Compliance: ANSI/ISA-101.01
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
