<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f3f5f8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const MetricCard = ({ title, value, change, color = "green" }) => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-4">
                    <div className="text-sm text-gray-500 mb-1">{title}</div>
                    <div className="text-3xl font-bold text-gray-800 mb-2">{value}</div>
                    <div className="text-xs text-gray-500">
                        <span className={color === "green" ? "text-green-600" : "text-orange-500"}>
                            ▲ {change}
                        </span>
                    </div>
                </div>
            );
        };

        const ZoneRow = ({ zone, percentage, status }) => {
            const getStatusColor = () => {
                switch(status.toLowerCase()) {
                    case 'ok': return 'bg-green-600';
                    case 'warn': return 'bg-orange-500';
                    case 'alarm': return 'bg-red-600';
                    default: return 'bg-green-600';
                }
            };

            return (
                <div className="flex items-center py-2">
                    <div className="w-16 text-sm font-medium text-gray-700">{zone}</div>
                    <div className="flex-1 mx-4">
                        <div className="w-full bg-gray-100 rounded-full h-6">
                            <div 
                                className={`h-6 rounded-full ${getStatusColor()}`} 
                                style={{width: `${percentage}%`}}
                            ></div>
                        </div>
                    </div>
                    <div className="w-12 text-right">
                        <span className="text-sm text-gray-600">{percentage}%</span>
                    </div>
                    <div className="ml-4 w-16">
                        <span className={`px-3 py-1 rounded text-xs text-white ${getStatusColor()}`}>
                            {status.toUpperCase()}
                        </span>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-[#13314f] text-white px-6 py-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-bold">Energy Monitoring Dashboard</h1>
                                <p className="text-sm text-slate-300 mt-1">Industrial-2 - Day shift - All zones</p>
                            </div>
                            <div className="bg-[#2b4b73] rounded-md px-4 py-2 text-sm text-slate-300">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="p-6">
                        {/* Metrics Row */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                            <MetricCard 
                                title="Total kWh" 
                                value="12 845" 
                                change="+340 за смену" 
                                color="green" 
                            />
                            <MetricCard 
                                title="Peak load" 
                                value="742" 
                                change="+18 за смену" 
                                color="orange" 
                            />
                            <MetricCard 
                                title="Cost (today)" 
                                value="€ 1 932" 
                                change="+78 за смену" 
                                color="orange" 
                            />
                            <MetricCard 
                                title="Power factor" 
                                value="0.92" 
                                change="+0.01 за смену" 
                                color="green" 
                            />
                        </div>

                        {/* Dashboard Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Power Consumption by Zone */}
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 className="text-lg font-semibold text-gray-800 mb-6">Power consumption by zone</h2>
                                
                                <div className="space-y-4">
                                    <ZoneRow zone="Zone A" percentage={62} status="ok" />
                                    <ZoneRow zone="Zone B" percentage={48} status="ok" />
                                    <ZoneRow zone="Zone C" percentage={81} status="warn" />
                                    <ZoneRow zone="Zone D" percentage={35} status="ok" />
                                    <ZoneRow zone="Zone E" percentage={90} status="alarm" />
                                    <ZoneRow zone="Zone F" percentage={27} status="ok" />
                                </div>
                            </div>

                            {/* Source Breakdown */}
                            <div className="bg-white rounded-lg border border-gray-200 p-6">
                                <h2 className="text-lg font-semibold text-gray-800 mb-6">Source breakdown</h2>
                                
                                <div className="flex items-center justify-center">
                                    <div className="relative w-64 h-64">
                                        {/* Donut chart representation */}
                                        <svg viewBox="0 0 100 100" className="w-full h-full">
                                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#2e7d32" strokeWidth="20" strokeDasharray="226 252" strokeDashoffset="0" />
                                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#1976d2" strokeWidth="20" strokeDasharray="63 252" strokeDashoffset="-226" />
                                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#ff9800" strokeWidth="20" strokeDasharray="125 252" strokeDashoffset="-289" />
                                            <circle cx="50" cy="50" r="30" fill="white" />
                                        </svg>
                                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                                            <div className="text-4xl font-bold text-gray-800">100%</div>
                                            <div className="text-sm text-gray-500 mt-2">today</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-6 grid grid-cols-1 gap-3">
                                    <div className="flex items-center">
                                        <div className="w-4 h-4 bg-green-700 mr-2"></div>
                                        <span className="text-sm text-gray-700">Электроэнергия · 57 %</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-4 h-4 bg-orange-500 mr-2"></div>
                                        <span className="text-sm text-gray-700">Газ · 25 %</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-4 h-4 bg-blue-500 mr-2"></div>
                                        <span className="text-sm text-gray-700">Утилизация тепла · 18 %</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="bg-gray-100 border-t border-gray-200 py-4 px-6 mt-8">
                        <div className="text-xs text-gray-500">
                            Connection: OK · Tariff plan: Industrial-2 · Compliance: ANSI/ISA-101.01
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
