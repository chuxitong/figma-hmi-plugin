<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f7fa;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <main className="flex-grow p-4">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                            <MetricCard 
                                title="Total kWh" 
                                value="12 845" 
                                change="+340 за смену" 
                                borderColor="border-green-700" 
                            />
                            <MetricCard 
                                title="Peak load" 
                                value="742" 
                                change="+18 за смену" 
                                borderColor="border-orange-500" 
                            />
                            <MetricCard 
                                title="Cost (today)" 
                                value="€ 1 932" 
                                change="+78 за смену" 
                                borderColor="border-green-700" 
                            />
                            <MetricCard 
                                title="Power factor" 
                                value="0.92" 
                                change="+0.01 за смену" 
                                borderColor="border-green-700" 
                            />
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <ZoneConsumptionCard />
                            <SourceBreakdownCard />
                        </div>
                    </main>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#0f3662] text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold">Energy Monitoring Dashboard</h1>
                            <p className="text-sm text-gray-300 mt-1">Industrial-2 · Day shift · All zones</p>
                        </div>
                        <div className="bg-[#1c3859] px-4 py-2 rounded text-sm text-gray-300">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const MetricCard = ({ title, value, change, borderColor }) => {
            return (
                <div className={`bg-white rounded-md border-l-4 ${borderColor} p-4 shadow-sm`}>
                    <div className="text-xs text-gray-500">{title}</div>
                    <div className="text-3xl font-bold text-gray-800 mt-1">{value}</div>
                    <div className="text-xs text-gray-500 mt-2">
                        <span className="text-green-600">▲</span> {change}
                    </div>
                </div>
            );
        };

        const ZoneConsumptionCard = () => {
            const zones = [
                { name: 'Zone A', percentage: 62, status: 'OK', color: 'bg-green-700' },
                { name: 'Zone B', percentage: 48, status: 'OK', color: 'bg-green-700' },
                { name: 'Zone C', percentage: 81, status: 'WARN', color: 'bg-orange-500' },
                { name: 'Zone D', percentage: 35, status: 'OK', color: 'bg-green-700' },
                { name: 'Zone E', percentage: 90, status: 'ALARM', color: 'bg-red-600' },
                { name: 'Zone F', percentage: 27, status: 'OK', color: 'bg-green-700' },
            ];

            return (
                <div className="bg-white rounded-md border p-4 shadow-sm">
                    <h2 className="text-gray-800 font-bold mb-4">Power consumption by zone</h2>
                    <div className="space-y-6">
                        {zones.map((zone, index) => (
                            <div key={index} className="flex items-center">
                                <div className="w-16 text-sm font-medium text-gray-700">{zone.name}</div>
                                <div className="flex-grow mx-4 bg-gray-100 rounded-full h-6">
                                    <div 
                                        className={`${zone.color} h-6 rounded-full`} 
                                        style={{ width: `${zone.percentage}%` }}
                                    ></div>
                                </div>
                                <div className="w-16 text-right text-gray-600">{zone.percentage}%</div>
                                <div className="ml-4">
                                    <span className={`px-4 py-1 rounded text-xs font-semibold ${
                                        zone.status === 'OK' ? 'bg-green-700 text-white' : 
                                        zone.status === 'WARN' ? 'bg-orange-500 text-white' : 
                                        'bg-red-600 text-white'
                                    }`}>
                                        {zone.status}
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const SourceBreakdownCard = () => {
            return (
                <div className="bg-white rounded-md border p-4 shadow-sm">
                    <h2 className="text-gray-800 font-bold mb-4">Source breakdown</h2>
                    <div className="flex items-center justify-center">
                        <div className="relative w-64 h-64">
                            {/* This is a simplified donut chart representation */}
                            <div className="absolute inset-0 flex items-center justify-center">
                                <div className="text-3xl font-bold text-gray-800">100%</div>
                                <div className="text-sm text-gray-500 mt-2">today</div>
                            </div>
                            <div className="w-full h-full rounded-full border-[25px] border-green-700" style={{
                                background: `conic-gradient(
                                    #2e7d32 0% 57%, 
                                    #ff9800 57% 82%, 
                                    #1976d2 82% 100%
                                )`
                            }}></div>
                            <div className="absolute inset-0 flex items-center justify-center">
                                <div className="w-[90%] h-[90%] rounded-full bg-white"></div>
                            </div>
                        </div>
                        <div className="ml-8 space-y-2">
                            <div className="flex items-center">
                                <div className="w-4 h-4 bg-green-700 mr-2"></div>
                                <span className="text-sm text-gray-700">Электроэнергию · 57 %</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-4 bg-orange-500 mr-2"></div>
                                <span className="text-sm text-gray-700">Газ · 25 %</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-4 bg-blue-500 mr-2"></div>
                                <span className="text-sm text-gray-700">Утилизация тепла · 18 %</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-3 px-6 text-xs text-gray-500 border-t">
                    Connection: OK · Tariff plan: Industrial-2 · Compliance: ANSI/ISA-101.01
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
