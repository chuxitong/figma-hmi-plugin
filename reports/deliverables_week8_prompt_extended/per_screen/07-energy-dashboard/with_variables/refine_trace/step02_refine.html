<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitoring Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f5f8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <div className="flex-grow p-6 bg-slate-50">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                            <MetricCard 
                                title="Total kWh" 
                                value="12 845" 
                                change="+340 за смену" 
                                color="green"
                            />
                            <MetricCard 
                                title="Peak load" 
                                value="742" 
                                change="+18 за смену" 
                                color="orange"
                            />
                            <MetricCard 
                                title="Cost (today)" 
                                value="€ 1 932" 
                                change="+78 за смену" 
                                color="green"
                            />
                            <MetricCard 
                                title="Power factor" 
                                value="0.92" 
                                change="+0.01 за смену" 
                                color="green"
                            />
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <PowerConsumptionZones />
                            <SourceBreakdown />
                        </div>
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#13314f] text-white px-6 py-4">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-semibold">Energy Monitoring Dashboard</h1>
                            <p className="text-slate-300 text-sm mt-1">Industrial-2 - Day shift - All zones</p>
                        </div>
                        <div className="bg-slate-700 px-4 py-2 rounded-md text-sm text-slate-200">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const MetricCard = ({ title, value, change, color }) => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-4">
                    <div className="text-gray-500 text-sm mb-1">{title}</div>
                    <div className="text-4xl font-bold text-gray-800 mb-2">{value}</div>
                    <div className="text-xs text-gray-500 flex items-center">
                        <span className="mr-1">▲</span>
                        <span>{change}</span>
                    </div>
                </div>
            );
        };

        const ZoneRow = ({ zone, percentage, status }) => {
            const getStatusColor = () => {
                switch(status) {
                    case 'OK': return 'bg-green-700';
                    case 'WARN': return 'bg-orange-500';
                    case 'ALARM': return 'bg-red-600';
                    default: return 'bg-green-700';
                }
            };

            return (
                <div className="flex items-center justify-between mb-6">
                    <div className="w-1/6 text-gray-700 font-medium">{zone}</div>
                    <div className="flex-grow mx-8">
                        <div className="bg-gray-100 rounded-full h-6 w-full">
                            <div 
                                className="h-6 rounded-full" 
                                style={{ width: `${percentage}%`, backgroundColor: color }}
                            ></div>
                        </div>
                    </div>
                    <div className="flex items-center space-x-4">
                        <div className="w-12 text-right text-gray-600 text-sm">{percentage}%</div>
                        <div className={`px-4 py-1 rounded-sm text-xs font-medium text-white ${getStatusColor()}`}>
                            {status.toUpperCase()}
                        </div>
                    </div>
                </div>
            );
        };

        const PowerConsumptionZones = () => {
            const zones = [
                { zone: 'Zone A', percentage: 62, status: 'OK', color: '#2e7d32' },
                { zone: 'Zone B', percentage: 48, status: 'OK', color: '#2e7d32' },
                { zone: 'Zone C', percentage: 81, status: 'WARN', color: '#ff9800' },
                { zone: 'Zone D', percentage: 35, status: 'OK', color: '#2e7d32' },
                { zone: 'Zone E', percentage: 90, status: 'ALARM', color: '#cf1322' },
                { zone: 'Zone F', percentage: 27, status: 'OK', color: '#2e7d32' }
            ];

            return (
                <div className="bg-white rounded-md border border-gray-200 p-6">
                    <h2 className="text-gray-800 font-semibold mb-6">Power consumption by zone</h2>
                    
                    {zones.map((item) => (
                        <ZoneRow 
                            key={item.zone}
                            zone={item.zone}
                            percentage={item.percentage}
                            status={item.status}
                            color={item.color}
                        />
                    ))}
                </div>
            );
        };

        const SourceBreakdown = () => {
            return (
                <div className="bg-white rounded-md border border-gray-200 p-6">
                    <h2 className="text-gray-800 font-semibold mb-6">Source breakdown</h2>
                    
                    <div className="flex items-center justify-between">
                        <div className="relative w-64 h-64">
                            <div className="w-full h-full rounded-full" style={{ 
                                background: 'conic-gradient(#2e7d32 0% 57%, #1976d2 57% 75%, #ff9800 75% 100%)'
                            }}></div>
                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-full w-40 h-40 flex items-center justify-center">
                                <div className="text-center">
                                    <div className="text-4xl font-bold text-gray-800">100%</div>
                                    <div className="text-gray-500 text-sm mt-1">today</div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="flex items-center">
                                <div className="w-4 h-4 bg-green-700 mr-2"></div>
                                <span className="text-gray-700 text-sm">Электроэнергия · 57 %</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-4 bg-orange-500 mr-2"></div>
                                <span className="text-gray-700 text-sm">Газ · 25 %</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-4 h-4 bg-blue-500 mr-2"></div>
                                <span className="text-gray-700 text-sm">Утилизация тепла · 18 %</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-50 px-6 py-3 border-t border-gray-200">
                    <div className="text-gray-500 text-xs">
                        Connection: OK · Tariff plan: Industrial-2 · Compliance: ANSI/ISA-101.01
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
