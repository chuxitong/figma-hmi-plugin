<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Line A — Overview</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <div className="flex flex-1 p-4 bg-gray-50">
                        <div className="w-3/4 pr-4">
                            <ProcessFlow />
                            <div className="mt-4 grid grid-cols-4 gap-2">
                                <MetricCard 
                                    title="OEE" 
                                    value="82.5" 
                                    change="+1.2 за месяц" 
                                    borderColor="border-green-800"
                                />
                                <MetricCard 
                                    title="Units / h" 
                                    value="12480" 
                                    change="+340 за месяц" 
                                    borderColor="border-green-800"
                                />
                                <MetricCard 
                                    title="Reject" 
                                    value="0.6" 
                                    change="-0.1 за месяц" 
                                    borderColor="border-orange-500"
                                />
                                <MetricCard 
                                    title="Energy" 
                                    value="742" 
                                    change="+18 за месяц" 
                                    borderColor="border-orange-500"
                                />
                            </div>
                            <TrendChart />
                        </div>
                        <div className="w-1/4">
                            <AlarmList />
                        </div>
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#13314f] text-white py-3 px-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-semibold">Production Line A — Overview</h1>
                            <p className="text-xs mt-1">Shift: Assembly 2 - Shift B - Operator: A. Petrov</p>
                        </div>
                        <div className="flex items-center space-x-1">
                            <NavTab title="Overview" active={true} />
                            <NavTab title="Alarms" active={false} />
                            <NavTab title="Tends" active={false} />
                            <NavTab title="Operator" active={false} />
                        </div>
                        <div className="bg-[#1c4880] px-4 py-2 rounded-md text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const NavTab = ({ title, active }) => {
            return (
                <div className={`px-6 py-1 rounded-full text-sm ${active ? 'bg-[#2c5990] text-white' : 'text-gray-300 hover:bg-[#1a3b6b]'}`}>
                    {title}
                </div>
            );
        };

        const ProcessFlow = () => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6 shadow-sm">
                    <div className="mb-4">
                        <h2 className="text-md font-semibold text-gray-900">Process flow — Line A</h2>
                        <p className="text-xs text-gray-500 mt-1">Source: ThingsBoard SCADA symbol library — fluid system pack</p>
                    </div>
                    
                    <div className="py-8 px-4">
                        {/* Process Flow Diagram */}
                        <div className="flex items-center justify-between relative">
                            {/* Background lines */}
                            <div className="absolute top-1/2 w-full h-px bg-gray-400"></div>
                            <div className="absolute top-[35%] w-full h-px bg-gray-400"></div>
                            <div className="absolute top-[65%] w-full h-px bg-gray-400"></div>
                            
                            {/* Left tank T-101 */}
                            <div className="flex flex-col items-center">
                                <div className="w-20 h-32 relative">
                                    <div className="absolute inset-y-0 left-0 w-8 bg-gray-300 rounded-l-md"></div>
                                    <div className="absolute inset-0 w-12 h-[70%] bg-green-700 rounded-md left-4"></div>
                                    <div className="absolute bottom-0 w-full h-2 bg-gray-400"></div>
                                </div>
                                <span className="mt-2 text-xs text-gray-600">T-101</span>
                            </div>
                            
                            {/* Pump P-101 */}
                            <div className="flex items-center">
                                <div className="w-12 h-12 rounded-full border-2 border-gray-400 flex items-center justify-center">
                                    <div className="w-8 h-8 rounded-full bg-green-700"></div>
                                </div>
                                <span className="ml-2 text-xs text-gray-600">P-101</span>
                            </div>
                            
                            {/* Valve V-201 */}
                            <div className="flex items-center">
                                <div className="w-10 h-10 border-2 border-gray-400 flex items-center justify-center">
                                    <div className="w-6 h-6 rounded-full bg-green-600 relative">
                                        <div className="absolute -top-1 left-1/2 transform -translate-x-1/2 w-1 h-3 bg-green-800"></div>
                                        <div className="absolute -right-1 top-1/2 transform -translate-y-1/2 w-3 h-1 bg-green-800"></div>
                                    </div>
                                </div>
                                <span className="ml-2 text-xs text-gray-600">V-201</span>
                            </div>
                            
                            {/* Pipe section P-102 */}
                            <div className="flex items-center">
                                <div className="w-12 h-8 border-t-2 border-l-2 border-r-2 border-gray-400"></div>
                                <span className="ml-2 text-xs text-gray-600">P-102</span>
                            </div>
                            
                            {/* Valve V-202 */}
                            <div className="flex items-center">
                                <div className="w-10 h-10 border-2 border-gray-400 flex items-center justify-center">
                                    <div className="w-6 h-6 rounded-full bg-orange-500 relative">
                                        <div className="absolute -top-1 left-1/2 transform -translate-x-1/2 w-1 h-3 bg-orange-700"></div>
                                        <div className="absolute -right-1 top-1/2 transform -translate-y-1/2 w-3 h-1 bg-orange-700"></div>
                                    </div>
                                </div>
                                <span className="ml-2 text-xs text-gray-600">V-202</span>
                            </div>
                            
                            {/* Separator S-1 */}
                            <div className="flex items-center">
                                <div className="w-28 h-20 bg-gray-300 rounded-full relative">
                                    <div className="absolute inset-0 rounded-full bg-green-600 opacity-70"></div>
                                    <div className="absolute bottom-0 w-full h-6 bg-gray-400"></div>
                                    <span className="absolute text-xs text-gray-700 w-full text-center mt-6">SEPARATOR S-1</span>
                                </div>
                            </div>
                            
                            {/* Right tank T-102 */}
                            <div className="flex flex-col items-center">
                                <div className="w-20 h-32 relative">
                                    <div className="absolute inset-y-0 left-0 w-8 bg-gray-300 rounded-l-md"></div>
                                    <div className="absolute inset-0 w-12 h-[50%] bg-green-700 left-4"></div>
                                    <div className="absolute bottom-0 w-full h-2 bg-gray-400"></div>
                                </div>
                                <span className="mt-2 text-xs text-gray-600">T-102</span>
                            </div>
                            
                            {/* Percentage indicators */}
                            <div className="absolute top-2 left-8 text-xs text-gray-600">72%</div>
                            <div className="absolute top-2 right-8 text-xs text-gray-600">41%</div>
                        </div>
                        
                        {/* Temperature indicators */}
                        <div className="flex justify-around mt-8">
                            <div className="flex flex-col items-center">
                                <div className="w-10 h-10 rounded-full border-2 border-gray-400 flex items-center justify-center">
                                    <div className="w-7 h-7 rounded-full bg-green-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                                </div>
                                <span className="mt-2 text-xs text-gray-600">72 °C</span>
                            </div>
                            <div className="flex flex-col items-center">
                                <div className="w-10 h-10 rounded-full border-2 border-gray-400 flex items-center justify-center">
                                    <div className="w-7 h-7 rounded-full bg-green-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                                </div>
                                <span className="mt-2 text-xs text-gray-600">3.4 bar</span>
                            </div>
                            <div className="flex flex-col items-center">
                                <div className="w-10 h-10 rounded-full border-2 border-gray-400 flex items-center justify-center">
                                    <div className="w-7 h-7 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                                </div>
                                <span className="mt-2 text-xs text-gray-600">94 °C</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MetricCard = ({ title, value, change, borderColor }) => {
            return (
                <div className={`border-l-4 ${borderColor} bg-white rounded-md p-4 shadow-sm`}>
                    <div className="text-xs text-gray-600">{title}</div>
                    <div className="text-3xl font-bold text-gray-900">{value}</div>
                    <div className="text-xs text-gray-600 mt-1">
                        <span className="text-green-600">▲</span> {change}
                    </div>
                </div>
            );
        };

        const TrendChart = () => {
            return (
                <div className="bg-white rounded-lg border border-gray-200 p-4 mt-4 shadow-sm">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-md font-semibold text-gray-900">Real-time trend — last 60 min</h2>
                        <div className="flex items-center space-x-4 text-xs">
                            <div className="flex items-center">
                                <div className="w-3 h-2 bg-green-700 mr-1"></div>
                                <span>Temp</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-3 h-2 bg-orange-500 mr-1"></div>
                                <span>Pressure</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-3 h-2 bg-red-700 mr-1"></div>
                                <span>Flow</span>
                            </div>
                        </div>
                    </div>
                    <div className="h-24 w-full relative border-b border-l border-gray-300">
                        {/* Chart lines would be drawn here with actual data */}
                        <svg className="w-full h-full" viewBox="0 0 800 100" preserveAspectRatio="none">
                            {/* Green line (Temp) */}
                            <path d="M0,70 C50,65 100,60 150,65 C200,70 250,65 300,50 C350,35 400,40 450,30 C500,40 550,50 600,35 C650,25 700,30 750,20" 
                                  fill="none" stroke="#2e7d32" strokeWidth="2" />
                            
                            {/* Orange line (Pressure) */}
                            <path d="M0,80 C50,75 100,70 150,75 C200,80 250,75 300,70 C350,70 400,68 450,65 C500,60 550,60 600,55 C650,50 700,45 750,40" 
                                  fill="none" stroke="#f9a825" strokeWidth="2" />
                            
                            {/* Red line (Flow) */}
                            <path d="M0,90 C50,88 100,85 150,88 C200,90 250,85 300,82 C350,85 400,83 450,80 C500,83 550,82 600,85 C650,87 700,85 750,78" 
                                  fill="none" stroke="#d32f2f" strokeWidth="2" />
                        </svg>
                    </div>
                </div>
            );
        };

        const AlarmList = () => {
            const alarms = [
                { time: "14:31", id: "TT-301", description: "Motor temperature high", type: "ALARM" },
                { time: "14:28", id: "PT-102", description: "Discharge pressure", type: "ALARM" },
                { time: "14:22", id: "FT-401", description: "Flow rate deviation", type: "WARN" },
                { time: "14:15", id: "CT-502", description: "Cooling water temp", type: "WARN" },
                { time: "14:05", id: "PDT-201", description: "Filter ΔP", type: "INFO" }
            ];

            return (
                <div className="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-md font-semibold text-gray-900">Active alarms</h2>
                        <span className="text-xs text-gray-500">3 of 14</span>
                    </div>
                    <div className="space-y-3">
                        {alarms.map((alarm, index) => (
                            <AlarmItem key={index} alarm={alarm} />
                        ))}
                    </div>
                </div>
            );
        };

        const AlarmItem = ({ alarm }) => {
            const getButtonClass = () => {
                switch(alarm.type) {
                    case "ALARM":
                        return "bg-red-600 hover:bg-red-700 text-white";
                    case "WARN":
                        return "bg-orange-500 hover:bg-orange-600 text-white";
                    case "INFO":
                        return "bg-blue-600 hover:bg-blue-700 text-white";
                    default:
                        return "bg-gray-600 hover:bg-gray-700 text-white";
                }
            };

            return (
                <div className="border border-gray-300 rounded-md p-3">
                    <div className="flex justify-between items-center">
                        <div className="flex space-x-4">
                            <span className="text-xs text-gray-500">{alarm.time}</span>
                            <span className="text-xs text-gray-700">{alarm.id}</span>
                        </div>
                        <button className="px-6 py-1 rounded-md text-sm font-medium border border-gray-300 hover:bg-gray-50 text-gray-900">
                            ACK
                        </button>
                    </div>
                    <div className="mt-2">
                        <span className="text-sm text-gray-700">{alarm.description}</span>
                        <div className="mt-1">
                            <span className={`text-xs px-2 py-0.5 rounded-sm ${getButtonClass()}`}>
                                {alarm.type}
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 py-3 px-6 border-t border-gray-200">
                    <div className="text-xs text-gray-500">
                        Connection: OK · Latency: 18 ms · Logged in as A. Petrov · ThingsBoard SCADA glyphs imported via 00_raw_svg
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
