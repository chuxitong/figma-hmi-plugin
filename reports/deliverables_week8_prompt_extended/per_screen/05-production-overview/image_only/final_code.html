<html lang="en">

                                            </div>
                                        </div>

                                    </div>
                                </div>

                                {/* Pipe 6 */}
                                <div className="w-12 h-1 bg-gray-400"></div>

                                {/* T-102 Tank */}
                                <div className="flex flex-col items-center">
                                    <div className="w-20 h-32 relative">
                                        <div className="absolute inset-0 bg-gray-200 rounded"></div>
                                        <div className="absolute bottom-0 w-full h-1/2 bg-green-600 rounded"></div>
                                    </div>
                                    <div className="mt-2 text-xs text-gray-600">T-102</div>

                                    <div className="w-8 h-8 rounded-full bg-green-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                                </div>

                            </div>
                            <div className="flex flex-col items-center">
                                <div className="w-12 h-12 rounded-full border-2 border-gray-400 flex items-center justify-center bg-green-100">
                                    <div className="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold">T</div>
                                </div>
                                <div className="mt-2 text-xs text-gray-600">94 °C</div>
                            </div>
                        </div>
                        
                        {/* Statistics */}
                        <div className="grid grid-cols-4 gap-4">
                            <div className="border-l-4 border-green-600 pl-4 py-2">
                                <div className="text-gray-600 text-sm">OEE</div>

                                <div className="text-xs text-gray-500 flex items-center">

                                    +1.2 за смену
                                </div>
                            </div>
                            <div className="border-l-4 border-green-600 pl-4 py-2">
                                <div className="text-gray-600 text-sm">Units / h</div>
                                <div className="text-3xl font-bold text-gray-900">12480</div>
                                <div className="text-xs text-gray-500 flex items-center">
                                    <i className="fas fa-caret-up text-green-600 mr-1"></i>
                                    +340 за смену

                            <div className="border-l-4 border-orange-500 pl-4 py-2">
                                <div className="text-gray-600 text-sm">Reject</div>

                                    -0.1 за смену
                                </div>
                            </div>
                            <div className="border-l-4 border-orange-500 pl-4 py-2">
                                <div className="text-gray-600 text-sm">Energy</div>
                                <div className="text-3xl font-bold text-gray-900">742</div>
                                <div className="text-xs text-gray-500 flex items-center">
                                    <i className="fas fa-caret-up text-green-600 mr-1"></i>
                                    +18 за смену
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Trend Chart */}
                    <div className="bg-white rounded-lg border border-gray-200 p-6">

                                <div className="flex items-center">

                                </div>
                                <div className="flex items-center">
                                    <div className="w-3 h-3 bg-red-600 mr-2"></div>
                                    <span className="text-gray-600">Flow</span>
                                </div>
                            </div>
                        </div>
                        <div className="w-full h-24 relative border-b border-l border-gray-300">
                            <svg className="w-full h-full" viewBox="0 0 1000 100" preserveAspectRatio="none">
                                {/* Grid lines */}
                                <line x1="0" y1="0" x2="1000" y2="0" stroke="#e5e7eb" strokeWidth="1" />
                                <line x1="0" y1="33" x2="1000" y2="33" stroke="#e5e7eb" strokeWidth="1" />
                                <line x1="0" y1="66" x2="1000" y2="66" stroke="#e5e7eb" strokeWidth="1" />
                                <line x1="0" y1="100" x2="1000" y2="100" stroke="#e5e7eb" strokeWidth="1" />
                                
                                {/* Temperature line */}
                                <polyline 
                                    points="0,70 100,65 200,60 300,50 400,45 500,40 600,50 700,60 800,70 900,65 1000,60" 
                                    fill="none" stroke="#16a34a" strokeWidth="2" 
                                />
                                
                                {/* Pressure line */}
                                <polyline 
                                    points="0,80 100,78 200,75 300,73 400,70 500,68 600,65 700,62 800,58 900,55 1000,52" 
                                    fill="none" stroke="#f97316" strokeWidth="2" 
                                />
                                
                                {/* Flow line */}

                                    points="0,90 100,88 200,87 300,89 400,91 500,90 600,88 700,86 800,84 900,82 1000,78" 
                                    fill="none" stroke="#dc2626" strokeWidth="2" 
                                />
                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        const AlarmItem = ({ time, id, message, type }) => {
            const getButtonStyle = () => {
                switch(type) {
                    case 'ALARM':
                        return 'bg-red-600 text-white';
                    case 'WARN':
                        return 'bg-orange-500 text-white';
                    case 'INFO':
                        return 'bg-blue-600 text-white';
                    default:
                        return 'bg-gray-600 text-white';
                }
            };

            return (
                <div className="border border-gray-300 rounded-lg p-3">
                    <div className="flex justify-between items-center mb-2">
                        <div className="flex items-center space-x-4">
                            <span className="text-gray-600 text-sm">{time}</span>
                            <span className="text-gray-600 text-sm">{id}</span>
                        </div>
                    </div>
                    <div className="text-sm text-gray-700">{message}</div>
                    <div className="flex justify-between items-center mt-2">
                        <div>
                            <button className={`text-xs px-4 py-0.5 rounded ${getButtonStyle()}`}>
                                {type}
                            </button>
                        </div>
                        <button className="bg-gray-100 border border-gray-400 text-gray-800 px-6 py-1 rounded text-sm font-medium hover:bg-gray-200">
                            ACK
                        </button>
                    </div>
                </div>
            );
        };

        const AlarmPanel = () => {
            const alarms = [
                {
                    time: "14:31",
                    id: "TT-301",
                    message: "Motor temperature high",
                    type: "ALARM"
                },
                {
                    time: "14:28",
                    id: "PT-102",
                    message: "Discharge pressure",
                    type: "ALARM"
                },
                {
                    time: "14:22",
                    id: "FT-401",
                    message: "Flow rate deviation",
                    type: "WARN"
                },
                {
                    time: "14:15",
                    id: "CT-502",
                    message: "Cooling water temp",
                    type: "WARN"
                },
                {
                    time: "14:05",
                    id: "PDT-201",
                    message: "Filter ΔP",
                    type: "INFO"
                }
            ];

            return (
                <div className="bg-white rounded-lg border border-gray-200 p-6">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-gray-800 font-semibold">Active alarms</h3>
                        <span className="text-xs text-gray-500">3 of 14</span>
                    </div>
                    <div className="space-y-3">
                        {alarms.map((alarm, index) => (
                            <AlarmItem 
                                key={index} 
                                time={alarm.time} 
                                id={alarm.id} 
                                message={alarm.message} 
                                type={alarm.type} 
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <div className="bg-gray-100 border-t border-gray-200 py-4 px-6">
                    <div className="flex items-center justify-between text-xs text-gray-500">

        ReactDOM.render(<App />, document.getElementById('root'));

</html>
