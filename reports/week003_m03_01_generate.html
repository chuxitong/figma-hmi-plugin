<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Trend Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f7fa;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen flex flex-col">
                    <Header />
                    <div className="flex-grow p-4 bg-gray-50">
                        <div className="grid grid-cols-4 gap-4 mb-4">
                            <MetricCard 
                                title="Temperature" 
                                value="72.4" 
                                change="+1.2 за секунду" 
                                borderColor="border-green-600"
                                color="text-green-600"
                            />
                            <MetricCard 
                                title="Pressure" 
                                value="3.21" 
                                change="+0.04 за секунду" 
                                borderColor="border-green-600"
                                color="text-green-600"
                            />
                            <MetricCard 
                                title="Flow" 
                                value="184" 
                                change="-3 за секунду" 
                                borderColor="border-orange-500"
                                color="text-orange-500"
                            />
                            <MetricCard 
                                title="Setpoint dev" 
                                value="1.8" 
                                change="+0.2 за секунду" 
                                borderColor="border-green-600"
                                color="text-green-600"
                            />
                        </div>
                        <TrendChart />
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-slate-900 text-white py-4 px-6">
                    <div className="flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-semibold">Process Trend Monitor</h1>
                            <p className="text-sm text-gray-300">Update Window: 60 min - Sample: 1 s</p>
                        </div>
                        <div className="bg-slate-800 rounded-md px-4 py-2 text-sm">
                            2026-04-19 14:32:07 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const MetricCard = ({ title, value, change, borderColor, color }) => {
            return (
                <div className={`bg-white rounded-md border-l-4 ${borderColor} p-4 shadow-sm`}>
                    <div className="text-sm text-gray-600 mb-1">{title}</div>
                    <div className="text-3xl font-bold text-gray-900">{value}</div>
                    <div className="text-xs text-gray-600 mt-2">
                        <span className={`${color}`}>▲</span> {change}
                    </div>
                </div>
            );
        };

        const TrendChart = () => {
            return (
                <div className="bg-white rounded-md shadow-sm border border-gray-200 p-4">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-lg font-semibold text-gray-800">Trend window — 14:00 to 15:00</h2>
                        <div className="flex items-center space-x-4">
                            <div className="flex items-center">
                                <div className="w-3 h-3 bg-green-600 mr-2"></div>
                                <span className="text-xs text-gray-600">Temp (°C)</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-3 h-3 bg-orange-500 mr-2"></div>
                                <span className="text-xs text-gray-600">Pressure (bar)</span>
                            </div>
                            <div className="flex items-center">
                                <div className="w-3 h-3 bg-red-700 mr-2"></div>
                                <span className="text-xs text-gray-600">Flow (L/min) band: ±2σ</span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="w-full h-64 relative">
                        {/* Chart grid lines */}
                        <div className="absolute inset-0 grid grid-cols-12 grid-rows-6">
                            {Array(12).fill().map((_, i) => (
                                <div key={i} className="col-span-1 border-r border-gray-200"></div>
                            ))}
                            {Array(6).fill().map((_, i) => (
                                <div key={i} className="row-span-1 border-t border-gray-200"></div>
                            ))}
                        </div>
                        
                        {/* Y-axis labels */}
                        <div className="absolute left-0 inset-y-0 flex flex-col justify-between text-xs text-gray-500 py-2">
                            <div>100</div>
                            <div>90</div>
                            <div>80</div>
                            <div>70</div>
                            <div>60</div>
                            <div>50</div>
                            <div>40</div>
                        </div>
                        
                        {/* X-axis labels */}
                        <div className="absolute bottom-0 inset-x-0 flex justify-between text-xs text-gray-500 px-8">
                            <div>14:00</div>
                            <div>14:05</div>
                            <div>14:10</div>
                            <div>14:15</div>
                            <div>14:20</div>
                            <div>14:25</div>
                            <div>14:30</div>
                            <div>14:35</div>
                            <div>14:40</div>
                            <div>14:45</div>
                            <div>14:50</div>
                            <div>14:55</div>
                            <div>14:60</div>
                        </div>
                        
                        {/* Chart lines - these would be SVG paths in a real implementation */}
                        <svg className="absolute inset-0 w-full h-full" viewBox="0 0 1000 300" preserveAspectRatio="none">
                            {/* Temperature line (green) */}
                            <path d="M0,75 L83,80 L166,60 L249,65 L332,45 L415,70 L498,65 L581,50 L664,65 L747,45 L830,60 L913,40 L1000,50" 
                                  stroke="#16a34a" strokeWidth="2" fill="none" />
                            
                            {/* Pressure line (orange) */}
                            <path d="M0,150 L83,140 L166,160 L249,150 L332,140 L415,155 L498,160 L581,145 L664,155 L747,140 L830,165 L913,150 L1000,150" 
                                  stroke="#f97316" strokeWidth="2" fill="none" />
                            
                            {/* Flow line (red) */}
                            <path d="M0,200 L83,195 L166,180 L249,190 L332,205 L415,185 L498,200 L581,190 L664,205 L747,195 L830,180 L913,190 L1000,200" 
                                  stroke="#dc2626" strokeWidth="2" fill="none" />
                        </svg>
                    </div>
                    
                    <div className="mt-4 pt-3 border-t border-gray-200">
                        <div className="flex justify-between">
                            <div className="text-sm text-gray-700">
                                14:22 — Flow rate deviation &gt; 12 % (FT-401)
                            </div>
                            <div className="text-sm text-gray-700">
                                Operator: A. Petrov
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-gray-100 border-t border-gray-200 py-3 px-6">
                    <div className="text-xs text-gray-600">
                        Connection: OK - Latency: 18 ms - Logging: enabled - Export to CSV available via toolbar
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
