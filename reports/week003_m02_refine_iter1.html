<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm & Events Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    <div className="container mx-auto p-4">
                        <SummaryCards />
                        <FilterSection />
                        <EventsTable />
                    </div>
                    <Footer />
                </div>
            );
        };

        const Header = () => {
            return (
                <header className="bg-[#0c3-700] text-white py-4 px-6">
                    <div className="container mx-auto flex justify-between items-center">
                        <div className="flex items-center">
                            <div className="mr-4">
                                <i className="fas fa-exclamation-circle text-red-500 text-3xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold">Alarm & Events Monitor</h1>
                                <p className="text-sm text-gray-300">Refinery 2 - Shift B - All sites</p>
                            </div>
                        </div>
                        <div className="bg-[#1a3b6d] rounded-md px-4 py-2 text-sm">
                            2026-04-19 14:34:55 MSK
                        </div>
                    </div>
                </header>
            );
        };

        const SummaryCards = () => {
            const cards = [
                {
                    title: "Critical",
                    value: "2",
                    badge: "active",
                    color: "red",
                    trend: "+1 за смену"
                },
                {
                    title: "Warning",
                    value: "5",
                    badge: "active",
                    color: "orange",
                    trend: "-1 за смену"
                },
                {
                    title: "Information",
                    value: "11",
                    badge: "recent",
                    color: "green",
                    trend: "+3 за смену"
                },
                {
                    title: "Acknowledged",
                    value: "34",
                    badge: "st 24h",
                    color: "green",
                    trend: "+7 за смену"
                },
                {
                    title: "MTBA",
                    value: "1h 42m",
                    badge: "",
                    color: "orange",
                    trend: "-12m за смену"
                }
            ];

            return (
                <div className="grid grid-cols-5 gap-4 mb-6">
                    {cards.map((card, index) => (
                        <div key={index} className="bg-white border rounded-md p-4">
                            <div className="mb-2">
                                <span className="text-gray-600">{card.title}</span>
                            </div>
                            <div className="flex items-baseline mb-2">
                                <span className="text-3xl font-bold text-gray-800">{card.value}</span>
                                <span className="ml-1 text-gray-600 text-sm">{card.badge}</span>
                            </div>
                            <div className="flex items-center text-xs text-gray-600">
                                <i className="fas fa-arrow-up mr-1"></i>
                                <span>{card.trend}</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const FilterSection = () => {
            return (
                <div className="bg-white border rounded-md p-4 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-4">
                            <span className="text-gray-600">Severity</span>
                            <div className="flex space-x-2">
                                <button className="px-4 py-1 bg-red-700 text-white text-xs font-bold rounded-full">
                                    CRITICAL
                                </button>
                                <button className="px-4 py-1 bg-orange-500 text-white text-xs font-bold rounded-full">
                                    WARNING
                                </button>
                                <button className="px-4 py-1 bg-blue-600 text-white text-xs font-bold rounded-full">
                                    INFO
                                </button>
                            </div>
                            <span className="text-gray-600">Tag / описание</span>
                            <input 
                                type="text" 
                                placeholder="Введите тер или часть описания..." 
                                className="border border-gray-300 rounded-md px-3 py-1 text-sm w-64" 
                            />
                        </div>
                        <div className="flex space-x-4">
                            <button className="px-6 py-1 bg-green-700 text-white text-sm font-bold rounded">
                                ACK ALL
                            </button>
                            <button className="px-6 py-1 border border-gray-300 text-gray-700 text-sm font-bold rounded">
                                Export...
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const EventsTable = () => {
            const events = [
                {
                    severity: "CRITICAL",
                    time: "14:31:42",
                    tag: "TT-301",
                    description: "Motor temperature exceeds high-high limit",
                    value: "94.2",
                    unit: "°C",
                    source: "Refinery2/U2/M-301"
                },
                {
                    severity: "CRITICAL",
                    time: "14:28:15",
                    tag: "PT-102",
                    description: "Discharge pressure too high",
                    value: "5.8",
                    unit: "bar",
                    source: "Refinery2/U1/P-102"
                },
                {
                    severity: "WARNING",
                    time: "14:22:10",
                    tag: "FT-401",
                    description: "Flow rate deviation > 12 %",
                    value: "23.1",
                    unit: "m³/h",
                    source: "Refinery2/U4/F-401"
                },
                {
                    severity: "WARNING",
                    time: "14:15:30",
                    tag: "CT-502",
                    description: "Cooling water temperature rising",
                    value: "38.5",
                    unit: "°C",
                    source: "Utilities/CW-502"
                },
                {
                    severity: "WARNING",
                    time: "14:09:54",
                    tag: "LT-301",
                    description: "Tank level above setpoint",
                    value: "88.4",
                    unit: "%",
                    source: "Refinery2/U2/T-301"
                },
                {
                    severity: "INFO",
                    time: "14:05:18",
                    tag: "PDT-201",
                    description: "Filter differential pressure",
                    value: "0.8",
                    unit: "bar",
                    source: "Refinery2/U2/F-201"
                },
                {
                    severity: "INFO",
                    time: "14:01:09",
                    tag: "FT-902",
                    description: "Flow within tolerance — restored",
                    value: "180",
                    unit: "m³/h",
                    source: "Refinery2/U9/F-902"
                },
                {
                    severity: "INFO",
                    time: "13:54:22",
                    tag: "CT-101",
                    description: "Communication restored",
                    value: "-",
                    unit: "",
                    source: "Bus/CT-101"
                }
            ];

            return (
                <div className="bg-white border rounded-md">
                    <table className="w-full">
                        <thead className="bg-gray-100">
                            <tr>
                                <th className="text-left py-3 px-4 text-gray-700">Severity</th>
                                <th className="text-left py-3 px-4 text-gray-700">Time</th>
                                <th className="text-left py-3 px-4 text-gray-700">Tag</th>
                                <th className="text-left py-3 px-4 text-gray-700">Description</th>
                                <th className="text-left py-3 px-4 text-gray-700">Value</th>
                                <th className="text-left py-3 px-4 text-gray-700">Source</th>
                                <th className="text-center py-3 px-4 text-gray-700">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {events.map((event, index) => (
                                <tr key={index} className="border-b">
                                    <td className="py-3 px-4">
                                        <span className={`px-3 py-1 text-white text-xs rounded-md ${
                                            event.severity === "CRITICAL" ? "bg-red-700" : 
                                            event.severity === "WARNING" ? "bg-orange-500" : "bg-blue-600"
                                        }`}>
                                            {event.severity}
                                        </span>
                                    </td>
                                    <td className="py-3 px-4 text-gray-700">{event.time}</td>
                                    <td className="py-3 px-4 font-medium">{event.tag}</td>
                                    <td className="py-3 px-4 text-gray-800">{event.description}</td>
                                    <td className="py-3 px-4">
                                        <span className="text-gray-800">{event.value}</span>
                                        {event.unit && <span className="ml-2 text-gray-600">{event.unit}</span>}
                                    </td>
                                    <td className="py-3 px-4 text-gray-600 text-sm">{event.source}</td>
                                    <td className="py-3 px-4">
                                        <div className="flex justify-center space-x-2">
                                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-xs font-medium rounded">
                                                ACK
                                            </button>
                                            <button className="px-4 py-1 border border-gray-300 text-gray-700 text-xs font-medium rounded">
                                                View
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="py-4 px-6 text-xs text-gray-500 border-t">
                    <div className="container mx-auto">
                        <p>Connection: OK · Latency: 22 ms · Compliance: ANSI/ISA-101.01-2015 — colour + text + shape encoding for every state</p>
                    </div>
                </footer>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
