<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const MetricCard = ({ title, value, change, unit, borderColor }) => {
            const isPositive = change.startsWith('+');
            const triangleIcon = isPositive ? '▲' : '▼';
            
            return (
                <div className="bg-white rounded-lg border-l-4" style={{borderLeftColor: borderColor}}>
                    <div className="p-4">
                        <div className="text-sm text-gray-600">{title}</div>
                        <div className="text-4xl font-bold text-gray-900">{value} <span className="text-xl font-normal">{unit}</span></div>
                        <div className="text-xs text-gray-600 mt-1">
                            <span className="mr-1">{triangleIcon}</span>
                            {change}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <div className="bg-slate-900 text-white px-6 py-3">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-semibold">Process Trend Monitor</h1>
                                <p className="text-xs text-gray-300">Update Window: 60 min - Sample: 1 s</p>
                            </div>
                            <div className="bg-slate-800 rounded-md px-4 py-2 text-sm text-gray-300">
                                2026-04-19 14:32:07 MSK
                            </div>
                        </div>
                    </div>

                    {/* Metrics Grid */}
                    <div className="px-6 py-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <MetricCard 
                                title="Temperature" 
                                value="72.4" 
                                change="+1.2 за секунду" 
                                unit="" 
                                borderColor="#22c55e"
                            />
                            <MetricCard 
                                title="Pressure" 
                                value="3.21" 
                                change="+0.04 за секунду" 
                                unit="" 
                                borderColor="#22c55e"
                            />
                            <MetricCard 
                                title="Flow" 
                                value="184" 
                                change="-3 за секунду" 
                                unit="min" 
                                borderColor="#f97316"
                            />
                            <MetricCard 
                                title="Setpoint dev" 
                                value="1.8" 
                                change="+0.2 за секунду" 
                                unit="" 
                                borderColor="#22c55e"
                            />
                        </div>
                    </div>

                    {/* Chart Section */}
                    <div className="px-6 pb-6">
                        <div className="bg-white rounded-lg border border-gray-200 p-6">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-semibold text-gray-900">Trend window — 14:00 to 15:00</h2>
                                <div className="flex items-center space-x-6">
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-green-600 mr-2"></div>
                                        <span className="text-xs text-gray-600">Temp (°C)</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-orange-500 mr-2"></div>
                                        <span className="text-xs text-gray-600">Pressure (bar)</span>
                                    </div>
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-red-700 mr-2"></div>
                                        <span className="text-xs text-gray-600">Flow (L/min) band: ±2σ</span>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Chart Area */}
                            <div className="relative h-64 w-full mb-4">
                                {/* Y-axis labels */}
                                <div className="absolute left-0 top-0 h-full flex flex-col justify-between text-xs text-gray-500 py-2">
                                    <span>100</span>
                                    <span>90</span>
                                    <span>80</span>
                                    <span>70</span>
                                    <span>60</span>
                                    <span>50</span>
                                    <span>40</span>
                                </div>
                                
                                {/* Chart grid and lines */}
                                <div className="absolute left-8 right-4 top-0 bottom-8 bg-white">
                                    {/* Grid lines - horizontal */}
                                    <div className="w-full h-full grid grid-rows-6">
                                        {[0,1,2,3,4,5].map(i => (
                                            <div key={i} className="border-t border-gray-200"></div>
                                        ))}
                                    </div>
                                    
                                    {/* Grid lines - vertical */}
                                    <div className="absolute inset-0 grid grid-cols-12">
                                        {[...Array(13)].map((_,i) => (
                                            <div key={i} className="border-r border-gray-200"></div>
                                        ))}
                                    </div>
                                    
                                    {/* Temperature line (green) */}
                                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                        <polyline 
                                            points="0,40 40,44 80,52 120,36 160,44 200,28 240,40 280,44 320,36 360,32 400,28 440,40"

                                            stroke="#22c55e" 
                                            strokeWidth="2"
                                        />
                                    </svg>

                                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                        <polyline 
                                            points="0,120 40,112 80,128 120,124 160,120 200,132 240,124 280,136 320,132 360,128 400,124 440,120"
                                            fill="none" 
                                            stroke="#f97316" 
                                            strokeWidth="2"
                                        />
                                    </svg>
                                    
                                    {/* Flow line (red) */}
                                    <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                        <polyline 
                                            points="0,160 40,168 80,152 120,160 160,168 200,144 240,156 280,160 320,152 360,160 400,144 440,152"
                                            fill="none" 
                                            stroke="#dc2626" 
                                            strokeWidth="2"
                                        />
                                    </svg>
                                </div>
                                
                                {/* X-axis labels */}
                                <div className="absolute left-8 right-4 bottom-0 flex justify-between text-xs text-gray-500">
                                    <span>14:00</span>
                                    <span>14:05</span>
                                    <span>14:10</span>
                                    <span>14:15</span>
                                    <span>14:20</span>
                                    <span>14:25</span>
                                    <span>14:30</span>
                                    <span>14:35</span>
                                    <span>14:40</span>
                                    <span>14:45</span>
                                    <span>14:50</span>
                                    <span>14:55</span>
                                    <span>15:00</span>
                                </div>
                            </div>
                            
                            {/* Alert and Operator Info */}
                            <div className="flex justify-between items-center pt-4 border-t border-gray-200">
                                <div className="text-sm text-gray-700">14:22 — Flow rate deviation > 12 % (FT-401)</div>
                                <div className="text-sm text-gray-700">Operator: A. Petrov</div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Footer */}
                    <div className="bg-gray-100 border-t border-gray-200 py-4 px-6">
                        <div className="text-xs text-gray-500">
                            Connection: OK - Latency: 18 ms - Logging: enabled - Export to CSV available via toolbar
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
